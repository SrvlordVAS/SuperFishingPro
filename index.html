<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-section { cursor:pointer; margin:5px 0; padding:5px; background:#aee1f7; border-radius:5px; }
.bag-submenu { display:none; margin-left:10px; }
.box-button { width:80px; height:80px; border-radius:8px; font-size:14px; margin:5px; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<!-- Seções -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara ativa: <span id="currentVara">Vara de Bambu (Nível 1)</span></p>
  <div id="bagContainer">
    <button id="toggleBag">📦 Abrir Bolsa</button>
    <div id="bag" style="display:none;"></div>
  </div>
</div>

<div id="aquarioSection" class="section">
  <h3>Aquário</h3>
  <p>Aqui você verá os peixes que pescou.</p>
  <div id="aquario"></div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button class="box-button" id="boxComum" style="background:#aee1f7;">📦 Comum</button>
    <button class="box-button" id="boxRara" style="background:#88c0d0;">📦 Rara</button>
    <button class="box-button" id="boxEpica" style="background:#5e81ac;">📦 Épica</button>
    <button class="box-button" id="boxLendaria" style="background:#bf616a;">📦 Lendária</button>
  </div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgradeList"></div>
</div>

<!-- Menu inferior -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="aquarioSection">🐠 Aquário</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚙️ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999
let fishingTimeout = null

// Varas
const varas = {
  "Bambu": [{level:1, chance:50, price:0, maxRarity:"Muito Comum"}],
  "Fibra": [{level:1, chance:50, price:0, maxRarity:"Comum"}],
  "Grafite": [{level:1, chance:50, price:0, maxRarity:"Incomum"}],
  "Carbono": [{level:1, chance:50, price:0, maxRarity:"Raro"}],
  "Titânio": [{level:1, chance:50, price:0, maxRarity:"Épico"}],
  "Platina": [{level:1, chance:50, price:0, maxRarity:"Lendário"}],
  "Adamantium": [{level:1, chance:50, price:0, maxRarity:"Mítico"}]
};

// Peixes
const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:2, rarity:"Comum", time:4000},
  {name:"Atum", value:5, rarity:"Incomum", time:5000},
  {name:"Garoupa adulta", value:10, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:18, rarity:"Épico", time:9000},
  {name:"Peixe-espada", value:30, rarity:"Lendário", time:12000},
  {name:"Tubarão-branco adulto", value:60, rarity:"Mítico", time:15000}
];

let inventory = [{name:"Bambu", level:1}];
let bag = [];
let currentVaraIndex = 0;

function rarityClass(r){return {"Muito Comum":"fish-muito-comum","Comum":"fish-comum","Incomum":"fish-incomum","Raro":"fish-raro","Épico":"fish-epico","Lendário":"fish-lendario","Mítico":"fish-mitico"}[r] || ""}

function getCurrentVara(){ return inventory[currentVaraIndex] }

function getRandomFishByVara(vara){
  const allowed = fishes.filter(f => ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"].indexOf(f.rarity) <= ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"].indexOf(vara.maxRarity || "Muito Comum"))
  return allowed[Math.floor(Math.random()*allowed.length)]
}

// Bolsa
function updateBagDisplay(){
  const bagDiv = document.getElementById("bag")
  bagDiv.innerHTML = ""
  const grouped = {}
  bag.forEach(v=>{
    if(!grouped[v.name]) grouped[v.name]=[]
    grouped[v.name].push(v)
  })
  Object.keys(grouped).sort().forEach(name=>{
    const section = document.createElement("div")
    section.classList.add("bag-section")
    section.innerText = `${name} (${grouped[name].length})`
    const submenu = document.createElement("div")
    submenu.classList.add("bag-submenu")
    grouped[name].forEach((v,i)=>{
      const btn = document.createElement("button")
      btn.innerText = `Lvl ${v.level}`
      btn.onclick = ()=>{
        if(confirm(`Deseja colocar esta vara como ativa?`)){
          const oldVara = getCurrentVara()
          bag.push(oldVara)
          inventory[currentVaraIndex] = v
          bag.splice(bag.indexOf(v),1)
          updateBagDisplay()
          document.getElementById("currentVara").innerText = `${inventory[currentVaraIndex].name} (Nível ${inventory[currentVaraIndex].level})`
          updateUpgradeList()
        }
      }
      submenu.appendChild(btn)
    })
    section.onclick = ()=>submenu.style.display = submenu.style.display==="none"?"block":"none"
    section.appendChild(submenu)
    bagDiv.appendChild(section)
  })
}

document.getElementById("toggleBag").onclick = ()=>{ const bagDiv=document.getElementById("bag"); bagDiv.style.display=bagDiv.style.display==="none"?"block":"none"}

// Upgrade
function updateUpgradeList(){
  const upgradeDiv = document.getElementById("upgradeList")
  upgradeDiv.innerHTML = ""
  const grouped = {}
  bag.forEach(v=>{
    if(v.name==="Bambu") return
    if(!grouped[v.name]) grouped[v.name]=[]
    grouped[v.name].push(v)
  })
  Object.keys(grouped).sort().forEach(name=>{
    const list = grouped[name]
    if(list.length>=2){
      const btn = document.createElement("button")
      btn.innerText = `${name} - ${list.length} disponível para upgrade`
      btn.onclick = ()=>{
        if(confirm(`Deseja usar 2 varas ${name} para criar uma superior?`)){
          const newLevel = list[0].level+1
          bag.splice(bag.indexOf(list[0]),1)
          bag.splice(bag.indexOf(list[1]),1)
          bag.push({name:name, level:newLevel})
          updateBagDisplay()
          updateUpgradeList()
          alert(`Criada nova vara ${name} Lvl ${newLevel} e enviada para a bolsa!`)
        }
      }
      upgradeDiv.appendChild(btn)
    }
  })
}

// Pescar
const fishButton = document.getElementById("fishButton")
const skipButton = document.getElementById("skipButton")
const result = document.getElementById("result")

fishButton.onclick = function(){
  fishButton.disabled = true
  skipButton.style.display = "inline-block"
  const vara = getCurrentVara()
  const fish = getRandomFishByVara(vara)
  result.innerText = "Esperando o peixe morder a isca..."
  fishingTimeout = setTimeout(()=>{
    if(Math.random()*100 < (vara.chance||50)){
      alert("O peixe escapou! 😢")
    } else {
      money += fish.value
      document.getElementById("money").innerText = "Saldo: " + money
      result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
      const aquarioDiv = document.getElementById("aquario")
      const p = document.createElement("p")
      p.innerHTML = `<span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span>`
      aquarioDiv.appendChild(p)
    }
    fishButton.disabled = false
    skipButton.style.display = "none"
  }, fish.time)
}

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout)
    fishingTimeout = null
    fishButton.disabled=false
    skipButton.style.display="none"
    fishButton.click()
  }
}

// Abas
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick = function(){
    const target = this.dataset.target
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"))
    document.getElementById(target).classList.add("active")
  }
})

updateBagDisplay()
updateUpgradeList()
document.getElementById("currentVara").innerText = `${getCurrentVara().name} (Nível ${getCurrentVara().level})`
})
</script>
</body>
</html>
