<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja de Varas</h3>
  <div id="shopVaras">
    <button data-name="Bambu" data-price="50">Bambu - 50 SUN</button>
    <button data-name="Fibra" data-price="100">Fibra - 100 SUN</button>
    <button data-name="Grafite" data-price="150">Grafite - 150 SUN</button>
    <button data-name="Carbono" data-price="200">Carbono - 200 SUN</button>
    <button data-name="Titânio" data-price="250">Titânio - 250 SUN</button>
    <button data-name="Platina" data-price="300">Platina - 300 SUN</button>
    <button data-name="Adamantium" data-price="400">Adamantium - 400 SUN</button>
  </div>
</div>

<!-- UPGRADE -->
<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <p>XP disponível: <span id="xpReservoir">0</span></p>
  <div id="upgrade"></div>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 500;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let xpReservoir = 0;

const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];

// ===== VARAS =====
let inventory = [
  {name:"Bambu", rarity:"Muito Comum", level:1, xp:0},
];
let currentVaraIndex = 0;

// Todas as varas disponíveis para venda
const shopVarasList = [
  {name:"Bambu", rarity:"Muito Comum", price:50},
  {name:"Fibra", rarity:"Comum", price:100},
  {name:"Grafite", rarity:"Incomum", price:150},
  {name:"Carbono", rarity:"Raro", price:200},
  {name:"Titânio", rarity:"Épico", price:250},
  {name:"Platina", rarity:"Lendário", price:300},
  {name:"Adamantium", rarity:"Mítico", price:400},
];

// ===== PEIXES =====
const fishes = [
  {name:"Sardinha", value:0.0075, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:0.015, rarity:"Comum", time:4000},
  {name:"Tainha", value:0.03, rarity:"Comum", time:4500},
  {name:"Corvina", value:0.045, rarity:"Comum", time:5000},
  {name:"Atum", value:0.06, rarity:"Incomum", time:5000},
  {name:"Garoupa pequena", value:0.075, rarity:"Incomum", time:6000},
  {name:"Pargo", value:0.09, rarity:"Incomum", time:6500},
  {name:"Garoupa adulta", value:0.105, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:0.12, rarity:"Épico", time:9000},
  {name:"Truta", value:0.135, rarity:"Épico", time:9500},
  {name:"Tubarão", value:0.15, rarity:"Lendário", time:12000},
  {name:"Marlim Azul", value:0.165, rarity:"Mítico", time:15000}
];

// ===== FUNÇÕES =====
function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFishByVara(vara){
  let allowed;
  const varaRarityIndex = rarities.indexOf(vara.rarity);

  if(vara.name === "Bambu"){
    allowed = fishes.filter(f => f.rarity === "Muito Comum");
  } else {
    const minIndex = Math.max(0, varaRarityIndex-1);
    const maxIndex = Math.min(rarities.length-1, varaRarityIndex+1);
    allowed = fishes.filter(f => {
      const idx = rarities.indexOf(f.rarity);
      return idx >= minIndex && idx <= maxIndex;
    });
  }

  const fish = allowed[Math.floor(Math.random() * allowed.length)];
  let value = fish.value;
  if(vara.name === "Bambu") value *= 0.3;
  else value *= (1 + (vara.level-1)*0.1);
  return {...fish, value};
}

// ===== BOLSA =====
function setActiveVara(idx){
    currentVaraIndex = idx;
    updateVaraInfo();
    updateBolsa();
}

function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    if(inventory.length === 0) { bolsaDiv.innerText = "Bolsa vazia."; return; }
    inventory.forEach((v, idx)=>{
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = `${v.name} (Nível ${v.level})`;
        btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
        btn.onclick = ()=>setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

// ===== UPGRADE =====
function updateUpgrade(){
    const upgradeDiv = document.getElementById("upgrade");
    upgradeDiv.innerHTML = "";
    document.getElementById("xpReservoir").innerText = xpReservoir;

    inventory.forEach((vara, idx)=>{
        const nextXP = 50*(vara.level);
        const div = document.createElement("div");
        div.innerHTML = `<strong>${vara.name}</strong> Nível ${vara.level} | XP: ${vara.xp}/${nextXP}`;

        const btnUpgrade = document.createElement("button");
        btnUpgrade.innerText = "Usar XP para upar";
        btnUpgrade.onclick = ()=>{
            if(xpReservoir <= 0){ alert("Sem XP!"); return; }
            const xpUse = Math.min(nextXP-vara.xp, xpReservoir);
            vara.xp += xpUse;
            xpReservoir -= xpUse;
            if(vara.xp >= nextXP){ vara.level++; vara.xp=0; alert(`${vara.name} subiu para Nível ${vara.level}!`);}
            updateUpgrade(); updateVaraInfo(); updateBolsa();
        };
        div.appendChild(document.createElement("br"));
        div.appendChild(btnUpgrade);
        upgradeDiv.appendChild(div);
    });
}

// ===== INFO VARA =====
function updateVaraInfo(){
    const vara = getCurrentVara();
    if(!vara){ document.getElementById("currentVara").innerText="Nenhuma"; return; }
    const varaRarityIndex = rarities.indexOf(vara.rarity);
    let allowed;
    if(vara.name === "Bambu") allowed = fishes.filter(f => f.rarity === "Muito Comum");
    else {
        const minIndex = Math.max(0, varaRarityIndex-1);
        const maxIndex = Math.min(rarities.length-1, varaRarityIndex+1);
        allowed = fishes.filter(f => { const idx = rarities.indexOf(f.rarity); return idx>=minIndex && idx<=maxIndex; });
    }
    document.getElementById("currentVara").innerText = `${vara.name} (Nível ${vara.level})`;
    document.getElementById("varaStats").innerText = `Peixes possíveis: ${allowed.map(f=>f.name).join(", ")}`;
}

// ===== LOJA =====
document.querySelectorAll("#shopVaras button").forEach(btn=>{
    btn.onclick = ()=>{
        const name = btn.dataset.name;
        const price = parseInt(btn.dataset.price);
        if(sunBalance < price){ alert("Saldo insuficiente!"); return; }
        sunBalance -= price;
        const rarity = shopVarasList.find(v=>v.name===name).rarity;
        inventory.push({name, rarity, level:1, xp:0});
        updateBolsa(); updateVaraInfo(); updateWallet();
        alert(`Você comprou a vara: ${name}`);
    };
});

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = ()=>{
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara(); if(!vara){ alert("Nenhuma vara ativa!"); return; }
  fishButton.disabled=true; skipButton.style.display="inline-block";
  const fish = getRandomFishByVara(vara);
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    if(Math.random()*100 < 100-50-(vara.level-1)*10){
      alert("O peixe escapou! 😢");
    } else {
      sunBalance += fish.value; updateWallet();
      alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`);
    }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled=false; skipButton.style.display="none";
  }, fish.time);
};

skipButton.onclick = ()=>{
  if(fishingTimeout){
    clearTimeout(fishingTimeout);
    fishingTimeout=null;
    const vara = getCurrentVara();
    const fish = getRandomFishByVara(vara);
    if(Math.random()*100 < 100-50-(vara.level-1)*10){
      alert("O peixe escapou! 😢");
    } else {
      sunBalance += fish.value; updateWallet();
      alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`);
    }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled=false; skipButton.style.display="none";
  }
};

// ===== WALLET =====
function updateWallet(){ document.getElementById("money").innerText = `Saldo SUN: ${sunBalance.toFixed(3)}`; }

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  };
});

// ===== INICIALIZA =====
updateBolsa(); updateUpgrade(); updateVaraInfo(); updateWallet();

});
</script>
</body>
</html>
