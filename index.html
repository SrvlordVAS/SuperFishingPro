<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
</head>

<body style="text-align:center;font-family:Arial">

<h1>🎣 Super Fishing</h1>

<h3 id="money">Saldo: 0</h3>

<p id="result">Clique em pescar</p>

<button id="fishButton">
🎣 PESCAR
</button>

<script>

let money = 0

let fishes = [
{name:"Peixinho", value:1},
{name:"Sardinha", value:2},
{name:"Tilápia", value:3}
]

document.getElementById("fishButton").onclick = function(){

let random = Math.floor(Math.random()*fishes.length)

let fish = fishes[random]

money += fish.value

document.getElementById("result").innerText =
"Você pescou: " + fish.name + " (+" + fish.value + ")"

document.getElementById("money").innerText =
"Saldo: " + money

}

</script>

</body>
</html>
