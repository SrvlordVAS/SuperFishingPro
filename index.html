<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SUN: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (50 SUN)</button>
    <button id="boxIncomum">📦 Box Incomum (100 SUN)</button>
    <button id="boxRara">📦 Box Rara (150 SUN)</button>
    <button id="boxEpica">📦 Box Épica (200 SUN)</button>
    <button id="boxLendaria">📦 Box Lendária (250 SUN)</button>
    <button id="boxMitica">📦 Box Mítica (300 SUN)</button>
  </div>
</div>

<!-- UPGRADE -->
<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <p>XP disponível: <span id="xpReservoir">0</span></p>
  <div id="upgrade"></div>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 100000;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let xpReservoir = 0;

// ===== VARAS =====
const varas = {
  "Bambu":[{level:1, chance:50, maxRarity:"Muito Comum", baseProfit:1, canUpgrade:false}],
  "Fibra":[{level:1, chance:50, maxRarity:"Comum", baseProfit:5, canUpgrade:true}],
  "Fibra Reforçada":[{level:1, chance:50, maxRarity:"Comum", baseProfit:6.25, canUpgrade:true}],
  "Grafite":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:10, canUpgrade:true}],
  "Grafite Reforçada":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:12.5, canUpgrade:true}],
  "Carbono":[{level:1, chance:50, maxRarity:"Raro", baseProfit:15, canUpgrade:true}],
  "Carbono Reforçada":[{level:1, chance:50, maxRarity:"Raro", baseProfit:18.75, canUpgrade:true}],
  "Titânio":[{level:1, chance:50, maxRarity:"Épico", baseProfit:20, canUpgrade:true}],
  "Titânio Reforçada":[{level:1, chance:50, maxRarity:"Épico", baseProfit:25, canUpgrade:true}],
  "Platina":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:25, canUpgrade:true}],
  "Platina Reforçada":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:31.25, canUpgrade:true}],
  "Adamantium":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:30, canUpgrade:true}],
  "Adamantium Reforçada":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:37.5, canUpgrade:true}]
};

// ===== PEIXES =====
let fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:1, rarity:"Comum", time:4000},
  {name:"Tainha", value:1, rarity:"Comum", time:4500},
  {name:"Corvina", value:1, rarity:"Comum", time:5000},
  {name:"Atum", value:1, rarity:"Incomum", time:5000},
  {name:"Garoupa pequena", value:1, rarity:"Incomum", time:6000},
  {name:"Pargo", value:1, rarity:"Incomum", time:6500},
  {name:"Garoupa adulta", value:1, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:1, rarity:"Épico", time:9000},
  {name:"Truta", value:1, rarity:"Épico", time:9500},
  {name:"Tubarão", value:1, rarity:"Lendário", time:12000},
  {name:"Marlim Azul", value:1, rarity:"Mítico", time:15000}
];

let inventory = [{name:"Bambu", level:1, profit:1, xp:0}];
let bolsa = [...inventory];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  let maxRarityIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
  let minRarityIdx = Math.max(0, maxRarityIdx-1);
  const allowed = fishes.filter(f => {
    const idx = rarities.indexOf(f.rarity);
    return idx <= maxRarityIdx && idx >= minRarityIdx;
  });
  return allowed[Math.floor(Math.random()*allowed.length)];
}

// ===== BOLSA =====
function setActiveVara(idx){
    currentVaraIndex = idx;
    updateVaraInfo();
    updateBolsa();
}

function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    if(bolsa.length === 0) { bolsaDiv.innerText = "Bolsa vazia."; return; }
    bolsa.forEach((v, idx) => {
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = v.name + ` (Nível ${v.level})`;
        btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
        btn.onclick = () => setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const result = document.getElementById("result");

fishButton.onclick = function(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }
  fishButton.disabled = true;
  const fish = getRandomFishByVara(vara);
  result.innerText = "Esperando o peixe morder a isca...";

  fishingTimeout = setTimeout(()=>{
    const baseChance = varas[vara.name][0].chance;
    const chanceBonus = (vara.level-1)*(3+Math.random()*2); // 3-5% por nível
    const captureChance = baseChance + chanceBonus;
    const escaped = Math.random()*100 >= captureChance;
    if(escaped){
        alert(`😢 O peixe ${fish.name} escapou!`);
    } else {
        sunBalance += fish.value * (vara.profit/100);
        updateWalletUI();
        alert(`🎉 Você pescou: ${fish.name} e ganhou ${(fish.value*(vara.profit/100)).toFixed(3)} SUN`);
    }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled = false;
  }, fish.time);
};

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout);
    fishingTimeout = null;
    const vara = getCurrentVara();
    const fish = getRandomFishByVara(vara);
    const baseChance = varas[vara.name][0].chance;
    const chanceBonus = (vara.level-1)*(3+Math.random()*2);
    const captureChance = baseChance + chanceBonus;
    const escaped = Math.random()*100 >= captureChance;
    if(escaped){
        alert(`😢 O peixe ${fish.name} escapou!`);
    } else {
        sunBalance += fish.value * (vara.profit/100);
        updateWalletUI();
        alert(`🎉 Você pescou: ${fish.name} e ganhou ${(fish.value*(vara.profit/100)).toFixed(3)} SUN`);
    }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled = false;
    skipButton.style.display="none";
  }
};

// ===== LOJA/BOXES =====
const boxTypes = ["Comum","Incomum","Rara","Epica","Lendaria","Mitica"];
const boxCosts = {"Comum":50,"Incomum":100,"Rara":150,"Epica":200,"Lendaria":250,"Mitica":300};
const boxChances = {
  "Comum":[ {name:"Fibra", chance:50},{name:"Fibra Reforçada", chance:50} ],
  "Incomum":[ {name:"Grafite", chance:50},{name:"Grafite Reforçada", chance:50} ],
  "Rara":[ {name:"Carbono", chance:50},{name:"Carbono Reforçada", chance:50} ],
  "Epica":[ {name:"Titânio", chance:50},{name:"Titânio Reforçada", chance:50} ],
  "Lendaria":[ {name:"Platina", chance:50},{name:"Platina Reforçada", chance:50} ],
  "Mitica":[ {name:"Adamantium", chance:50},{name:"Adamantium Reforçada", chance:50} ]
};

function addVaraToInventory(varaName){
    const baseProfit = varas[varaName][0].baseProfit;
    const newVara = {name: varaName, level:1, profit: baseProfit, xp:0};
    inventory.push(newVara);
    bolsa.push(newVara);
    updateBolsa();
    updateVaraInfo();
}

// Criar evento de cada box
boxTypes.forEach(type=>{
    document.getElementById("box"+type).onclick = ()=>{
        if(sunBalance < boxCosts[type]){ alert("Saldo SUN insuficiente!"); return; }
        const drops = boxChances[type].map(i=>i.name).join(", ");
        if(!confirm(`Abrir Box ${type} por ${boxCosts[type]} SUN?\nPossíveis varas: ${drops}\nTem certeza?`)) return;
        sunBalance -= boxCosts[type];
        let rand = Math.random()*100;
        let acc = 0;
        for(const item of boxChances[type]){
            acc += item.chance;
            if(rand <= acc){
                addVaraToInventory(item.name);
                alert(`🎉 Parabéns! Você recebeu a vara: ${item.name}`);
                break;
            }
        }
        updateWalletUI();
    }
});

// ===== VARA ATIVA =====
function updateVaraInfo(){
    const vara = getCurrentVara();
    if(!vara) {
        document.getElementById("currentVara").innerText = "Nenhuma vara ativa";
        document.getElementById("varaStats").innerText = "";
        return;
    }
    const baseChance = varas[vara.name][0].chance;
    const chanceBonus = (vara.level-1)*(3+Math.random()*2);
    const chance = baseChance + chanceBonus;
    document.getElementById("currentVara").innerText = `${vara.name} (Nível ${vara.level})`;
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    const maxIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
    const minIdx = Math.max(0, maxIdx-1);
    const allowedFishes = fishes.filter(f => {
        const idx = rarities.indexOf(f.rarity);
        return idx<=maxIdx && idx>=minIdx;
    });
    const fishNames = allowedFishes.map(f=>f.name).join(", ");
    document.getElementById("varaStats").innerText = `Chance de captura: ${chance.toFixed(1)}% | Lucro atual: ${vara.profit.toFixed(1)}%\nPeixes que pode pegar: ${fishNames}`;
}

// ===== UPGRADE =====
function updateUpgrade(){
    const upgradeDiv = document.getElementById("upgrade");
    upgradeDiv.innerHTML = "";
    document.getElementById("xpReservoir").innerText = xpReservoir;
}

updateBolsa();
updateVaraInfo();
updateWalletUI();
});
</script>
</body>
</html>
