<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { cursor:pointer; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }

#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:14px; border-radius:10px 10px 0 0; }
#bottomMenu button { flex:1; margin:0 5px; padding:10px 0; font-size:14px; border:none; border-radius:10px; background:#00aaff; color:white; }
.selected { background-color:#ffcc00 !important; color:black !important; }

.bolsa-top, .bolsa-bottom {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#bolsaMenu, #bolsaVaras {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
}

.bag-item {
  background:#00aaff;
  color:white;
  border:none;
  border-radius:5px;
  padding:5px 8px;
}

.shop-top, .shop-bottom, .shop-buy {
  border:1px solid #004466;
  padding:10px;
  border-radius:10px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#shopMenu {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

.box-card {
  width:90px;
  height:90px;
  border-radius:10px;
  background:linear-gradient(145deg,#00aaff,#0077aa);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 3px 6px rgba(0,0,0,0.3);
}

.box-card:hover { transform:scale(1.05); }
.box-selected { border:3px solid gold; }

.walletBtn {
  padding:10px;
  border-radius:8px;
  border:none;
  background:#00aaff;
  color:white;
  font-size:14px;
  cursor:pointer;
}
.walletBtn:hover { background:#0077aa; }

</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>
<h3 id="saldo">Saldo SFP: 0</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>

  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div class="bolsa-top"><div id="bolsaMenu"></div></div>
    <div class="bolsa-bottom"><div id="bolsaVaras"></div></div>
  </div>
</div>

<!-- SHOP -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div class="shop-top"><div id="shopMenu"></div></div>
  <div class="shop-bottom" id="shopContent">Selecione uma box</div>
  <div class="shop-buy"><button id="buyBox">Comprar Box</button></div>
</div>

<!-- CARTEIRA -->
<div id="walletSection" class="section">
  <h3>💼 Carteira</h3>
  <div id="walletContent" style="display:flex; flex-direction:column; gap:10px; width:90%; max-width:400px; margin:0 auto;">
    <button class="walletBtn" id="connectWallet">Conectar carteira Telegram</button>
    <button class="walletBtn" id="depositSFP">Depositar SFP</button>
    <button class="walletBtn" id="withdrawSFP">Retirar SFP</button>
  </div>
</div>

<!-- MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="walletSection">💼 Carteira</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let saldo = 0;

// ===== VARAS E PEIXES =====
const raridades = ["Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let selectedRarity = "Vara Free";

let bolsa = [
  {name:"Bambu", fishes:["Sardinha"], fishValues:[0.06], rarity:"Vara Free"}
];

let boxes = [
  {rarity:"Comum", price:50, varas:["Fibra"], fishes:["Tilápia","Bagre","Carpa"], fishValues:[0.083,0.111,0.167]},
  {rarity:"Incomum", price:100, varas:["Grafite"], fishes:["Pargo","Dourado","Pescada"], fishValues:[0.167,0.222,0.333]},
  {rarity:"Rara", price:150, varas:["Carbono"], fishes:["Robalo","Anchova","Garoupa"], fishValues:[0.25,0.333,0.5]},
  {rarity:"Épica", price:200, varas:["Titânio"], fishes:["Atum","Dourado do Mar","Peixe-espada"], fishValues:[0.333,0.444,0.667]},
  {rarity:"Lendária", price:250, varas:["Platina"], fishes:["Tubarão Branco","Mero Gigante"], fishValues:[0.417,0.556]},
  {rarity:"Mítica", price:300, varas:["Adamantium"], fishes:["Tubarão Tigre","Tubarão Mako"], fishValues:[0.5,0.667]}
];

let currentVaraIndex = 0;
function getCurrentVara(){ return bolsa[currentVaraIndex]; }
function setActiveVara(idx){ currentVaraIndex = idx; updateBolsaVaras(); updateVaraInfo(); }

// ===== BOLSA =====
function updateBolsaMenu(){
  const menu = document.getElementById("bolsaMenu");
  menu.innerHTML = "";

  // Aba "Vara Free" fixa
  const freeBtn = document.createElement("button");
  freeBtn.innerText = "Vara Free";
  freeBtn.className = "bag-item";
  freeBtn.onclick = ()=>{
    selectedRarity = "Vara Free"; updateBolsaMenu(); updateBolsaVaras();
  };
  menu.appendChild(freeBtn);

  raridades.forEach(r=>{
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.className = "bag-item";
    btn.onclick = ()=>{
      selectedRarity = r; updateBolsaMenu(); updateBolsaVaras();
    };
    menu.appendChild(btn);
  });
}

function updateBolsaVaras(){
  const div = document.getElementById("bolsaVaras");
  div.innerHTML = "";
  bolsa.forEach((v, idx)=>{
    if((v.rarity === selectedRarity) || (selectedRarity==="Vara Free" && v.name==="Bambu")){
      const btn = document.createElement("button");
      btn.innerText = v.name;
      btn.className = "bag-item";
      btn.onclick = ()=> setActiveVara(idx);
      div.appendChild(btn);
    }
  });
}

// ===== VARA INFO =====
function updateVaraInfo(){
  const vara = getCurrentVara();
  if(!vara) return;
}

// ===== PESCA =====
function fishAction(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  const idx = Math.floor(Math.random()*vara.fishes.length);
  const peixe = {name:vara.fishes[idx], value:vara.fishValues[idx]};
  saldo += peixe.value;
  updateSaldo();
  alert(`🎉 Você pescou: ${peixe.name} | Valor: ${peixe.value.toFixed(3)} SFP`);
  dailyCount++;
  document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/15`;
  skipButton.style.display = "none";
  fishButton.disabled = false;
  result.innerText = "Clique em pescar";
}

const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");
fishButton.onclick = function(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  fishButton.disabled = true;
  result.innerText = "Esperando...";
  skipButton.style.display = "inline-block";
  fishingTimeout = setTimeout(fishAction, 5000);
};
skipButton.onclick = function(){ clearTimeout(fishingTimeout); fishAction(); };

// ===== SHOP =====
let selectedShop = null;
function updateShopMenu(){
  const menu = document.getElementById("shopMenu");
  menu.innerHTML = "";
  boxes.forEach(box=>{
    const card = document.createElement("div");
    card.className = "box-card";
    card.innerText = "Box " + box.rarity;
    if(selectedShop === box) card.classList.add("box-selected");
    card.onclick = ()=>{
      selectedShop = box; updateShopMenu(); updateShopContent();
    };
    menu.appendChild(card);
  });
}
function updateShopContent(){
  const content = document.getElementById("shopContent");
  if(!selectedShop){ content.innerText="Selecione uma box"; return; }
  content.innerText = `Varas: ${selectedShop.varas.join(", ")}\nDrop: 80/20\nPreço: ${selectedShop.price} SFP`;
}
document.getElementById("buyBox").onclick = function(){
  if(!selectedShop){ alert("Selecione uma box primeiro"); return; }
  if(saldo < selectedShop.price){ alert("Saldo insuficiente"); return; }
  saldo -= selectedShop.price;
  const dropRnd = Math.random()*100;
  const varaRecebida = dropRnd <= 80 ? selectedShop.varas[0] : selectedShop.varas[0]; // só 1 por simplificação
  bolsa.push({name:varaRecebida, fishes:selectedShop.fishes, fishValues:selectedShop.fishValues, rarity:selectedShop.rarity});
  alert(`🎉 Parabéns! Você ganhou a vara ${varaRecebida}`);
};

// ===== CARTEIRA =====
const connectBtn = document.getElementById("connectWallet");
const depositBtn = document.getElementById("depositSFP");
const withdrawBtn = document.getElementById("withdrawSFP");

connectBtn.onclick = () => {
  if(!window.Telegram.WebApp){ alert("Abra o jogo dentro do Telegram!"); return; }
  const tg = window.Telegram.WebApp;
  tg.sendData(JSON.stringify({action:"connect_wallet"}));
  alert("Solicitação de conexão enviada!");
};

depositBtn.onclick = () => {
  const valor = parseFloat(prompt("Digite a quantidade de SFP para depositar:"));
  if(isNaN(valor) || valor<=0){ alert("Valor inválido"); return; }
  saldo += valor; updateSaldo();
  alert(`✅ Depósito de ${valor.toFixed(3)} SFP realizado!`);
};
withdrawBtn.onclick = () => {
  const valor = parseFloat(prompt("Digite a quantidade de SFP para retirar:"));
  if(isNaN(valor) || valor<=0){ alert("Valor inválido"); return; }
  if(valor>saldo){ alert("Saldo insuficiente"); return; }
  saldo -= valor; updateSaldo();
  alert(`✅ Retirada de ${valor.toFixed(3)} SFP realizada!`);
};

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  };
});

// ===== INIT =====
updateBolsaMenu();
updateBolsaVaras();
updateShopMenu();
updateShopContent();
updateSaldo();

function updateSaldo(){ document.getElementById("saldo").innerText = `Saldo SFP: ${saldo.toFixed(3)}`; }

</script>
</body>
</html>
