<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #upgrades, #shop { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.varaCard { display:flex; justify-content:space-between; margin:5px 0; }
.varaCard button { margin-left:5px; flex:1; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<!-- Seções -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara atual: <span id="currentVara">Vara de Bambu (Nível 1)</span></p>
</div>

<div id="inventorySection" class="section">
  <h3>Inventário</h3>
  <div id="inventory"></div>
</div>

<div id="upgradesSection" class="section">
  <h3>Upgrades</h3>
  <div id="upgrades"></div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="box1">📦 Box Comum</button>
    <button id="box2">📦 Box Rara</button>
    <button id="box3">📦 Box Épica</button>
    <button id="box4">📦 Box Lendária</button>
  </div>
</div>

<!-- Menu inferior -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="inventorySection">🎒 Inventário</button>
  <button class="tabButton" data-target="upgradesSection">⚒️ Upgrades</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999
let fishingTimeout = null

const varas = {
  "Bambu":[{level:1, chance:50,maxRarity:"Muito Comum"},{level:2, chance:40,maxRarity:"Muito Comum"},{level:3, chance:30,maxRarity:"Muito Comum"},{level:4, chance:20,maxRarity:"Muito Comum"},{level:5, chance:10,maxRarity:"Muito Comum"}],
  "Fibra":[{level:1, chance:50,maxRarity:"Comum"},{level:2, chance:40,maxRarity:"Comum"},{level:3, chance:30,maxRarity:"Comum"},{level:4, chance:20,maxRarity:"Comum"},{level:5, chance:10,maxRarity:"Comum"}],
  "Grafite":[{level:1, chance:50,maxRarity:"Incomum"},{level:2, chance:40,maxRarity:"Incomum"},{level:3, chance:30,maxRarity:"Incomum"},{level:4, chance:20,maxRarity:"Incomum"},{level:5, chance:10,maxRarity:"Incomum"}],
  "Carbono":[{level:1, chance:50,maxRarity:"Raro"},{level:2, chance:40,maxRarity:"Raro"},{level:3, chance:30,maxRarity:"Raro"},{level:4, chance:20,maxRarity:"Raro"},{level:5, chance:10,maxRarity:"Raro"}],
  "Titânio":[{level:1, chance:50,maxRarity:"Épico"},{level:2, chance:40,maxRarity:"Épico"},{level:3, chance:30,maxRarity:"Épico"},{level:4, chance:20,maxRarity:"Épico"},{level:5, chance:10,maxRarity:"Épico"}],
  "Platina":[{level:1, chance:50,maxRarity:"Lendário"},{level:2, chance:40,maxRarity:"Lendário"},{level:3, chance:30,maxRarity:"Lendário"},{level:4, chance:20,maxRarity:"Lendário"},{level:5, chance:10,maxRarity:"Lendário"}],
  "Adamantium":[{level:1, chance:50,maxRarity:"Mítico"},{level:2, chance:40,maxRarity:"Mítico"},{level:3, chance:30,maxRarity:"Mítico"},{level:4, chance:20,maxRarity:"Mítico"},{level:5, chance:10,maxRarity:"Mítico"}]
};

const fishes=[
{name:"Sardinha",value:1,rarity:"Muito Comum",time:3000},
{name:"Robalo",value:2,rarity:"Comum",time:4000},
{name:"Atum",value:5,rarity:"Incomum",time:5000},
{name:"Garoupa adulta",value:10,rarity:"Raro",time:7000},
{name:"Salmão do Atlântico",value:18,rarity:"Épico",time:9000},
{name:"Peixe-espada",value:30,rarity:"Lendário",time:12000},
{name:"Tubarão-branco adulto",value:60,rarity:"Mítico",time:15000}
];

let inventory=[{name:"Bambu",level:1}]
let currentVaraIndex=0

function rarityClass(r){switch(r){case"Muito Comum":return"fish-muito-comum";case"Comum":return"fish-comum";case"Incomum":return"fish-incomum";case"Raro":return"fish-raro";case"Épico":return"fish-epico";case"Lendário":return"fish-lendario";case"Mítico":return"fish-mitico";default:return"";}}

function getCurrentVara(){return inventory[currentVaraIndex]}

function getRandomFishByVara(vara){
  const allowed=fishes.filter(f=>{
    const rarities=["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"]
    return rarities.indexOf(f.rarity)<=rarities.indexOf(varas[vara.name][vara.level-1].maxRarity)
  })
  return allowed[Math.floor(Math.random()*allowed.length)]
}

// Atualiza inventário
function updateInventoryDisplay(){
  const invDiv=document.getElementById("inventory")
  invDiv.innerHTML=""
  inventory.forEach((v,i)=>{
    const card=document.createElement("div")
    card.className="varaCard"
    const span=document.createElement("span")
    span.innerText=`${v.name} (Nível ${v.level})`
    const selectBtn=document.createElement("button")
    selectBtn.innerText="Selecionar"
    selectBtn.onclick=function(){currentVaraIndex=i;updateInventoryDisplay();document.getElementById("currentVara").innerText=`${v.name} (Nível ${v.level})`}
    card.appendChild(span)
    card.appendChild(selectBtn)
    invDiv.appendChild(card)
  })
  updateUpgradesDisplay()
}

// Upgrades
function updateUpgradesDisplay(){
  const upDiv=document.getElementById("upgrades")
  upDiv.innerHTML=""
  inventory.forEach((v,i)=>{
    const sameVaraIndex=inventory.findIndex((item,j)=>j!==i && item.name===v.name && item.level===v.level)
    if(sameVaraIndex!==-1 && v.level<5){
      const card=document.createElement("div")
      card.className="varaCard"
      const span=document.createElement("span")
      span.innerText=`${v.name} (Nível ${v.level})`
      const upBtn=document.createElement("button")
      upBtn.innerText="Upgrade"
      upBtn.onclick=function(){
        inventory.splice(sameVaraIndex,1)
        v.level++
        updateInventoryDisplay()
        alert("Upgrade realizado!")
      }
      card.appendChild(span)
      card.appendChild(upBtn)
      upDiv.appendChild(card)
    }
  })
}

// Box system
const boxDrops={"box1":["Fibra","Grafite"],"box2":["Fibra","Grafite","Carbono"],"box3":["Grafite","Carbono","Titânio"],"box4":["Carbono","Titânio","Platina"]}

function openBox(box){
  const options=boxDrops[box]
  const selected=options[Math.floor(Math.random()*options.length)]
  inventory.push({name:selected,level:1})
  currentVaraIndex=inventory.length-1
  updateInventoryDisplay()
  alert(`Você ganhou: ${selected} (Nível 1)`)
}

document.getElementById("box1").onclick=()=>openBox("box1")
document.getElementById("box2").onclick=()=>openBox("box2")
document.getElementById("box3").onclick=()=>openBox("box3")
document.getElementById("box4").onclick=()=>openBox("box4")

// Pescar
const fishButton=document.getElementById("fishButton")
const skipButton=document.getElementById("skipButton")
const result=document.getElementById("result")

fishButton.onclick=function(){
  fishButton.disabled=true
  skipButton.style.display="inline-block"
  const vara=getCurrentVara()
  const fish=getRandomFishByVara(vara)
  result.innerText="Esperando o peixe morder a isca..."
  fishingTimeout=setTimeout(()=>{
    if(Math.random()*100<varas[vara.name][vara.level-1].chance){
      alert("O peixe escapou! 😢")
    } else {
      money+=fish.value
      document.getElementById("money").innerText="Saldo: "+money
      result.innerHTML=`Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    }
    fishButton.disabled=false
    skipButton.style.display="none"
  },fish.time)
}

skipButton.onclick=function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout)
    fishingTimeout=null
    const vara=getCurrentVara()
    const fish=getRandomFishByVara(vara)
    if(Math.random()*100<varas[vara.name][vara.level-1].chance){
      alert("O peixe escapou! 😢")
    } else {
      money+=fish.value
      document.getElementById("money").innerText="Saldo: "+money
      result.innerHTML=`Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    }
    fishButton.disabled=false
    skipButton.style.display="none"
  }
}

// Abas
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick=function(){
    const target=this.dataset.target
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"))
    document.getElementById(target).classList.add("active")
  }
})

updateInventoryDisplay()
document.getElementById("currentVara").innerText=`${getCurrentVara().name} (Nível ${getCurrentVara().level})`

})
</script>
</body>
</html>
