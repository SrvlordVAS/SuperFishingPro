<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.submenu { margin-left:5px; display:none; }
.submenu button { margin:2px 0; width:100%; text-align:left; font-size:13px; }
.bag-header { cursor:pointer; background:#0088cc; padding:3px; border-radius:3px; margin:2px 0; color:white; font-size:13px; }
input[type=number]{width:60px; padding:3px; font-size:12px; margin:2px;}
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara ativa: <span id="currentVara">Bambu (Nível 1)</span></p>
  <p id="chanceInfo">Chance de falha: 50% | Bônus no peixe: 0%</p>
  <div id="bolsaContainer">
    <h4>Bolsa de varas:</h4>
    <div id="bolsa"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (81 SUN)</button>
    <button id="boxRara">📦 Box Rara (135 SUN)</button>
    <button id="boxEpica">📦 Box Épica (162 SUN)</button>
    <button id="boxLendaria">📦 Box Lendária (189 SUN)</button>
  </div>
</div>

<!-- UPGRADE -->
<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgrade"></div>
</div>

<!-- CARTEIRA -->
<div id="walletSection" class="section">
  <h3>💰 Carteira</h3>
  <p id="walletSun">Saldo SUN: 0</p>
  <p id="walletTon">Saldo TON: 0</p>

  <div style="margin-top:10px;">
    <label>Depositar TON:</label><br>
    <input type="number" id="depositInput" placeholder="0" min="0" step="0.01">
    <button id="depositBtn">💸 Depositar</button>
  </div>

  <div style="margin-top:10px;">
    <label>Sacar TON:</label><br>
    <input type="number" id="withdrawInput" placeholder="0" min="0" step="0.01">
    <button id="withdrawBtn">🏧 Retirar</button>
  </div>

  <div style="margin-top:10px;">
    <label>Trocar SUN → TON:</label><br>
    <input type="number" id="sunToTonInput" placeholder="0" min="0" step="0.01">
    <button id="sunToTonBtn">🔄 Trocar</button>
  </div>

  <div style="margin-top:10px;">
    <label>Trocar TON → SUN:</label><br>
    <input type="number" id="tonToSunInput" placeholder="0" min="0" step="0.01">
    <button id="tonToSunBtn">🔄 Trocar</button>
  </div>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
  <button class="tabButton" data-target="walletSection">💳 Carteira</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 500;
let tonBalance = 0;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;

const varas = {
  "Bambu":[{level:1, chance:50, maxRarity:"Muito Comum"}],
  "Fibra":[{level:1, chance:50, maxRarity:"Comum"}],
  "Grafite":[{level:1, chance:50, maxRarity:"Incomum"}],
  "Carbono":[{level:1, chance:50, maxRarity:"Raro"}],
  "Titânio":[{level:1, chance:50, maxRarity:"Épico"}],
  "Platina":[{level:1, chance:50, maxRarity:"Lendário"}],
  "Adamantium":[{level:1, chance:50, maxRarity:"Mítico"}]
};

const fishes = [
  {name:"Sardinha", value:0.005, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:0.01, rarity:"Comum", time:4000},
  {name:"Tainha", value:0.02, rarity:"Comum", time:4500},
  {name:"Corvina", value:0.03, rarity:"Comum", time:5000},
  {name:"Atum", value:0.04, rarity:"Incomum", time:5000},
  {name:"Garoupa pequena", value:0.05, rarity:"Incomum", time:6000},
  {name:"Pargo", value:0.06, rarity:"Incomum", time:6500},
  {name:"Garoupa adulta", value:0.07, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:0.08, rarity:"Épico", time:9000},
  {name:"Truta", value:0.09, rarity:"Épico", time:9500},
  {name:"Tubarão", value:0.10, rarity:"Lendário", time:12000},
  {name:"Marlim Azul", value:0.11, rarity:"Mítico", time:15000}
];

let inventory = [{name:"Bambu", level:1}];
let bolsa = [];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const bonus = (vara.level-1)*0.1;
  const allowed = fishes.filter(f => {
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    return rarities.indexOf(f.rarity) <= rarities.indexOf(varas[vara.name][0].maxRarity);
  });
  const fish = allowed[Math.floor(Math.random()*allowed.length)];
  fish.value = fish.value*(1+bonus);
  return fish;
}

// ===== BOLSA INTERATIVA =====
function updateBolsa(){
  const bolsaDiv = document.getElementById("bolsa");
  bolsaDiv.innerHTML = "";
  if(bolsa.length===0){ 
    bolsaDiv.innerText="Sua bolsa está vazia."; 
    return; 
  }
  
  const summary = {};
  bolsa.forEach(v=>{
    const key = v.name+" Nível "+v.level;
    summary[key] = summary[key]?summary[key]+1:1;
  });

  for(const k in summary){
    const div = document.createElement("div");
    div.innerText = `${k} x${summary[k]}`;
    div.style.cursor = "pointer";
    div.style.background = "#aee1f7";
    div.style.padding = "3px";
    div.style.margin = "2px 0";
    div.style.borderRadius = "3px";

    div.onclick = ()=>{
      const parts = k.split(" Nível ");
      const name = parts[0];
      const level = parseInt(parts[1]);
      if(confirm(`Deseja mover ${k} para a sua vara ativa?`)){
        // Remove uma vara da bolsa
        let removed = false;
        bolsa = bolsa.filter(b=>{
          if(!removed && b.name===name && b.level===level){ removed=true; return false; }
          return true;
        });
        inventory[currentVaraIndex] = {name:name, level:level};
        updateBolsa();
        updateVaraInfo();
      }
    };

    bolsaDiv.appendChild(div);
  }
}

// ===== VARA ATIVA INFO =====
function updateVaraInfo(){
  const vara = getCurrentVara();
  document.getElementById("currentVara").innerText = `${vara.name} (Nível ${vara.level})`;
  document.getElementById("chanceInfo").innerText = `Chance de falha: ${varas[vara.name][0].chance}% | Bônus no peixe: ${(vara.level-1)*10}%`;
}

// ===== UPGRADE ANTIGO =====
function tryUpgrade(varaName, level){
  const count = bolsa.filter(v=>v.name===varaName && v.level===level).length;
  if(count<2){ alert("Você precisa de 2 varas iguais para tentar o upgrade!"); return; }
  
  if(confirm(`Deseja tentar upar 2 varas ${varaName} Nível ${level}?`)){
    let removed = 0;
    bolsa = bolsa.filter(v=>{
      if(removed<2 && v.name===varaName && v.level===level){ removed++; return false; }
      return true;
    });

    const chance = 50;
    if(Math.random()*100 < chance){
      inventory.push({name:varaName, level:level+1});
      alert(`Sucesso! Você conseguiu upar a vara para Nível ${level+1}`);
    } else {
      alert("Falhou! As varas foram perdidas.");
    }
    updateBolsa();
    updateUpgrade();
    updateVaraInfo();
  }
}

function updateUpgrade(){
  const upgradeDiv = document.getElementById("upgrade");
  upgradeDiv.innerHTML = "";
  const unique = {};
  bolsa.forEach(v=>{
    const key = v.name+" Nível "+v.level;
    unique[key] = unique[key]?unique[key]+1:1;
  });
  
  for(const k in unique){
    if(unique[k]>=2){
      const btn = document.createElement("button");
      btn.innerText = `Tentar upar ${k} (${unique[k]} disponíveis)`;
      btn.onclick = ()=>{
        const parts = k.split(" Nível ");
        tryUpgrade(parts[0], parseInt(parts[1]));
      };
      upgradeDiv.appendChild(btn);
    }
  }
}

// ===== BOX =====
const boxTypes = ["Comum","Rara","Epica","Lendaria"];
const boxCosts = {"Comum":81,"Rara":135,"Epica":162,"Lendaria":189};
const boxChances = {
  "Comum":[ {name:"Fibra", chance:60},{name:"Grafite", chance:25},{name:"Carbono", chance:10},{name:"Titânio", chance:4},{name:"Platina", chance:1},{name:"Adamantium", chance:0} ],
  "Rara":[ {name:"Fibra", chance:30},{name:"Grafite", chance:35},{name:"Carbono", chance:20},{name:"Titânio", chance:10},{name:"Platina", chance:4},{name:"Adamantium", chance:1} ],
  "Epica":[ {name:"Fibra", chance:15},{name:"Grafite", chance:20},{name:"Carbono", chance:25},{name:"Titânio", chance:20},{name:"Platina", chance:15},{name:"Adamantium", chance:5} ],
  "Lendaria":[ {name:"Fibra", chance:5},{name:"Grafite", chance:10},{name:"Carbono", chance:20},{name:"Titânio", chance:25},{name:"Platina", chance:25},{name:"Adamantium", chance:15} ]
};

boxTypes.forEach(type=>{
  document.getElementById("box"+type).onclick = ()=>{
    if(sunBalance < boxCosts[type]){ alert("Saldo SUN insuficiente!"); return; }
    
    let message = `Abrir Box ${type} (custo ${boxCosts[type]} SUN)?\n\nChances de receber:`;
    boxChances[type].forEach(v=>message+=`\n${v.name}: ${v.chance}%`);
    
    if(confirm(message)){
      sunBalance -= boxCosts[type];
      const rand = Math.random()*100;
      let acc=0;
      let chosen=null;
      for(const item of boxChances[type]){
        acc += item.chance;
        if(rand <= acc){ chosen=item.name; break; }
      }
      if(chosen) bolsa.push({name:chosen, level:1});
      updateWalletUI();
      updateBolsa();
      alert(`Você recebeu: ${chosen}`);
    }
  };
});

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = function(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido! Volte amanhã."); return; }
  fishButton.disabled = true;
  skipButton.style.display = "inline-block";
  const vara = getCurrentVara();
  const fish = getRandomFishByVara(vara);
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    if(Math.random()*100 < varas[vara.name][0].chance){ alert("O peixe escapou! 😢"); }
    else { sunBalance += fish.value; updateWalletUI(); alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`); }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }, fish.time);
};

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout);
    fishingTimeout = null;
    const vara = getCurrentVara();
    const fish = getRandomFishByVara(vara);
    if(Math.random()*100 < varas[vara.name][0].chance){ alert("O peixe escapou! 😢"); }
    else { sunBalance += fish.value; updateWalletUI(); alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`); }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }
};

// ===== WALLET =====
function updateWalletUI(){
  document.getElementById("money").innerText = `Saldo SUN: ${sunBalance.toFixed(3)}`;
  document.getElementById("walletSun").innerText = `Saldo SUN: ${sunBalance.toFixed(3)}`;
  document.getElementById("walletTon").innerText = `Saldo TON: ${tonBalance.toFixed(3)}`;
}

document.getElementById("depositBtn").onclick = ()=>{
  const val = parseFloat(document.getElementById("depositInput").value);
  if(isNaN(val) || val<=0){ alert("Valor inválido"); return; }
  tonBalance += val;
  updateWalletUI();
  alert(`Você depositou ${val.toFixed(3)} TON`);
};

document.getElementById("withdrawBtn").onclick = ()=>{
  const val = parseFloat(document.getElementById("withdrawInput").value);
  if(isNaN(val) || val<=0){ alert("Valor inválido"); return; }
  if(val>tonBalance){ alert("Saldo TON insuficiente"); return; }
  tonBalance -= val;
  updateWalletUI();
  alert(`Você retirou ${val.toFixed(3)} TON`);
};

// SUN → TON (25 SUN = 1 TON)
document.getElementById("sunToTonBtn").onclick = ()=>{
  const val = parseFloat(document.getElementById("sunToTonInput").value);
  if(isNaN(val) || val<=0){ alert("Valor inválido"); return; }
  if(val>sunBalance){ alert("Saldo SUN insuficiente"); return; }
  sunBalance -= val;
  tonBalance += val / 25;
  updateWalletUI();
  alert(`Você trocou ${val.toFixed(3)} SUN por ${(val/25).toFixed(3)} TON`);
};

// TON → SUN (1 TON = 20 SUN)
document.getElementById("tonToSunBtn").onclick = ()=>{
  const val = parseFloat(document.getElementById("tonToSunInput").value);
  if(isNaN(val) || val<=0){ alert("Valor inválido"); return; }
  if(val>tonBalance){ alert("Saldo TON insuficiente"); return; }
  tonBalance -= val;
  sunBalance += val * 20;
  updateWalletUI();
  alert(`Você trocou ${val.toFixed(3)} TON por ${(val*20).toFixed(3)} SUN`);
};

// ===== TABS =====
const tabs = document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    tabs.forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// Inicializa
updateBolsa();
updateVaraInfo();
updateWalletUI();
updateUpgrade();

});
</script>
</body>
</html>
