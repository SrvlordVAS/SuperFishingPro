<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; display:flex; flex-wrap:wrap; gap:5px; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SFP2: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (50 SFP2)</button>
    <button id="boxIncomum">📦 Box Incomum (100 SFP2)</button>
    <button id="boxRara">📦 Box Rara (150 SFP2)</button>
    <button id="boxEpica">📦 Box Épica (200 SFP2)</button>
    <button id="boxLendaria">📦 Box Lendária (250 SFP2)</button>
    <button id="boxMitica">📦 Box Mítica (300 SFP2)</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 100000;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;

// ===== VARAS =====
const varas = {
  "Bambu":[{level:1, chance:50, maxRarity:"Muito Comum", baseProfit:0.08, canUpgrade:false}],
  "Fibra":[{level:1, chance:50, maxRarity:"Comum", baseProfit:5, canUpgrade:false}],
  "Fibra Reforçada":[{level:1, chance:50, maxRarity:"Comum", baseProfit:6.25, canUpgrade:false}],
  "Grafite":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:10, canUpgrade:false}],
  "Grafite Reforçada":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:12.5, canUpgrade:false}],
  "Carbono":[{level:1, chance:50, maxRarity:"Raro", baseProfit:15, canUpgrade:false}],
  "Carbono Reforçada":[{level:1, chance:50, maxRarity:"Raro", baseProfit:18.75, canUpgrade:false}],
  "Titânio":[{level:1, chance:50, maxRarity:"Épico", baseProfit:20, canUpgrade:false}],
  "Titânio Reforçada":[{level:1, chance:50, maxRarity:"Épico", baseProfit:25, canUpgrade:false}],
  "Platina":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:25, canUpgrade:false}],
  "Platina Reforçada":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:31.25, canUpgrade:false}],
  "Adamantium":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:30, canUpgrade:false}],
  "Adamantium Reforçada":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:37.5, canUpgrade:false}]
};

// ===== PEIXES =====
let fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum"},
  {name:"Robalo", value:1, rarity:"Comum"},
  {name:"Tainha", value:1, rarity:"Comum"},
  {name:"Corvina", value:1, rarity:"Comum"},
  {name:"Atum", value:1, rarity:"Incomum"},
  {name:"Garoupa pequena", value:1, rarity:"Incomum"},
  {name:"Pargo", value:1, rarity:"Incomum"},
  {name:"Garoupa adulta", value:1, rarity:"Raro"},
  {name:"Salmão do Atlântico", value:1, rarity:"Épico"},
  {name:"Truta", value:1, rarity:"Épico"},
  {name:"Tubarão", value:1, rarity:"Lendário"},
  {name:"Marlim Azul", value:1, rarity:"Mítico"}
];

let inventory = [{name:"Bambu", level:1, profit:0.08}];
let bolsa = [...inventory];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  let maxRarityIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
  let minRarityIdx = Math.max(0, maxRarityIdx-1);
  const allowed = fishes.filter(f => {
    const idx = rarities.indexOf(f.rarity);
    return idx <= maxRarityIdx && idx >= minRarityIdx;
  });
  const fish = allowed[Math.floor(Math.random()*allowed.length)];
  const chance = varas[vara.name][0].chance + (vara.level-1)*(3+Math.random()*2);
  if(Math.random()*100 <= chance) return fish;
  else return null;
}

function setActiveVara(idx){
    currentVaraIndex = idx;
    updateBolsa();
}

function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    bolsa.forEach((v, idx) => {
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = v.name;
        btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
        btn.onclick = () => setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

function fishAction(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }
  fishButton.disabled = true; skipButton.disabled = true;
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    captureFish(vara);
  },5000);
}

function captureFish(vara){
  const fish = getRandomFishByVara(vara);
  if(fish){
      sunBalance += fish.value * (vara.profit/100);
      alert(`Você pescou: ${fish.name} e ganhou ${(fish.value*(vara.profit/100)).toFixed(3)} SFP2`);
  } else {
      alert(`O peixe escapou!`);
  }
  dailyCount++;
  document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
  updateWalletUI();
  fishButton.disabled = false; skipButton.disabled = false;
}

const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = fishAction;
skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout);
    captureFish(getCurrentVara());
  }
};

// ===== BOXES =====
const boxTypes = ["Comum","Incomum","Rara","Epica","Lendaria","Mitica"];
const boxCosts = {"Comum":50,"Incomum":100,"Rara":150,"Epica":200,"Lendaria":250,"Mitica":300};
const boxChances = {
  "Comum":[ {name:"Fibra", chance:80},{name:"Fibra Reforçada", chance:20} ],
  "Incomum":[ {name:"Grafite", chance:80},{name:"Grafite Reforçada", chance:20} ],
  "Rara":[ {name:"Carbono", chance:80},{name:"Carbono Reforçada", chance:20} ],
  "Epica":[ {name:"Titânio", chance:80},{name:"Titânio Reforçada", chance:20} ],
  "Lendaria":[ {name:"Platina", chance:80},{name:"Platina Reforçada", chance:20} ],
  "Mitica":[ {name:"Adamantium", chance:80},{name:"Adamantium Reforçada", chance:20} ]
};

function addVaraToInventory(varaName){
    const baseProfit = varas[varaName][0].baseProfit;
    const newVara = {name: varaName, level:1, profit: baseProfit};
    inventory.push(newVara);
    bolsa.push(newVara);
    updateBolsa();
}

boxTypes.forEach(type=>{
    document.getElementById("box"+type).onclick = ()=>{
        if(sunBalance < boxCosts[type]){ alert("Saldo insuficiente!"); return; }
        if(!confirm(`Abrir Box ${type} por ${boxCosts[type]} SFP2?`)) return;
        sunBalance -= boxCosts[type];
        let rand = Math.random()*100; let acc=0;
        for(const item of boxChances[type]){
            acc += item.chance;
            if(rand <= acc){ addVaraToInventory(item.name); alert(`Recebeu: ${item.name}`); break; }
        }
        updateWalletUI();
    }
});

function updateWalletUI(){ document.getElementById("money").innerText = `Saldo SFP2: ${sunBalance.toFixed(3)}`; }

// ===== TABS =====
const tabs = document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    tabs.forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// ===== INICIALIZA =====
updateBolsa();
updateWalletUI();

});
</script>
</body>
</html>
