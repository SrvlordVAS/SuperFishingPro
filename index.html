<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag { border:1px solid #004466; border-radius:8px; padding:5px; margin-top:10px; cursor:pointer; background:#b0e0ff; }
.bag.open { background:#90d0ff; }
.bag-content { display:none; margin-top:5px; }
.bag.open .bag-content { display:block; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<!-- Seções -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara ativa: <span id="currentVara">Vara de Bambu (Nível 1)</span></p>
  <div class="bag" id="bagPesca">👜 Bolsa de varas
    <div class="bag-content" id="bagContentPesca"></div>
  </div>
</div>

<div id="aquario" class="section">
  <h3>🐠 Aquário</h3>
  <div id="aquarioContent"></div>
</div>

<div id="shopSection" class="section">
  <h3>🏪 Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum</button>
    <button id="boxRara">📦 Box Rara</button>
    <button id="boxEpica">📦 Box Épica</button>
    <button id="boxLendaria">📦 Box Lendária</button>
  </div>
</div>

<div id="upgradeSection" class="section">
  <h3>⚒ Upgrade de Varas</h3>
  <div id="upgradeContent"></div>
</div>

<!-- Menu inferior -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="aquario">🐠 Aquário</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999;
let fishingTimeout = null;
let inventory = [ {name:"Bambu", level:1} ];
let bag = [];
let aquario = [];
let currentVaraIndex = 0;

// Varas
const varas = {
  "Bambu":[{level:1, chance:50}], "Fibra":[{level:1, chance:50}],
  "Grafite":[{level:1, chance:50}], "Carbono":[{level:1, chance:50}],
  "Titânio":[{level:1, chance:50}], "Platina":[{level:1, chance:50}],
  "Adamantium":[{level:1, chance:50}]
};

// Peixes
const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:2, rarity:"Comum", time:4000},
  {name:"Atum", value:5, rarity:"Incomum", time:5000},
  {name:"Garoupa adulta", value:10, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:18, rarity:"Épico", time:9000},
  {name:"Peixe-espada", value:30, rarity:"Lendário", time:12000},
  {name:"Tubarão-branco adulto", value:60, rarity:"Mítico", time:15000}
];

// Rarity class
function rarityClass(r){ const c={"Muito Comum":"fish-muito-comum","Comum":"fish-comum","Incomum":"fish-incomum","Raro":"fish-raro","Épico":"fish-epico","Lendário":"fish-lendario","Mítico":"fish-mitico"}; return c[r]||""; }

// Vara ativa
function getCurrentVara(){ return inventory[currentVaraIndex]; }

// Pesca
function getRandomFishByVara(vara){
  const allowed = fishes;
  return allowed[Math.floor(Math.random()*allowed.length)];
}

// Atualiza bolsa
function updateBag(){
  const bagContent = document.getElementById("bagContentPesca");
  bagContent.innerHTML = "";
  bag.forEach((v,i)=>{
    const btn = document.createElement("button");
    btn.innerText = `${v.name} (Nível ${v.level})`;
    btn.onclick = function(){
      const temp = getCurrentVara();
      inventory[currentVaraIndex] = v;
      bag[i] = temp;
      updateBag();
      document.getElementById("currentVara").innerText = `${getCurrentVara().name} (Nível ${getCurrentVara().level})`;
    }
    bagContent.appendChild(btn);
  });
}

// Pescar
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = function(){
  fishButton.disabled = true;
  skipButton.style.display = "inline-block";
  const fish = getRandomFishByVara(getCurrentVara());
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    money += fish.value;
    document.getElementById("money").innerText = money;
    result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`;
    aquario.push(fish);
    fishButton.disabled = false;
    skipButton.style.display = "none";
    updateAquario();
  }, fish.time);
}

skipButton.onclick = function(){
  if(fishingTimeout){ clearTimeout(fishingTimeout); fishingTimeout=null; fishButton.disabled=false; skipButton.style.display="none"; }
}

// Atualiza aquário
function updateAquario(){
  const aqu = document.getElementById("aquarioContent");
  aqu.innerHTML = "";
  aquario.forEach(f=>{
    const p = document.createElement("p");
    p.innerHTML = `<span class="${rarityClass(f.rarity)}">${f.name} [${f.rarity}]</span>`;
    aqu.appendChild(p);
  });
}

// Loja: box
document.getElementById("boxComum").onclick = ()=>openBox("Comum");
document.getElementById("boxRara").onclick = ()=>openBox("Rara");
document.getElementById("boxEpica").onclick = ()=>openBox("Epica");
document.getElementById("boxLendaria").onclick = ()=>openBox("Lendaria");

function openBox(type){
  let options = [];
  if(type==="Comum") options=["Fibra","Grafite"];
  if(type==="Rara") options=["Grafite","Carbono"];
  if(type==="Epica") options=["Carbono","Titânio"];
  if(type==="Lendaria") options=["Titânio","Platina"];
  const vname = options[Math.floor(Math.random()*options.length)];
  const newVara = {name:vname, level:1};
  bag.push(newVara);
  updateBag();
  alert(`Você ganhou uma vara: ${vname} (Nível 1)`);
}

// Upgrade
function updateUpgrade(){
  const upgradeDiv = document.getElementById("upgradeContent");
  upgradeDiv.innerHTML = "";
  bag.forEach((v,i)=>{
    if(v.name==="Bambu") return;
    const btn = document.createElement("button");
    btn.innerText = `${v.name} (Nível ${v.level})`;
    btn.onclick = function(){
      const matchIndex = bag.findIndex(x=>x.name===v.name && x.level===v.level && i!==bag.indexOf(x));
      if(matchIndex===-1){ alert("Precisa de outra vara igual para upar!"); return; }
      if(confirm(`Confirmar upgrade da vara ${v.name} nível ${v.level}?`)){
        const newVara = {name:v.name, level:v.level+1};
        bag.splice(matchIndex,1);
        bag.splice(i,1);
        bag.push(newVara);
        updateBag();
        updateUpgrade();
        alert(`Upgrade concluído: ${v.name} nível ${newVara.level}`);
      }
    }
    upgradeDiv.appendChild(btn);
  });
}

// Abas
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick = function(){
    const target = this.dataset.target;
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(target).classList.add("active");
    if(target==="upgradeSection") updateUpgrade();
  }
});

// Bolsa toggle
const bagDiv = document.getElementById("bagPesca");
bagDiv.onclick = function(){ bagDiv.classList.toggle("open"); }

updateBag();
document.getElementById("currentVara").innerText = `${getCurrentVara().name} (Nível ${getCurrentVara().level})`;

});
</script>
</body>
</html>
