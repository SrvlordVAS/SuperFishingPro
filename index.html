<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:8px 10px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:6px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.submenu { margin-left:10px; display:none; }
.submenu button { margin:2px 0; width:100%; text-align:left; font-size:12px; }
.bag-header { cursor:pointer; background:#0088cc; padding:5px; border-radius:5px; margin:3px 0; color:white; font-size:12px; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="sunBalance">SUN: 0</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara ativa: <span id="currentVara">Bambu (Nível 1)</span></p>
  <p id="chanceInfo">Chance de falha: 50% | Bônus no peixe: 0%</p>
  <div id="bolsaContainer">
    <h4>Bolsa de varas:</h4>
    <div id="bolsa"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (81 SUN)</button>
    <button id="boxRara">📦 Box Rara (135 SUN)</button>
    <button id="boxEpica">📦 Box Épica (162 SUN)</button>
    <button id="boxLendaria">📦 Box Lendária (189 SUN)</button>
  </div>
</div>

<!-- UPGRADE -->
<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgrade"></div>
</div>

<!-- CARTEIRA -->
<div id="walletSection" class="section">
  <h3>💰 Carteira</h3>
  <div style="margin-top:10px;">
    <label>Depositar TON → SUN:</label><br>
    <input type="number" id="depositInput" placeholder="0" min="0" step="0.01">
    <button id="depositBtn">💸 Depositar</button>
  </div>
  <div style="margin-top:10px;">
    <label>Trocar SUN ↔ TON:</label><br>
    <input type="number" id="exchangeInput" placeholder="0" min="0" step="0.01">
    <button id="exchangeBtn">🔄 Trocar</button>
  </div>
  <div style="margin-top:10px;">
    <label>Sacar TON:</label><br>
    <input type="number" id="withdrawInput" placeholder="0" min="0" step="0.01">
    <button id="withdrawBtn">🏧 Sacar</button>
  </div>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
  <button class="tabButton" data-target="walletSection">💳 Carteira</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ===== VARIÁVEIS =====
let dailyCount = 0;
const dailyLimit = 15;

// MOEDAS
let sunBalance = 0;
let tonBalance = 0;

// VARAS
const varas = {
  "Bambu":[{level:1, chance:50, maxRarity:"Muito Comum"}],
  "Fibra":[{level:1, chance:50, maxRarity:"Comum"}],
  "Grafite":[{level:1, chance:50, maxRarity:"Incomum"}],
  "Carbono":[{level:1, chance:50, maxRarity:"Raro"}],
  "Titânio":[{level:1, chance:50, maxRarity:"Épico"}],
  "Platina":[{level:1, chance:50, maxRarity:"Lendário"}],
  "Adamantium":[{level:1, chance:50, maxRarity:"Mítico"}]
};

// BOX CHANCES
const boxChances = {
  "Comum":[ {name:"Fibra", chance:60},{name:"Grafite", chance:25},{name:"Carbono", chance:10},{name:"Titânio", chance:4},{name:"Platina", chance:1},{name:"Adamantium", chance:0} ],
  "Rara":[ {name:"Fibra", chance:30},{name:"Grafite", chance:35},{name:"Carbono", chance:20},{name:"Titânio", chance:10},{name:"Platina", chance:4},{name:"Adamantium", chance:1} ],
  "Epica":[ {name:"Fibra", chance:15},{name:"Grafite", chance:20},{name:"Carbono", chance:25},{name:"Titânio", chance:20},{name:"Platina", chance:15},{name:"Adamantium", chance:5} ],
  "Lendaria":[ {name:"Fibra", chance:5},{name:"Grafite", chance:10},{name:"Carbono", chance:20},{name:"Titânio", chance:25},{name:"Platina", chance:25},{name:"Adamantium", chance:15} ]
};

// PEIXES
const fishes = [
  {name:"Sardinha", value:0.005, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:0.01, rarity:"Comum", time:4000},
  {name:"Tainha", value:0.02, rarity:"Comum", time:4500},
  {name:"Corvina", value:0.03, rarity:"Comum", time:5000},
  {name:"Atum", value:0.04, rarity:"Incomum", time:5000},
  {name:"Garoupa pequena", value:0.05, rarity:"Incomum", time:6000},
  {name:"Pargo", value:0.06, rarity:"Incomum", time:6500},
  {name:"Garoupa adulta", value:0.07, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:0.08, rarity:"Épico", time:9000},
  {name:"Truta", value:0.09, rarity:"Épico", time:9500},
  {name:"Tubarão", value:0.10, rarity:"Lendário", time:12000},
  {name:"Marlim Azul", value:0.11, rarity:"Mítico", time:15000}
];

// INVENTÁRIO
let inventory = [{name:"Bambu", level:1}];
let bolsa = [];
let currentVaraIndex = 0;
let fishingTimeout = null;

// ===== FUNÇÕES =====
function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const bonus = (vara.level-1)*0.1;
  const allowed = fishes.filter(f => {
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    return rarities.indexOf(f.rarity) <= rarities.indexOf(varas[vara.name][0].maxRarity);
  });
  const fish = allowed[Math.floor(Math.random()*allowed.length)];
  fish.value = fish.value*(1+bonus);
  return fish;
}

// ===== BOLSA =====
function updateBolsa(){
  const bolsaDiv = document.getElementById("bolsa");
  bolsaDiv.innerHTML = "";
  const raridadeOrdem = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  raridadeOrdem.forEach(rar=>{
    const subset = bolsa.filter(v=>varas[v.name][0].maxRarity===rar);
    if(subset.length>0){
      const header = document.createElement("div");
      header.classList.add("bag-header");
      header.innerText = rar;
      const submenu = document.createElement("div");
      submenu.classList.add("submenu");
      header.onclick = ()=>{ submenu.style.display = submenu.style.display==="none"?"block":"none"; };
      const names = {};
      subset.forEach(v=>{
        const key = v.name+" Nível "+v.level;
        if(!names[key]) names[key]=0;
        names[key]++;
      });
      for(const k in names){
        const btn = document.createElement("button");
        btn.innerText = `${k} x${names[k]}`;
        btn.onclick = ()=>{
          if(confirm(`Deseja tornar ${k} a vara ativa?`)){
            const name = k.split(" Nível ")[0];
            const level = parseInt(k.split(" Nível ")[1]);
            let removed = false;
            bolsa = bolsa.filter(b=>{
              if(!removed && b.name === name && b.level === level){
                removed = true;
                return false;
              }
              return true;
            });
            const currentVara = getCurrentVara();
            bolsa.push({name:currentVara.name, level:currentVara.level});
            inventory.push({name:name, level:level});
            currentVaraIndex = inventory.length - 1;
            updateBolsa();
            updateUpgrade();
            updateVaraInfo();
          }
        };
        submenu.appendChild(btn);
      }
      bolsaDiv.appendChild(header);
      bolsaDiv.appendChild(submenu);
    }
  });
}

// ===== UPGRADE =====
function updateUpgrade(){
  const upgradeDiv = document.getElementById("upgrade");
  upgradeDiv.innerHTML = "";
  const counts = {};
  bolsa.forEach(v=>{
    const key = v.name+"|"+v.level;
    counts[key] = counts[key]?counts[key]+1:1;
  });
  for(const k in counts){
    const [name, level] = k.split("|");
    if(counts[k]>=2 && name!=="Bambu"){
      const btn = document.createElement("button");
      btn.innerText = `${name} (Nível ${level}) → Upgrade`;
      btn.onclick = ()=>{
        if(confirm(`Deseja usar 2 varas ${name} Nível ${level} para criar 1 Nível ${parseInt(level)+1}?`)){
          let removed=0;
          for(let i=bolsa.length-1;i>=0;i--){
            if(bolsa[i].name===name && bolsa[i].level===parseInt(level) && removed<2){
              bolsa.splice(i,1);
              removed++;
            }
          }
          const failChance = parseInt(level)*10;
          if(Math.random()*100 < failChance){
            bolsa.push({name:name, level:parseInt(level)});
            alert("Upgrade falhou! Você perdeu apenas uma vara.");
          } else {
            bolsa.push({name:name, level:parseInt(level)+1});
            alert("Upgrade realizado! Bônus de 10% no valor dos peixes agora.");
          }
          updateBolsa();
          updateUpgrade();
          updateVaraInfo();
        }
      };
      upgradeDiv.appendChild(btn);
    }
  }
}

function updateVaraInfo(){
  const vara = getCurrentVara();
  const bonus = (vara.level-1)*10;
  document.getElementById("currentVara").innerText = `${vara.name} (Nível ${vara.level})`;
  document.getElementById("chanceInfo").innerText = `Chance de falha: ${varas[vara.name][0].chance}% | Bônus no peixe: ${bonus}%`;
}

// ===== BOX =====
function getVarasForBox(type){
  const chances = boxChances[type];
  const rand = Math.random()*100;
  let cumulative = 0;
  for(const v of chances){
    cumulative += v.chance;
    if(rand <= cumulative){
      return {name:v.name, level:1};
    }
  }
  return {name:chances[chances.length-1].name, level:1};
}

document.getElementById("boxComum").onclick = ()=>openBox("Comum",81);
document.getElementById("boxRara").onclick = ()=>openBox("Rara",135);
document.getElementById("boxEpica").onclick = ()=>openBox("Epica",162);
document.getElementById("boxLendaria").onclick = ()=>openBox("Lendaria",189);

function openBox(type, price){
  if(sunBalance < price){ 
    alert("Saldo SUN insuficiente!"); 
    return; 
  }
  let msg = `Você vai abrir a box ${type}.\nPreço: ${price} SUN\nPossíveis varas e suas chances:\n\n`;
  const chances = boxChances[type];
  chances.forEach(v => { msg += `${v.name}: ${v.chance}%\n`; });
  msg += `\nDeseja continuar?`;
  if(confirm(msg)){
    sunBalance -= price;
    updateWalletUI();
    const selected = getVarasForBox(type);
    bolsa.push(selected);
    updateBolsa();
    updateUpgrade();
    alert(`Você ganhou uma vara: ${selected.name} (Nível ${selected.level})`);
  }
}

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = function(){
  if(dailyCount >= dailyLimit){
    alert("Limite diário atingido! Volte amanhã.");
    return;
  }

  fishButton.disabled = true;
  skipButton.style.display = "inline-block";
  const vara = getCurrentVara();
  const fish = getRandomFishByVara(vara);
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    if(Math.random()*100 < varas[vara.name][0].chance){
      alert("O peixe escapou! 😢");
    } else {
      sunBalance += fish.value;
      alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`);
      updateWalletUI();
    }
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }, fish.time);
};

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout);
    fishingTimeout = null;
    const vara = getCurrentVara();
    const fish = getRandomFishByVara(vara);
    if(Math.random()*100 < varas[vara.name][0].chance){
      alert("O peixe escapou! 😢");
    } else {
      sunBalance += fish.value;
      alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`);
      updateWalletUI();
    }
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }
};

// ===== CARTEIRA CONTINUAÇÃO =====
depositBtn.onclick = function(){
  const amt = parseFloat(depositInput.value);
  if(isNaN(amt) || amt <= 0){
    alert("Digite um valor válido!");
    return;
  }
  tonBalance += amt;
  updateWalletUI();
  depositInput.value = "";
};

const exchangeInput = document.getElementById("exchangeInput");
const exchangeBtn = document.getElementById("exchangeBtn");
exchangeBtn.onclick = function(){
  const amt = parseFloat(exchangeInput.value);
  if(isNaN(amt) || amt <= 0){
    alert("Digite um valor válido!");
    return;
  }
  if(amt <= sunBalance){
    sunBalance -= amt;
    tonBalance += amt;
    updateWalletUI();
  } else if(amt <= tonBalance){
    tonBalance -= amt;
    sunBalance += amt;
    updateWalletUI();
  } else {
    alert("Saldo insuficiente!");
  }
  exchangeInput.value = "";
};

const withdrawInput = document.getElementById("withdrawInput");
const withdrawBtn = document.getElementById("withdrawBtn");
withdrawBtn.onclick = function(){
  const amt = parseFloat(withdrawInput.value);
  if(isNaN(amt) || amt <= 0){
    alert("Digite um valor válido!");
    return;
  }
  if(amt > tonBalance){
    alert("Saldo TON insuficiente!");
    return;
  }
  tonBalance -= amt;
  alert(`Você sacou ${amt} TON!`);
  updateWalletUI();
  withdrawInput.value = "";
};

// ===== UPDATE UI =====
function updateWalletUI(){
  document.getElementById("sunBalance").innerText = `SUN: ${sunBalance.toFixed(2)}`;
  document.getElementById("walletSection").querySelector("#walletSun")?.remove();
  const walletSun = document.createElement("p");
  walletSun.id = "walletSun";
  walletSun.innerText = `Saldo SUN: ${sunBalance.toFixed(2)}`;
  document.getElementById("walletSection").prepend(walletSun);

  document.getElementById("walletSection").querySelector("#walletTon")?.remove();
  const walletTon = document.createElement("p");
  walletTon.id = "walletTon";
  walletTon.innerText = `Saldo TON: ${tonBalance.toFixed(2)}`;
  document.getElementById("walletSection").prepend(walletTon);
}

// ===== TAB MENU =====
const tabButtons = document.querySelectorAll(".tabButton");
tabButtons.forEach(btn=>{
  btn.onclick = function(){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    const target = document.getElementById(btn.dataset.target);
    if(target) target.classList.add("active");
    tabButtons.forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");
  };
});

// ===== INIT =====
updateBolsa();
updateUpgrade();
updateVaraInfo();
updateWalletUI();

});
</script>
</body>
</html>
