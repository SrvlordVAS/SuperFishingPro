<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>

<style>

body{
font-family:'Comic Sans MS',Arial;
margin:0;
padding:20px 0 80px 0;
background:linear-gradient(to bottom,#87ceeb,#ffffff);
text-align:center;
}

h1{color:#006994}

#result{
font-size:16px;
margin:15px 0 20px 0;
min-height:30px;
}

button{
background:#00aaff;
color:white;
border:none;
border-radius:5px;
padding:6px 10px;
cursor:pointer;
margin:2px;
}

.section{display:none}
.section.active{display:block}

#inventory,#shop,#upgradeSection,#bolsa{
border:1px solid #004466;
padding:8px;
margin:8px auto;
width:90%;
max-width:400px;
border-radius:5px;
background:#e0f7ff;
text-align:left;
}

#bottomMenu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#00aaff;
display:flex;
}

#bottomMenu button{
flex:1;
}

</style>

</head>
<body>

<h1>🎣 Super Fishing</h1>

<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<div id="pesca" class="section active">

<p id="result">Clique em pescar</p>

<button id="fishButton">🎣 PESCAR</button>
<button id="skipButton" style="display:none;">⏩ Pular espera</button>

<p id="currentVara"></p>
<p id="varaStats"></p>

<div id="bolsa"></div>

</div>

<div id="shopSection" class="section">

<h3>Loja</h3>

<button id="boxComum">📦 Box Comum (81)</button>
<button id="boxRara">📦 Box Rara (135)</button>
<button id="boxEpica">📦 Box Épica (162)</button>
<button id="boxLendaria">📦 Box Lendária (189)</button>
<button id="boxMitica">📦 Box Mítica (243)</button>

</div>

<div id="upgradeSection" class="section">

<h3>Upgrade</h3>
XP disponível: <span id="xpReservoir">0</span>

</div>

<div id="bottomMenu">

<button class="tabButton" data-target="pesca">🎣 Pescar</button>
<button class="tabButton" data-target="shopSection">🏪 Loja</button>
<button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>

</div>

<script>

document.addEventListener("DOMContentLoaded",function(){

let sunBalance=500
let dailyCount=0
let dailyLimit=15

let fishingTimeout=null

const fishes=[

{name:"Sardinha",value:0.0075,rarity:"Muito Comum",time:3000},
{name:"Robalo",value:0.015,rarity:"Comum",time:4000},
{name:"Tainha",value:0.03,rarity:"Comum",time:4500},
{name:"Corvina",value:0.045,rarity:"Comum",time:5000},
{name:"Atum",value:0.06,rarity:"Incomum",time:5000},
{name:"Garoupa pequena",value:0.075,rarity:"Incomum",time:6000},
{name:"Pargo",value:0.09,rarity:"Incomum",time:6500},
{name:"Garoupa adulta",value:0.105,rarity:"Raro",time:7000},
{name:"Salmão",value:0.12,rarity:"Épico",time:9000},
{name:"Truta",value:0.135,rarity:"Épico",time:9500},
{name:"Tubarão",value:0.15,rarity:"Lendário",time:12000},
{name:"Marlim Azul",value:0.165,rarity:"Mítico",time:15000}

]

let inventory=[{name:"Bambu",level:1,xp:0}]
let currentVaraIndex=0

function getCurrentVara(){
return inventory[currentVaraIndex]
}

function updateWalletUI(){
document.getElementById("money").innerText="Saldo SUN: "+sunBalance.toFixed(3)
}

function updateDaily(){
document.getElementById("dailyCount").innerText=
"Tentativas hoje: "+dailyCount+"/15"
}

function updateBolsa(){

const bolsa=document.getElementById("bolsa")
bolsa.innerHTML=""

inventory.forEach((v,i)=>{

const btn=document.createElement("button")
btn.innerText=v.name+" Lv"+v.level

btn.onclick=function(){
currentVaraIndex=i
updateVaraInfo()
}

bolsa.appendChild(btn)

})

}

function updateVaraInfo(){

const vara=getCurrentVara()

document.getElementById("currentVara").innerText=
"Vara ativa: "+vara.name+" (Nv "+vara.level+")"

}

function fish(){

if(dailyCount>=dailyLimit){
document.getElementById("result").innerText="Limite diário atingido"
return
}

const fish=fishes[Math.floor(Math.random()*fishes.length)]

document.getElementById("result").innerText="Pescando..."

document.getElementById("skipButton").style.display="inline-block"

fishingTimeout=setTimeout(()=>{

sunBalance+=fish.value
dailyCount++

updateWalletUI()
updateDaily()

document.getElementById("result").innerText=
"Você pescou "+fish.name+" +" + fish.value + " SUN"

document.getElementById("skipButton").style.display="none"

},fish.time)

}

function skipFishing(){

clearTimeout(fishingTimeout)

const fish=fishes[Math.floor(Math.random()*fishes.length)]

sunBalance+=fish.value
dailyCount++

updateWalletUI()
updateDaily()

document.getElementById("result").innerText=
"⏩ Você pegou "+fish.name+" +" + fish.value + " SUN"

document.getElementById("skipButton").style.display="none"

}

document.getElementById("fishButton").onclick=fish
document.getElementById("skipButton").onclick=skipFishing

updateBolsa()
updateWalletUI()
updateDaily()
updateVaraInfo()

})

</script>

</body>
</html>
