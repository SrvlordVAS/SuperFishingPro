<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>

<style>

body{
font-family:'Comic Sans MS', Arial;
margin:0;
padding:20px 0 80px 0;
background:linear-gradient(to bottom,#87ceeb,#ffffff);
text-align:center;
}

h1{color:#006994}
h3{color:#004466}

button{
background:#00aaff;
color:white;
border:none;
border-radius:5px;
padding:6px 10px;
cursor:pointer;
margin:3px;
}

button:hover{background:#0088cc}

.section{display:none}
.section.active{display:block}

#inventory,#shop,#upgradeSection,#bolsa{
border:1px solid #004466;
padding:8px;
margin:8px auto;
width:90%;
max-width:400px;
border-radius:5px;
background:#e0f7ff;
text-align:left;
}

#bottomMenu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#00aaff;
display:flex;
justify-content:space-around;
padding:5px 0;
}

.selected{background:#ffcc00 !important;color:black}

</style>
</head>

<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<div id="pesca" class="section active">

<p id="result">Clique em pescar</p>

<button id="fishButton">🎣 PESCAR</button>
<button id="skipButton" style="display:none">⏩ Pular</button>

<p id="currentVara"></p>
<p id="varaStats"></p>

<h4>Bolsa</h4>
<div id="bolsa"></div>

</div>

<div id="shopSection" class="section">

<h3>Loja</h3>

<button id="boxComum">📦 Box Comum (200)</button>
<button id="boxRara">📦 Box Rara (330)</button>
<button id="boxEpica">📦 Box Épica (432)</button>
<button id="boxLendaria">📦 Box Lendária (504)</button>
<button id="boxMitica">📦 Box Mítica (600)</button>

</div>

<div id="upgradeSection" class="section">

<h3>Upgrade</h3>

XP disponível: <span id="xpReservoir">0</span>

<div id="upgrade"></div>

</div>

<div id="bottomMenu">

<button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
<button class="tabButton" data-target="shopSection">🏪 Loja</button>
<button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>

</div>

<script>

let sunBalance = 500
let dailyCount = 0
let dailyLimit = 15

let xpReservoir = 0

const boxCosts={
Comum:200,
Rara:330,
Epica:432,
Lendaria:504,
Mitica:600
}

const boxTypes=["Comum","Rara","Epica","Lendaria","Mitica"]

const varas={
"Bambu":{chance:50,max:"Muito Comum",baseXP:0},
"Comum Fibra":{chance:50,max:"Comum",baseXP:50},
"Incomum Grafite":{chance:50,max:"Incomum",baseXP:80},
"Raro Carbono":{chance:50,max:"Raro",baseXP:120},
"Épico Titânio":{chance:50,max:"Épico",baseXP:180},
"Lendário Platina":{chance:50,max:"Lendário",baseXP:230},
"Mítico Adamantium":{chance:50,max:"Mítico",baseXP:300}
}

let fishes=[
{name:"Sardinha",value:0.075,rarity:"Muito Comum",time:3000},
{name:"Robalo",value:0.15,rarity:"Comum",time:4000},
{name:"Tainha",value:0.3,rarity:"Comum",time:4500},
{name:"Corvina",value:0.45,rarity:"Comum",time:5000},
{name:"Atum",value:0.6,rarity:"Incomum",time:5000},
{name:"Pargo",value:0.9,rarity:"Incomum",time:6500},
{name:"Garoupa",value:1.05,rarity:"Raro",time:7000},
{name:"Salmão",value:1.2,rarity:"Épico",time:9000},
{name:"Truta",value:1.35,rarity:"Épico",time:9500},
{name:"Tubarão",value:1.5,rarity:"Lendário",time:12000},
{name:"Marlim Azul",value:1.65,rarity:"Mítico",time:15000}
]

let inventory=[{name:"Bambu",level:1,xp:0}]
let currentVaraIndex=0

function getCurrentVara(){
return inventory[currentVaraIndex]
}

function updateWallet(){
document.getElementById("money").innerText="Saldo SUN: "+sunBalance.toFixed(3)
}

function updateBolsa(){

const bolsa=document.getElementById("bolsa")
bolsa.innerHTML=""

inventory.forEach((v,i)=>{

let btn=document.createElement("button")
btn.innerText=v.name+" Lv."+v.level

if(i===currentVaraIndex)btn.style.border="2px solid gold"

btn.onclick=()=>{
currentVaraIndex=i
updateBolsa()
updateVaraInfo()
}

bolsa.appendChild(btn)

})

}

function updateVaraInfo(){

let vara=getCurrentVara()

if(!vara)return

document.getElementById("currentVara").innerText=
"Vara ativa: "+vara.name+" (Lv."+vara.level+")"

}

function addVara(name){

inventory.push({name:name,level:1,xp:0})

updateBolsa()
updateVaraInfo()
updateUpgrade()

}

const boxChances={

Comum:[
{name:"Comum Fibra",chance:99},
{name:"Mítico Adamantium",chance:1}
],

Rara:[
{name:"Comum Fibra",chance:50},
{name:"Incomum Grafite",chance:49},
{name:"Mítico Adamantium",chance:1}
],

Epica:[
{name:"Incomum Grafite",chance:50},
{name:"Raro Carbono",chance:49},
{name:"Mítico Adamantium",chance:1}
],

Lendaria:[
{name:"Raro Carbono",chance:50},
{name:"Épico Titânio",chance:49},
{name:"Mítico Adamantium",chance:1}
],

Mitica:[
{name:"Épico Titânio",chance:40},
{name:"Lendário Platina",chance:40},
{name:"Mítico Adamantium",chance:20}
]

}

boxTypes.forEach(type=>{

let btn=document.getElementById("box"+type)

btn.onclick=()=>{

if(sunBalance<boxCosts[type]){

alert("SUN insuficiente")

return

}

sunBalance-=boxCosts[type]

let rand=Math.random()*100
let acc=0

for(const item of boxChances[type]){

acc+=item.chance

if(rand<=acc){

addVara(item.name)

alert("Você recebeu "+item.name)

break

}

}

updateWallet()

}

})

document.getElementById("fishButton").onclick=()=>{

if(dailyCount>=dailyLimit){

alert("Limite diário atingido")

return

}

let vara=getCurrentVara()

let fish=fishes[Math.floor(Math.random()*fishes.length)]

document.getElementById("result").innerText="Pescando..."

setTimeout(()=>{

sunBalance+=fish.value

alert("Você pescou "+fish.name+" e ganhou "+fish.value+" SUN")

dailyCount++

document.getElementById("dailyCount").innerText=
"Tentativas hoje: "+dailyCount+"/15"

updateWallet()

},fish.time)

}

function updateUpgrade(){

const div=document.getElementById("upgrade")

div.innerHTML=""

inventory.forEach(v=>{

if(v.name==="Bambu")return

let line=document.createElement("div")

line.innerText=v.name+" Lv."+v.level

let btn=document.createElement("button")

btn.innerText="Transformar em XP"

btn.onclick=()=>{

xpReservoir+=50

inventory.splice(inventory.indexOf(v),1)

updateBolsa()
updateUpgrade()

}

line.appendChild(btn)

div.appendChild(line)

})

document.getElementById("xpReservoir").innerText=xpReservoir

}

const tabs=document.querySelectorAll(".tabButton")

tabs.forEach(tab=>{

tab.onclick=()=>{

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(tab.dataset.target).classList.add("active")

tabs.forEach(t=>t.classList.remove("selected"))

tab.classList.add("selected")

}

})

updateWallet()
updateBolsa()
updateUpgrade()
updateVaraInfo()

</script>

</body>
</html>
