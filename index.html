<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body {
  text-align:center;
  font-family: 'Comic Sans MS', Arial, sans-serif;
  background: linear-gradient(to bottom, #87ceeb, #ffffff);
  margin:0; 
  padding:20px;
}

h1 { color:#006994; text-shadow: 2px 2px #aee1f7; }
h3 { color:#004466; }

#result { font-size:18px; margin:15px 0 30px 0; min-height:30px; }

button {
  display:inline-block;
  background-color:#00aaff;
  color:white;
  border:none;
  border-radius:8px;
  padding:15px 30px;
  font-size:18px;
  cursor:pointer;
  margin:10px 0;
  transition:0.2s;
}
button:hover { background-color:#0088cc; }

.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 0</h3>
<p id="result">Clique em pescar</p>
<button id="fishButton">🎣 PESCAR</button>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 0

const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum"},
  {name:"Anchova", value:1, rarity:"Muito Comum"},
  {name:"Robalo", value:2, rarity:"Comum"},
  {name:"Cavala", value:3, rarity:"Comum"},
  {name:"Atum", value:5, rarity:"Incomum"},
  {name:"Badejo", value:6, rarity:"Incomum"},
  {name:"Garoupa", value:10, rarity:"Raro"},
  {name:"Linguado", value:12, rarity:"Raro"},
  {name:"Salmão do Atlântico", value:18, rarity:"Épico"},
  {name:"Dourado do mar", value:20, rarity:"Épico"},
  {name:"Peixe-espada", value:30, rarity:"Lendário"},
  {name:"Tubarão", value:35, rarity:"Lendário"},
  {name:"Tubarão-branco adulto", value:60, rarity:"Mítico"},
  {name:"Marlim Azul", value:100, rarity:"Mítico"}
]

function getRandomFish(){ 
  return fishes[Math.floor(Math.random() * fishes.length)] 
}

function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

document.getElementById("fishButton").onclick = function(){
  const button = this
  button.disabled = true
  document.getElementById("result").innerText = "Esperando o peixe morder a isca..."
  
  setTimeout(function(){
    let fish = getRandomFish()
    money += fish.value
    document.getElementById("money").innerText = "Saldo: " + money
    document.getElementById("result").innerHTML = 
      `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    button.disabled = false
  }, 5000) // 5 segundos de espera
}

})
</script>

</body>
</html>
