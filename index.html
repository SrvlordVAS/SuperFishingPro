<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>

<style>

body{
font-family:Arial;
background:#1b1b1b;
color:white;
text-align:center;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#3a7cff;
color:white;
}

.box{
background:#2a2a2a;
padding:10px;
margin:10px;
border-radius:10px;
}

</style>
</head>

<body>

<h2>🎣 Super Fishing</h2>

<div class="box">
SUN: <span id="sun">1000</span>
</div>

<div class="box">
<h3>Pescar</h3>

<button id="pescar">🎣 Pescar</button>

<p id="resultado"></p>

</div>

<div class="box">

<h3>📦 Boxes</h3>

<button id="boxComum">Comum 81</button>
<button id="boxRara">Rara 135</button>
<button id="boxEpica">Epica 162</button>
<button id="boxLendaria">Lendaria 189</button>
<button id="boxMitica">Mitica 225</button>

</div>

<div class="box">

<h3>🎒 Bolsa</h3>

<div id="bolsa"></div>

</div>

<script>

let wallet=1000

let bolsa=[]

let varaAtual=null

const peixes=[
{name:"Peixe Comum",valor:1},
{name:"Peixe Médio",valor:3},
{name:"Peixe Grande",valor:6},
{name:"Peixe Raro",valor:12}
]

const raridadeIndex={
"Fibra":1,
"Grafite":2,
"Carbono":3,
"Titânio":4,
"Platina":5,
"Adamantium":6
}

const boxCosts={
Comum:81,
Rara:135,
Epica:162,
Lendaria:189,
Mitica:225
}

const boxChances={

Comum:[
{name:"Fibra",chance:60},
{name:"Grafite",chance:25},
{name:"Carbono",chance:10},
{name:"Titânio",chance:4},
{name:"Platina",chance:1}
],

Rara:[
{name:"Fibra",chance:25},
{name:"Grafite",chance:35},
{name:"Carbono",chance:25},
{name:"Titânio",chance:10},
{name:"Platina",chance:4},
{name:"Adamantium",chance:1}
],

Epica:[
{name:"Grafite",chance:20},
{name:"Carbono",chance:30},
{name:"Titânio",chance:25},
{name:"Platina",chance:20},
{name:"Adamantium",chance:5}
],

Lendaria:[
{name:"Carbono",chance:20},
{name:"Titânio",chance:30},
{name:"Platina",chance:30},
{name:"Adamantium",chance:20}
],

Mitica:[
{name:"Carbono",chance:15},
{name:"Titânio",chance:25},
{name:"Platina",chance:30},
{name:"Adamantium",chance:30}
]

}

function updateUI(){

document.getElementById("sun").innerText=wallet

let html=""

bolsa.forEach((v,i)=>{

html+=`
<div>

${v.nome} lvl ${v.level}

<button onclick="equipar(${i})">Equipar</button>

<button onclick="upgrade(${i})">Upgrade</button>

</div>
`

})

document.getElementById("bolsa").innerHTML=html

}

function abrirBox(tipo){

if(wallet<boxCosts[tipo]){

alert("SUN insuficiente")
return

}

wallet-=boxCosts[tipo]

let r=Math.random()*100

let soma=0

let drop=null

for(let item of boxChances[tipo]){

soma+=item.chance

if(r<=soma){

drop=item.name
break

}

}

bolsa.push({

nome:drop,
level:1

})

alert("Você recebeu vara "+drop)

updateUI()

}

function equipar(i){

varaAtual=bolsa[i]

}

function upgrade(i){

let custo=20

if(wallet<custo){

alert("SUN insuficiente")
return

}

if(bolsa[i].level>=10){

alert("level max")
return

}

wallet-=custo

bolsa[i].level++

updateUI()

}

function pescar(){

if(!varaAtual){

alert("Equipe uma vara")
return

}

let chance=0.5+(varaAtual.level*0.05)

if(Math.random()>chance){

document.getElementById("resultado").innerText="Perdeu o peixe"
return

}

let peixe=peixes[Math.floor(Math.random()*peixes.length)]

let bonus=1+(varaAtual.level*0.05)

let valor=peixe.valor*bonus

wallet+=valor

document.getElementById("resultado").innerText=
"Pegou "+peixe.name+" +"+valor.toFixed(2)

updateUI()

}

document.getElementById("pescar").onclick=pescar

document.getElementById("boxComum").onclick=()=>abrirBox("Comum")
document.getElementById("boxRara").onclick=()=>abrirBox("Rara")
document.getElementById("boxEpica").onclick=()=>abrirBox("Epica")
document.getElementById("boxLendaria").onclick=()=>abrirBox("Lendaria")
document.getElementById("boxMitica").onclick=()=>abrirBox("Mitica")

updateUI()

</script>

</body>
</html>
