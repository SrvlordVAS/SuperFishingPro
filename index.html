<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SFP2: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (50 SFP2)</button>
    <button id="boxIncomum">📦 Box Incomum (100 SFP2)</button>
    <button id="boxRara">📦 Box Rara (150 SFP2)</button>
    <button id="boxEpica">📦 Box Épica (200 SFP2)</button>
    <button id="boxLendaria">📦 Box Lendária (250 SFP2)</button>
    <button id="boxMitica">📦 Box Mítica (300 SFP2)</button>
  </div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <p>XP disponível: <span id="xpReservoir">0</span></p>
  <div id="upgrade"></div>
</div>

<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 100000;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let xpReservoir = 0;

const varas = {
  "Fibra":[{level:1, chance:50, maxRarity:"Comum", baseProfit:1.1765, canUpgrade:true, roi:20}],
  "Fibra Reforçada":[{level:1, chance:50, maxRarity:"Comum", baseProfit:1.3824, canUpgrade:true, roi:17}],
  "Grafite":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:1.1765, canUpgrade:true, roi:20}],
  "Grafite Reforçada":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:1.3824, canUpgrade:true, roi:17}],
  "Carbono":[{level:1, chance:50, maxRarity:"Raro", baseProfit:1.1765, canUpgrade:true, roi:20}],
  "Carbono Reforçada":[{level:1, chance:50, maxRarity:"Raro", baseProfit:1.3824, canUpgrade:true, roi:17}],
  "Titânio":[{level:1, chance:50, maxRarity:"Épico", baseProfit:1.1765, canUpgrade:true, roi:20}],
  "Titânio Reforçada":[{level:1, chance:50, maxRarity:"Épico", baseProfit:1.3824, canUpgrade:true, roi:17}],
  "Platina":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:1.1765, canUpgrade:true, roi:20}],
  "Platina Reforçada":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:1.3824, canUpgrade:true, roi:17}],
  "Adamantium":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:1.1765, canUpgrade:true, roi:20}],
  "Adamantium Reforçada":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:1.3824, canUpgrade:true, roi:17}]
};

let fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:5000},
  {name:"Robalo", value:1, rarity:"Comum", time:5000},
  {name:"Tainha", value:1, rarity:"Comum", time:5000},
  {name:"Corvina", value:1, rarity:"Comum", time:5000},
  {name:"Atum", value:1, rarity:"Incomum", time:5000},
  {name:"Garoupa pequena", value:1, rarity:"Incomum", time:5000},
  {name:"Pargo", value:1, rarity:"Incomum", time:5000},
  {name:"Garoupa adulta", value:1, rarity:"Raro", time:5000},
  {name:"Salmão do Atlântico", value:1, rarity:"Épico", time:5000},
  {name:"Truta", value:1, rarity:"Épico", time:5000},
  {name:"Tubarão", value:1, rarity:"Lendário", time:5000},
  {name:"Marlim Azul", value:1, rarity:"Mítico", time:5000}
];

let inventory = [{name:"Fibra", level:1, xp:0, profit:1}];
let bolsa = [...inventory];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function getCurrentVara(){ return inventory[currentVaraIndex]; }
function getRandomFishByVara(vara){
  const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  let maxRarityIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
  let minRarityIdx = Math.max(0, maxRarityIdx-1);
  const allowed = fishes.filter(f => {
    const idx = rarities.indexOf(f.rarity);
    return idx <= maxRarityIdx && idx >= minRarityIdx;
  });
  return allowed[Math.floor(Math.random()*allowed.length)];
}

function setActiveVara(idx){ currentVaraIndex = idx; updateVaraInfo(); updateBolsa(); }
function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    if(bolsa.length === 0) { bolsaDiv.innerText = "Bolsa vazia."; return; }
    bolsa.forEach((v, idx) => {
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = v.name + ` (Nível ${v.level})`;
        btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
        btn.onclick = () => setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

function updateVaraInfo(){
    const vara = getCurrentVara();
    if(!vara) { document.getElementById("currentVara").innerText="Nenhuma vara ativa"; document.getElementById("varaStats").innerText=""; return; }
    const baseChance = 50;
    const chanceBonus = (vara.level-1)*(3+Math.random()*2);
    const chance = baseChance + chanceBonus;

    // ROI diminui 0,5 dia por nível
    const baseROI = varas[vara.name][0].roi;
    const currentROI = Math.max(1, baseROI - 0.5*(vara.level-1));
    const boxType = getBoxType(vara.name);
    const dailyProfit = boxCosts[boxType] / currentROI;
    vara.profit = dailyProfit;

    document.getElementById("currentVara").innerText = `${vara.name} (Nível ${vara.level})`;
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    const maxIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
    const minIdx = Math.max(0, maxIdx-1);
    const allowedFishes = fishes.filter(f => {
        const idx = rarities.indexOf(f.rarity);
        return idx<=maxIdx && idx>=minIdx;
    });
    const fishNames = allowedFishes.map(f=>f.name).join(", ");
    document.getElementById("varaStats").innerText = `Chance de captura: ${chance.toFixed(1)}% | ROI atual: ${currentROI.toFixed(1)} dias | Lucro atual: ${vara.profit.toFixed(3)}\nPeixes que pode pegar: ${fishNames}`;
}

// Função auxiliar pra saber a box da vara
function getBoxType(varaName){
    if(varaName.includes("Fibra")) return "Comum";
    if(varaName.includes("Grafite")) return "Incomum";
    if(varaName.includes("Carbono")) return "Rara";
    if(varaName.includes("Titânio")) return "Epica";
    if(varaName.includes("Platina")) return "Lendaria";
    if(varaName.includes("Adamantium")) return "Mitica";
    return "Comum";
}

const boxCosts = {"Comum":50,"Incomum":100,"Rara":150,"Epica":200,"Lendaria":250,"Mitica":300};
const boxChances = {
  "Comum":[ {name:"Fibra", chance:50},{name:"Fibra Reforçada", chance:50} ],
  "Incomum":[ {name:"Grafite", chance:50},{name:"Grafite Reforçada", chance:50} ],
  "Rara":[ {name:"Carbono", chance:50},{name:"Carbono Reforçada", chance:50} ],
  "Epica":[ {name:"Titânio", chance:50},{name:"Titânio Reforçada", chance:50} ],
  "Lendaria":[ {name:"Platina", chance:50},{name:"Platina Reforçada", chance:50} ],
  "Mitica":[ {name:"Adamantium", chance:50},{name:"Adamantium Reforçada", chance:50} ]
};

function addVaraToInventory(varaName){
    const baseProfit = varas[varaName][0].baseProfit;
    const newVara = {name: varaName, level:1, xp:0, profit: baseProfit};
    inventory.push(newVara);
    bolsa.push(newVara);
    updateBolsa();
    updateUpgrade();
    updateVaraInfo();
}

Object.keys(boxChances).forEach(type=>{
    document.getElementById("box"+type).onclick = ()=>{
        if(sunBalance < boxCosts[type]){ alert("Saldo SFP2 insuficiente!"); return; }
        sunBalance -= boxCosts[type];
        let rand = Math.random()*100;
        let acc = 0;
        for(const item of boxChances[type]){
            acc += item.chance;
            if(rand <= acc){
                addVaraToInventory(item.name);
                alert(`🎉 Parabéns! Você recebeu a vara: ${item.name}`);
                break;
            }
        }
        updateWalletUI();
    }
});

// ===== PESCA =====
document.getElementById("fishButton").onclick = function(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }
  const fish = getRandomFishByVara(vara);
  document.getElementById("result").innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    // chance de captura
    if(Math.random()*100 <= 50 + (vara.level-1)*(3+Math.random()*2)){
      sunBalance += fish.value * vara.profit;
      alert(`Você pescou: ${fish.name} e ganhou ${(fish.value*vara.profit).toFixed(3)} SFP2`);
    } else {
      alert(`${fish.name} escapou!`);
    }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    updateWalletUI();
  },5000);
};

// ===== WALLET =====
function updateWalletUI(){ document.getElementById("money").innerText = `Saldo SFP2: ${sunBalance.toFixed(3)}`; }

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// ===== INICIALIZA =====
updateBolsa();
updateUpgrade();
updateVaraInfo();
updateWalletUI();

function updateUpgrade(){
    const upgradeDiv = document.getElementById("upgrade");
    upgradeDiv.innerHTML = "";
    document.getElementById("xpReservoir").innerText = xpReservoir;
    const info = document.createElement("p");
    info.style.marginTop = "10px";
    info.style.fontSize = "14px";
    info.style.color = "#004466";
    info.innerText = "💡 Upar a vara diminui o ROI em 0,5 dia por nível, e aumenta aleatoriamente o lucro de 80% a 120% do atual.";
    upgradeDiv.appendChild(info);

    inventory.forEach((vara, idx) => {
        if(!varas[vara.name][0].canUpgrade) return;
        const baseXP = varas[vara.name][0].baseProfit*100;
        const nextXP = baseXP * Math.pow(2, vara.level-1);
        const div = document.createElement("div");
        div.innerHTML = `<strong>${vara.name}</strong> Nível ${vara.level} | XP: ${vara.xp.toFixed(1)}/${nextXP.toFixed(1)} | Lucro atual: ${vara.profit.toFixed(3)}`;

        const btnUpgrade = document.createElement("button");
        btnUpgrade.innerText = "Usar XP para upar";
        btnUpgrade.onclick = () => {
            if(xpReservoir <= 0){ alert("Sem XP disponível!"); return; }
            if(vara.level>=10){ alert("Vara já no nível máximo!"); return; }
            const xpToUse = Math.min(nextXP - vara.xp, xpReservoir);
            vara.xp += xpToUse;
            xpReservoir -= xpToUse;
            if(vara.xp >= nextXP){
                vara.level++;
                vara.xp = 0;
                const bonus = 0.8 + Math.random()*0.4;
                vara.profit *= (1+bonus);
                alert(`${vara.name} subiu para Nível ${vara.level}! Lucro aumentado em ${(bonus*100).toFixed(1)}%`);
                updateVaraInfo();
            }
            updateUpgrade();
div.appendChild(document.createElement("br"));
        div.appendChild(btnUpgrade);
        upgradeDiv.appendChild(div);
    });
}
});
</script>
</body>
</html>
