<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }

#bolsaContainer, #shopContainer { width:90%; max-width:400px; margin:0 auto; }

#bolsaMenuBox, #shopMenuBox {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#bolsaVarasBox, #shopContentBox {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#d0f0ff;
}

#bolsaMenu, #shopMenu { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
#bolsaVaras, #shopContent { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }

#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }

.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>

  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>

    <div id="bolsaMenuBox">
      <div id="bolsaMenu"></div>
    </div>

    <div id="bolsaVarasBox">
      <div id="bolsaVaras"></div>
    </div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>

  <div id="shopContainer">

    <!-- MENU -->
    <div id="shopMenuBox">
      <div id="shopMenu"></div>
    </div>

    <!-- CONTEÚDO -->
    <div id="shopContentBox">
      <div id="shopContent">Selecione uma opção acima</div>
    </div>

  </div>
</div>

<!-- MENU INFERIOR -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ===== SHOP =====
const shopOptions = ["Comum","Incomum","Rara","Épica","Lendária"];
let selectedShop = null;

const shopItems = {
  "Comum": ["Vara Simples","Vara Simples Reforçada"],
  "Incomum": ["Vara Boa","Vara Boa Reforçada"],
  "Rara": ["Vara Forte","Vara Forte Reforçada"],
  "Épica": ["Vara Épica","Vara Épica Reforçada"],
  "Lendária": ["Vara Lendária","Vara Lendária Reforçada"]
};

function updateShopMenu(){
  const menu = document.getElementById("shopMenu");
  menu.innerHTML = "";

  shopOptions.forEach(opt=>{
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.style.border = opt===selectedShop ? "2px solid gold" : "1px solid #004466";

    btn.onclick = ()=>{
      selectedShop = opt;
      updateShopMenu();
      updateShopContent();
    };

    menu.appendChild(btn);
  });
}

function updateShopContent(){
  const content = document.getElementById("shopContent");
  content.innerHTML = "";

  if(!selectedShop){
    content.innerText = "Selecione uma opção acima";
    return;
  }

  shopItems[selectedShop].forEach(item=>{
    const btn = document.createElement("button");
    btn.innerText = item;
    content.appendChild(btn);
  });
}

// ===== TABS =====
const tabs = document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    tabs.forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// INICIALIZA
updateShopMenu();

});
</script>
</body>
</html>
