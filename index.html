<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Game</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e0f7fa; text-align: center; }
        #game { margin: 20px; padding: 20px; border: 2px solid #00796b; border-radius: 10px; background-color: #ffffff; } 
        button { padding: 10px; margin: 5px; border-radius: 5px; }
        .score { font-size: 22px; color: #00796b; }
    </style>
</head>
<body>
    <div id="game">
        <h1>Fishing Mini Game</h1>
        <div class="score" id="score">Score: 0</div>
        <div id="fishCounter">Fish Caught: 0</div>
        <button id="catchFish">Catch Fish</button>
        <button id="resetGame">Reset Game</button>
    </div>
    <script>
        let score = 0;
        let fishCaught = 0;
        const fishTypes = [
            { name: 'Goldfish', rarity: 1 },
            { name: 'Trout', rarity: 2 },
            { name: 'Salmon', rarity: 3 },
            { name: 'Shark', rarity: 5 }
        ];

        function catchFish() {
            const fish = fishTypes[Math.floor(Math.random() * fishTypes.length)];
            score += fish.rarity;
            fishCaught++;
            document.getElementById('score').textContent = `Score: ${score}`;
            document.getElementById('fishCounter').textContent = `Fish Caught: ${fishCaught}`;
            alert(`You caught a ${fish.name}!`);
        }

        function resetGame() {
            score = 0;
            fishCaught = 0;
            document.getElementById('score').textContent = `Score: ${score}`;
            document.getElementById('fishCounter').textContent = `Fish Caught: ${fishCaught}`;
        }

        document.getElementById('catchFish').addEventListener('click', catchFish);
        document.getElementById('resetGame').addEventListener('click', resetGame);
    </script>
</body>
</html>
