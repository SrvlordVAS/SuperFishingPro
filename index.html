<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body {
  text-align:center;
  font-family:'Comic Sans MS', Arial, sans-serif;
  background: linear-gradient(to bottom,#87ceeb,#ffffff);
  margin:0; padding:20px;
}
h1 { color:#006994; text-shadow:2px 2px #aee1f7;}
h3 { color:#004466;}
#result { font-size:18px; margin:15px 0 30px 0; min-height:30px; }
button {
  display:inline-block;
  background-color:#00aaff;
  color:white;
  border:none;
  border-radius:8px;
  padding:15px 30px;
  font-size:18px;
  cursor:pointer;
  margin:10px 5px;
  transition:0.2s;
}
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.menu { margin-top:20px; }
.menu button { width:100px; }
.box-button { margin:5px; padding:10px 20px; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>
<p id="result">Clique em pescar</p>

<div id="menu-pesca">
  <button id="fishButton">🎣 Pescar</button>
</div>

<div class="menu">
  <button onclick="showTab('pesca')">Pescar</button>
  <button onclick="showTab('loja')">Loja</button>
  <button onclick="showTab('inventario')">Inventário</button>
</div>

<div id="loja" style="display:none; margin-top:20px;">
  <h3>Boxes disponíveis:</h3>
  <button class="box-button" onclick="abrirBox(1)">Box 1</button>
  <button class="box-button" onclick="abrirBox(2)">Box 2</button>
  <button class="box-button" onclick="abrirBox(3)">Box 3</button>
  <button class="box-button" onclick="abrirBox(4)">Box 4</button>
</div>

<div id="inventario" style="display:none; margin-top:20px;">
  <h3>Escolha a vara ativa:</h3>
  <div id="varas-inventario"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999;

const fishes = [
  {name:"Peixinho", value:1, rarity:"Muito Comum"},
  {name:"Lambari", value:1, rarity:"Muito Comum"},
  {name:"Sardinha", value:2, rarity:"Comum"},
  {name:"Tilápia", value:3, rarity:"Comum"},
  {name:"Carpa", value:5, rarity:"Incomum"},
  {name:"Pacu", value:6, rarity:"Incomum"},
  {name:"Tucunaré", value:10, rarity:"Raro"},
  {name:"Dourado", value:12, rarity:"Raro"},
  {name:"Salmão", value:18, rarity:"Épico"},
  {name:"Atum Gigante", value:20, rarity:"Épico"},
  {name:"Peixe Espada", value:30, rarity:"Lendário"},
  {name:"Tubarão Martelo", value:35, rarity:"Lendário"},
];

const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];

const varas = [
  {name:"Bambu", rarity:"Muito Comum", level:1},
  {name:"Fibra", rarity:"Comum", level:1},
  {name:"Grafite", rarity:"Incomum", level:1},
  {name:"Alumínio", rarity:"Raro", level:1},
  {name:"Titânio", rarity:"Épico", level:1},
  {name:"Carbono", rarity:"Lendário", level:1},
  {name:"Diamante", rarity:"Mítico", level:1} // Mítica não dropa ainda
];

let inventario = [varas[0]]; // Começa só com Bambu
let varaAtiva = inventario[0];

function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getRandomFish(){
  // Só pode pegar peixe da raridade da vara ou inferior
  const allowedRarities = rarities.slice(0, rarities.indexOf(varaAtiva.rarity)+1);
  const allowedFishes = fishes.filter(f=>allowedRarities.includes(f.rarity));
  return allowedFishes[Math.floor(Math.random()*allowedFishes.length)];
}

function chanceFalha(level){
  // Nível 1 -> 50%, Nível 5 -> 10%
  return Math.max(50 - (level-1)*10,10);
}

document.getElementById("fishButton").onclick = function(){
  const button = this;
  button.disabled = true;
  document.getElementById("result").innerHTML = "Esperando o peixe morder a isca... <button onclick='pularTempo()'>Pular</button>";
  setTimeout(caçarPeixe,5000);
}

window.pularTempo = function(){
  caçarPeixe();
}

function caçarPeixe(){
  const button = document.getElementById("fishButton");
  button.disabled = false;
  let falha = Math.random()*100 < chanceFalha(varaAtiva.level);
  if(falha){
    document.getElementById("result").innerText = "O peixe escapou!";
    return;
  }
  let fish = getRandomFish();
  money += fish.value;
  document.getElementById("money").innerText = "Saldo: " + money;
  document.getElementById("result").innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`;
}

function showTab(tab){
  document.getElementById("menu-pesca").style.display = tab==="pesca"?"block":"none";
  document.getElementById("loja").style.display = tab==="loja"?"block":"none";
  document.getElementById("inventario").style.display = tab==="inventario"?"block":"none";
  atualizarInventario();
}

function atualizarInventario(){
  const invDiv = document.getElementById("varas-inventario");
  invDiv.innerHTML = "";
  inventario.forEach((v,i)=>{
    const btn = document.createElement("button");
    btn.innerText = `${v.name} (Nível ${v.level})`;
    btn.onclick = ()=>{varaAtiva=v; atualizarInventario();};
    if(v===varaAtiva) btn.style.fontWeight="bold";
    invDiv.appendChild(btn);
  });
}

function abrirBox(box){
  let drops = [];
  switch(box){
    case 1: drops=["Comum","Incomum"]; break;
    case 2: drops=["Comum","Incomum","Raro"]; break;
    case 3: drops=["Comum","Incomum","Raro","Épico"]; break;
    case 4: drops=["Comum","Incomum","Raro","Épico","Lendário"]; break;
  }
  let possiveis = varas.filter(v=>drops.includes(v.rarity) && !inventario.includes(v));
  if(possiveis.length===0){
    alert("Nenhuma nova vara disponível nessa box!");
    return;
  }
  let novaVara = possiveis[Math.floor(Math.random()*possiveis.length)];
  inventario.push({...novaVara});
  alert(`Você recebeu a vara: ${novaVara.name} [${novaVara.rarity}]`);
  atualizarInventario();
}

atualizarInventario();

});
</script>

</body>
</html>
