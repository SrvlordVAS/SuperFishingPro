<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#shop, #aquario { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
#varaAtiva { font-size:20px; margin:10px 0; }
#bagContainer { border:1px solid #004466; padding:5px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#c0e8ff; cursor:pointer; text-align:left; }
#bagItems { display:none; margin-top:5px; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<!-- Seções -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>

  <div id="varaAtiva">Vara ativa: <span id="currentVara">Vara de Bambu (Nível 1)</span></div>

  <div id="bagContainer">
    👜 Bolsa de varas
    <div id="bagItems"></div>
  </div>
</div>

<div id="aquario" class="section">
  <h3>Aquário</h3>
  <div id="aquarioContent"></div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum</button>
    <button id="boxRara">📦 Box Rara</button>
    <button id="boxEpica">📦 Box Épica</button>
    <button id="boxLendaria">📦 Box Lendária</button>
  </div>
</div>

<!-- Menu inferior -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="aquario">🐠 Aquário</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999
let fishingTimeout = null

// Varas
const varas = {
  "Bambu": [{level:1, chance:50, maxRarity:"Muito Comum"}],
  "Fibra": [{level:1, chance:50, maxRarity:"Comum"}],
  "Grafite": [{level:1, chance:50, maxRarity:"Incomum"}],
  "Carbono": [{level:1, chance:50, maxRarity:"Raro"}],
  "Titânio": [{level:1, chance:50, maxRarity:"Épico"}],
  "Platina": [{level:1, chance:50, maxRarity:"Lendário"}],
  "Adamantium": [{level:1, chance:50, maxRarity:"Mítico"}]
};

// Peixes
const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum"},
  {name:"Robalo", value:2, rarity:"Comum"},
  {name:"Atum", value:5, rarity:"Incomum"},
  {name:"Garoupa adulta", value:10, rarity:"Raro"},
  {name:"Salmão do Atlântico", value:18, rarity:"Épico"},
  {name:"Peixe-espada", value:30, rarity:"Lendário"},
  {name:"Tubarão-branco adulto", value:60, rarity:"Mítico"}
];

// Inventário
let activeVara = {name:"Bambu", level:1};
let bag = [];

// Aquário
let aquario = {};

function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getRandomFish(vara){
  const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  const maxIndex = rarities.indexOf(vara.maxRarity);
  const allowed = fishes.filter(f => rarities.indexOf(f.rarity) <= maxIndex);
  return allowed[Math.floor(Math.random()*allowed.length)];
}

// Atualiza bolsa
function updateBagDisplay(){
  const bagDiv = document.getElementById("bagItems");
  bagDiv.innerHTML = "";
  bag.forEach((v,i)=>{
    const btn = document.createElement("button");
    btn.innerText = `${v.name} (Nível ${v.level})`;
    btn.onclick = function(){
      bag.push(activeVara);
      activeVara = v;
      bag.splice(i,1);
      updateActiveVara();
      updateBagDisplay();
    }
    bagDiv.appendChild(btn);
  });
}

// Atualiza vara ativa
function updateActiveVara(){
  document.getElementById("currentVara").innerText = `${activeVara.name} (Nível ${activeVara.level})`;
}

// Toggle bolsa
document.getElementById("bagContainer").onclick = function(){
  const bagDiv = document.getElementById("bagItems");
  bagDiv.style.display = bagDiv.style.display==="block"?"none":"block";
}

// Abrir box
document.getElementById("boxComum").onclick = ()=>addVaraToBag("Comum");
document.getElementById("boxRara").onclick = ()=>addVaraToBag("Rara");
document.getElementById("boxEpica").onclick = ()=>addVaraToBag("Epica");
document.getElementById("boxLendaria").onclick = ()=>addVaraToBag("Lendária");

function addVaraToBag(type){
  const mapping = {
    "Comum":["Fibra","Grafite"],
    "Rara":["Grafite","Carbono"],
    "Epica":["Carbono","Titânio"],
    "Lendária":["Titânio","Platina"]
  };
  const list = mapping[type];
  const selected = {name:list[Math.floor(Math.random()*list.length)], level:1};
  bag.push(selected);
  updateBagDisplay();
  alert(`Você ganhou uma vara: ${selected.name} (Nível 1)`);
}

// Pescar
const fishButton = document.getElementById("fishButton")
const skipButton = document.getElementById("skipButton")
const result = document.getElementById("result")

fishButton.onclick = function(){
  fishButton.disabled = true
  skipButton.style.display = "inline-block"
  const fish = getRandomFish(activeVara)
  result.innerText = "Esperando o peixe morder a isca..."
  fishingTimeout = setTimeout(()=>{
    if(Math.random()*100 < activeVara.level*10){
      alert("O peixe escapou! 😢")
    } else {
      money += fish.value
      document.getElementById("money").innerText = "Saldo: " + money
      result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
      // Adiciona ao aquário
      if(aquario[fish.name]) aquario[fish.name].count += 1;
      else aquario[fish.name] = {rarity:fish.rarity, value:fish.value, count:1};
      updateAquario();
    }
    fishButton.disabled = false
    skipButton.style.display = "none"
  }, 2000)
}

// Pular espera
skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout)
    fishingTimeout = null
    const fish = getRandomFish(activeVara)
    if(Math.random()*100 < activeVara.level*10){
      alert("O peixe escapou! 😢")
    } else {
      money += fish.value
      document.getElementById("money").innerText = "Saldo: " + money
      result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
      if(aquario[fish.name]) aquario[fish.name].count += 1;
      else aquario[fish.name] = {rarity:fish.rarity, value:fish.value, count:1};
      updateAquario();
    }
    fishButton.disabled = false
    skipButton.style.display = "none"
  }
}

// Atualiza aquário
function updateAquario(){
  const aquarioDiv = document.getElementById("aquarioContent");
  aquarioDiv.innerHTML = "";
  for(const key in aquario){
    const f = aquario[key];
    const div = document.createElement("div");
    div.innerHTML = `<span class="${rarityClass(f.rarity)}">${key} [${f.rarity}]</span> x${f.count} (+${f.value})`;
    aquarioDiv.appendChild(div);
  }
}

// Abas
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick = function(){
    const target = this.dataset.target
    document.querySelectorAll(".section").forEach(sec=>{
      sec.classList.remove("active")
    })
    document.getElementById(target).classList.add("active")
  }
})

updateActiveVara();
updateBagDisplay();
updateAquario();

})
</script>
</body>
</html>
