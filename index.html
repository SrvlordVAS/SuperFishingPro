<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>

<style>

body{
font-family:'Comic Sans MS',Arial;
margin:0;
padding:20px 0 80px 0;
background:linear-gradient(to bottom,#87ceeb,#ffffff);
text-align:center;
}

h1{color:#006994;text-shadow:2px 2px #aee1f7;}

#result{
font-size:18px;
margin:20px;
min-height:30px;
}

button{
background:#00aaff;
color:white;
border:none;
border-radius:5px;
padding:8px 12px;
font-size:16px;
cursor:pointer;
margin:5px;
}

button:hover{background:#0088cc;}

.section{display:none;}
.section.active{display:block;}

#bottomMenu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#00aaff;
display:flex;
}

#bottomMenu button{flex:1;}

.selected{
background:#ffcc00 !important;
color:black !important;
}

.fish-muito-comum{color:gray;}
.fish-comum{color:green;}
.fish-incomum{color:blue;}
.fish-raro{color:purple;}
.fish-epico{color:orange;}
.fish-lendario{color:red;}
.fish-mitico{color:black;background:yellow;padding:2px 4px;border-radius:3px;}

</style>
</head>

<body>

<h1>🎣 Super Fishing</h1>

<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0 / 15</h3>

<div id="pesca" class="section active">

<p id="result">Clique em pescar</p>

<button id="fishButton">🎣 PESCAR</button>
<button id="skipButton" style="display:none;">⏩ Pular espera</button>

</div>

<div id="shopSection" class="section">
<h3>Loja</h3>
<p>Em breve...</p>
</div>

<div id="upgradeSection" class="section">
<h3>Upgrade</h3>
<p>Em breve...</p>
</div>

<div id="bottomMenu">

<button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
<button class="tabButton" data-target="shopSection">🏪 Loja</button>
<button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>

</div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const result = document.getElementById("result")
const fishButton = document.getElementById("fishButton")
const skipButton = document.getElementById("skipButton")

let sunBalance=500
let dailyCount=0
const dailyLimit=15
let fishingTimeout=null

const fishes=[

{name:"Sardinha",value:0.0075,rarity:"Muito Comum",time:2000},
{name:"Robalo",value:0.015,rarity:"Comum",time:3000},
{name:"Atum",value:0.05,rarity:"Incomum",time:4000},
{name:"Garoupa",value:0.08,rarity:"Raro",time:5000},
{name:"Salmão",value:0.12,rarity:"Épico",time:7000},
{name:"Tubarão",value:0.15,rarity:"Lendário",time:9000},
{name:"Marlim Azul",value:0.2,rarity:"Mítico",time:11000}

]

const weights={
"Muito Comum":40,
"Comum":25,
"Incomum":15,
"Raro":10,
"Épico":6,
"Lendário":3,
"Mítico":1
}

function getFishClass(r){
return r.toLowerCase()
.replace(" ","-")
.replace("é","e")
}

function getRandomFish(){

let pool=[]

fishes.forEach(f=>{

let w=weights[f.rarity]

for(let i=0;i<w;i++){
pool.push(f)
}

})

return pool[Math.floor(Math.random()*pool.length)]

}

function updateWallet(){
document.getElementById("money").innerText="Saldo SUN: "+sunBalance.toFixed(3)
}

function updateDaily(){
document.getElementById("dailyCount").innerText=
"Tentativas hoje: "+dailyCount+" / "+dailyLimit
}

function finishFishing(fish){

sunBalance+=fish.value

const fishClass=getFishClass(fish.rarity)

result.innerHTML=
`🎣 Você pescou <span class="fish-${fishClass}">${fish.name}</span> +${fish.value.toFixed(3)} SUN`

if(["Épico","Lendário","Mítico"].includes(fish.rarity)){

result.innerHTML=
`✨ PEIXE ${fish.rarity.toUpperCase()}!<br>`+result.innerHTML

}

updateWallet()

skipButton.style.display="none"

dailyCount++

updateDaily()

}

fishButton.onclick=function(){

if(dailyCount>=dailyLimit){

result.innerText="Limite diário atingido"

return

}

const fish=getRandomFish()

result.innerText="Esperando o peixe..."

skipButton.style.display="inline-block"

fishingTimeout=setTimeout(()=>{

finishFishing(fish)

},fish.time)

skipButton.onclick=function(){

clearTimeout(fishingTimeout)

finishFishing(fish)

}

}

const tabs=document.querySelectorAll(".tabButton")

tabs.forEach(tab=>{

tab.onclick=function(){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(tab.dataset.target)
.classList.add("active")

tabs.forEach(t=>t.classList.remove("selected"))

tab.classList.add("selected")

}

})

updateWallet()
updateDaily()

})

</script>

</body>
</html>
