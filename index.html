<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body {
    font-family:'Comic Sans MS', Arial, sans-serif;
    margin:0;
    padding:20px 0 80px 0;
    background:linear-gradient(to bottom,#87ceeb,#ffffff);
    text-align:center;
}
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
button {
    display:inline-block;
    background-color:#00aaff;
    color:white;
    border:none;
    border-radius:5px;
    padding:5px 8px;
    font-size:14px;
    cursor:pointer;
    margin:2px;
    transition:0.2s;
}
button:hover { background-color:#0088cc; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#bolsa { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:10px; }
#bottomMenu {
    position: fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#00aaff;
    display:flex;
    justify-content:space-around;
    padding:5px 0;
    box-shadow:0 -2px 5px rgba(0,0,0,0.3);
    font-size:12px;
}
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SFP2: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <p>Em breve você poderá abrir boxes aqui!</p>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  // ===== Variáveis =====
  let sunBalance = 100000;
  let dailyCount = 0;
  const dailyLimit = 15;
  let fishingTimeout = null;

  // ===== VARAS INICIAIS =====
  let inventory = [
    {name:"Bambu", profit:100} // placeholder
  ];
  let bolsa = [...inventory];
  let currentVaraIndex = 0;

  // ===== FUNÇÕES =====
  function getCurrentVara(){ return inventory[currentVaraIndex]; }

  function setActiveVara(idx){
      currentVaraIndex = idx;
      updateBolsa();
      updateVaraInfo();
  }

  function updateBolsa(){
      const bolsaDiv = document.getElementById("bolsa");
      bolsaDiv.innerHTML = "";
      bolsa.forEach((v, idx) => {
          const btn = document.createElement("button");
          btn.innerText = v.name;
          btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
          btn.onclick = () => setActiveVara(idx);
          bolsaDiv.appendChild(btn);
      });
  }

  function updateVaraInfo(){
      const vara = getCurrentVara();
      document.getElementById("currentVara").innerText = vara ? `Vara ativa: ${vara.name}` : "Nenhuma vara ativa";
  }

  function updateWalletUI(){
      document.getElementById("money").innerText = `Saldo SFP2: ${sunBalance.toFixed(3)}`;
      document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
  }

  // ===== PESCA =====
  const fishButton = document.getElementById("fishButton");
  const skipButton = document.getElementById("skipButton");
  const result = document.getElementById("result");

  function fishAction(){
      if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
      const vara = getCurrentVara();
      if(!vara){ alert("Nenhuma vara ativa!"); return; }
      // placeholder captura
      const capture = Math.random() <= 0.5;
      if(capture){
          const ganho = (1*(vara.profit/100)).toFixed(3); // placeholder valor
          sunBalance += parseFloat(ganho);
          alert(`🎉 Você pescou um peixe e ganhou ${ganho} SFP2`);
      } else {
          alert("O peixe escapou!");
      }
      dailyCount++;
      updateWalletUI();
  }

  fishButton.onclick = function(){
      fishButton.disabled = true;
      result.innerText = "Esperando o peixe morder a isca...";
      fishingTimeout = setTimeout(()=>{
          fishAction();
          result.innerText = "Clique em pescar";
          fishButton.disabled = false;
      },5000);
  };

  skipButton.onclick = function(){
      if(fishingTimeout) clearTimeout(fishingTimeout);
      fishAction();
      result.innerText = "Clique em pescar";
      fishButton.disabled = false;
  };

  // ===== TABS =====
  const tabs = document.querySelectorAll(".tabButton");
  tabs.forEach(tab=>{
    tab.onclick = ()=>{
      document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
      document.getElementById(tab.dataset.target).classList.add("active");
      tabs.forEach(t=>t.classList.remove("selected"));
      tab.classList.add("selected");
    }
  });

  // ===== INICIALIZAÇÃO =====
  updateBolsa();
  updateVaraInfo();
  updateWalletUI();

});
</script>

</body>
</html>
