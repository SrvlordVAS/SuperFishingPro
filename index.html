<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>

<style>
body {
  font-family:'Comic Sans MS', Arial;
  margin:0;
  padding:20px 0 80px 0;
  background:linear-gradient(to bottom,#87ceeb,#ffffff);
  text-align:center;
}

h1 { color:#006994; }
h3 { color:#004466; }

.section { display:none; }
.section.active { display:block; }

button { cursor:pointer; }

/* MENU */
#bottomMenu {
  position: fixed;
  bottom:0;
  width:100%;
  background:#00aaff;
  display:flex;
}
#bottomMenu button {
  flex:1;
  border:none;
  background:#00aaff;
  color:white;
}
.selected {
  background:#ffcc00 !important;
  color:black !important;
}

/* BOLSA */
#bolsaContainer { width:90%; max-width:400px; margin:auto; }

.bolsa-top, .bolsa-bottom {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#bolsaMenu, #bolsaVaras {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
}

.bag-item {
  background:#00aaff;
  color:white;
  border:none;
  border-radius:5px;
  padding:5px 8px;
}

/* SHOP */
#shopContainer { width:90%; max-width:400px; margin:auto; }

.shop-top, .shop-middle, .shop-bottom {
  border:1px solid #004466;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.shop-top { background:#e0f7ff; }
.shop-middle { background:#d0f0ff; }
.shop-bottom { background:#c0eaff; }

#shopMenu {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

/* BOX */
.box-card {
  width:90px;
  height:90px;
  border-radius:10px;
  background:linear-gradient(145deg,#00aaff,#0077aa);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:11px;
  text-align:center;
  cursor:pointer;
}

.box-selected {
  border:3px solid gold;
}
</style>
</head>

<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR</button>

  <p id="currentVara"></p>
  <p id="varaStats"></p>

  <div id="bolsaContainer">
    <div class="bolsa-top">
      <div id="bolsaMenu"></div>
    </div>
    <div class="bolsa-bottom">
      <div id="bolsaVaras"></div>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shopSection" class="section">
  <h3>Loja</h3>

  <div id="shopContainer">

    <!-- BOXES -->
    <div class="shop-top">
      <div id="shopMenu"></div>
    </div>

    <!-- INFO -->
    <div class="shop-middle">
      <div id="shopContent">Selecione um equipamento</div>
    </div>

    <!-- COMPRAR -->
    <div class="shop-bottom">
      <button id="buyButton" style="display:none;">💰 Comprar</button>
    </div>

  </div>
</div>

<!-- MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣</button>
  <button class="tabButton" data-target="shopSection">🏪</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;

// VARAS
let bolsa = [
  {name:"Bambu", rarity:"Muito Comum", fishes:["Sardinha"], captureRate:50}
];

let currentVaraIndex = 0;

const raridades = ["Muito Comum","Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let selectedRarity = "Muito Comum";

// SHOP
const shopVaras = [
  {name:"Equipamento Comum", rarity:"Comum", fishes:["Peixe Comum"], captureRate:50},
  {name:"Equipamento Incomum", rarity:"Incomum", fishes:["Peixe Incomum"], captureRate:50},
  {name:"Equipamento Raro", rarity:"Rara", fishes:["Peixe Raro"], captureRate:50},
  {name:"Equipamento Épico", rarity:"Épica", fishes:["Peixe Épico"], captureRate:50},
  {name:"Equipamento Lendário", rarity:"Lendária", fishes:["Peixe Lendário"], captureRate:50},
  {name:"Equipamento Mítico", rarity:"Mítica", fishes:["Peixe Mítico"], captureRate:50}
];

let selectedShopVara = null;

// BOLSA MENU
function updateBolsaMenu(){
  const menu = document.getElementById("bolsaMenu");
  menu.innerHTML = "";

  raridades.forEach(r=>{
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.className = "bag-item";
    btn.onclick = ()=>{
      selectedRarity = r;
      updateBolsaMenu();
      updateBolsaVaras();
    };
    menu.appendChild(btn);
  });
}

function updateBolsaVaras(){
  const div = document.getElementById("bolsaVaras");
  div.innerHTML = "";

  bolsa.forEach((v, i)=>{
    if(v.rarity === selectedRarity){
      const btn = document.createElement("button");
      btn.innerText = v.name;
      btn.className = "bag-item";
      btn.onclick = ()=>{
        currentVaraIndex = i;
        updateVaraInfo();
      };
      div.appendChild(btn);
    }
  });
}

function updateVaraInfo(){
  const v = bolsa[currentVaraIndex];
  document.getElementById("currentVara").innerText = "Vara: " + v.name;
  document.getElementById("varaStats").innerText =
    "Peixes: " + v.fishes.join(", ") + " | Taxa: " + v.captureRate + "%";
}

// PESCA
function fishAction(){
  if(dailyCount >= dailyLimit){
    alert("Limite diário atingido");
    return;
  }

  const v = bolsa[currentVaraIndex];
  if(Math.random()*100 <= v.captureRate){
    alert("🎉 Pegou: " + v.fishes[0]);
  } else {
    alert("Escapou!");
  }

  dailyCount++;
  document.getElementById("dailyCount").innerText =
    "Tentativas hoje: " + dailyCount + "/15";

  fishButton.disabled = false;
  skipButton.style.display = "none";
}

fishButton.onclick = ()=>{
  fishButton.disabled = true;
  skipButton.style.display = "inline";
  fishingTimeout = setTimeout(fishAction, 3000);
};

skipButton.onclick = ()=>{
  clearTimeout(fishingTimeout);
  fishAction();
};

// SHOP UI
function updateShopMenu(){
  const menu = document.getElementById("shopMenu");
  menu.innerHTML = "";

  shopVaras.forEach(v=>{
    const box = document.createElement("div");
    box.className = "box-card";
    box.innerText = v.name;

    if(selectedShopVara === v){
      box.classList.add("box-selected");
    }

    box.onclick = ()=>{
      selectedShopVara = v;
      updateShopMenu();
      updateShopContent();
    };

    menu.appendChild(box);
  });
}

function updateShopContent(){
  const content = document.getElementById("shopContent");
  const btn = document.getElementById("buyButton");

  if(!selectedShopVara){
    content.innerText = "Selecione um equipamento";
    btn.style.display = "none";
    return;
  }

  content.innerText =
    selectedShopVara.name +
    "\nRaridade: " + selectedShopVara.rarity +
    "\nPeixes: " + selectedShopVara.fishes.join(", ");

  btn.style.display = "inline";
}

// COMPRAR
document.getElementById("buyButton").onclick = ()=>{
  if(selectedShopVara){
    bolsa.push(selectedShopVara);
    alert("Comprado!");
    updateBolsaVaras();
  }
};

// TABS
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(btn.dataset.target).classList.add("active");

    document.querySelectorAll(".tabButton").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");
  };
});

// INIT
updateBolsaMenu();
updateBolsaVaras();
updateVaraInfo();
updateShopMenu();

});
</script>

</body>
</html>
