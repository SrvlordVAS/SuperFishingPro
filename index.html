<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }
button { padding:5px 10px; margin:3px; cursor:pointer; border:none; border-radius:5px; background:#00aaff; color:white; transition:0.2s; }
button:hover { background:#0088cc; }
#bolsa { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:10px; }
.bag-item { padding:5px 10px; border:1px solid #004466; border-radius:5px; cursor:pointer; }
.selected { border:2px solid gold !important; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum</button>
    <button id="boxRara">📦 Box Rara</button>
  </div>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ===== CONFIGURAÇÕES INICIAIS =====
let currentVaraIndex = 0;
let inventory = []; // inventário vazio
let bolsa = [];     // bolsa de varas

// ===== VARAS =====
const varasBase = ["Bambu","Fibra","Fibra Reforçada"]; // exemplo
function getCurrentVara(){ return inventory[currentVaraIndex]; }

// ===== BOLSA =====
function setActiveVara(idx){
    currentVaraIndex = idx;
    updateBolsa();
    updateCurrentVara();
}

function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    bolsa.forEach((v, idx)=>{
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = v;
        if(idx===currentVaraIndex) btn.classList.add("selected");
        btn.onclick = ()=>setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

function updateCurrentVara(){
    const vara = getCurrentVara();
    document.getElementById("currentVara").innerText = `Vara ativa: ${vara?vara:"Nenhuma"}`;
}

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");
let fishingTimeout = null;

fishButton.onclick = function(){
  if(!getCurrentVara()){ alert("Escolha uma vara!"); return; }
  fishButton.disabled = true;
  result.innerText = "Esperando o peixe morder a isca...";
  skipButton.style.display = "inline-block";

  fishingTimeout = setTimeout(()=>{
    result.innerText = "Você pegou um peixe!";
    fishButton.disabled = false;
    skipButton.style.display = "none";
  },5000);
};

skipButton.onclick = function(){
  if(fishingTimeout) clearTimeout(fishingTimeout);
  result.innerText = "O peixe fugiu!";
  fishButton.disabled = false;
  skipButton.style.display = "none";
};

// ===== LOJA =====
document.getElementById("boxComum").onclick = function(){
    let vara = prompt("Digite o nome da vara que quer receber da box Comum:");
    if(vara) { inventory.push(vara); bolsa.push(vara); updateBolsa(); updateCurrentVara(); alert(`Você recebeu a vara: ${vara}`); }
};
document.getElementById("boxRara").onclick = function(){
    let vara = prompt("Digite o nome da vara que quer receber da box Rara:");
    if(vara) { inventory.push(vara); bolsa.push(vara); updateBolsa(); updateCurrentVara(); alert(`Você recebeu a vara: ${vara}`); }
};

// ===== TABS =====
const tabs = document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    tabs.forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// ===== INICIALIZA =====
updateBolsa();
updateCurrentVara();

});
</script>
</body>
</html>
