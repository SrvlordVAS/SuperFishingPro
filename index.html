<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
input[type=number]{width:60px; padding:3px; font-size:12px; margin:2px;}
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara ativa: <span id="currentVara">Bambu (Nível 1)</span></p>
  <p id="chanceInfo">Chance de falha: 50% | Bônus no peixe: 0%</p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (81 SUN)</button>
    <button id="boxRara">📦 Box Rara (135 SUN)</button>
    <button id="boxEpica">📦 Box Épica (162 SUN)</button>
    <button id="boxLendaria">📦 Box Lendária (189 SUN)</button>
  </div>
</div>

<!-- UPGRADE -->
<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgrade"></div>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 500;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;

// Variáveis de varas e XP base
const varas = {
  "Bambu": {rarity:"Muito Comum", maxLevel:1, xpBase:0},
  "Fibra": {rarity:"Comum", maxLevel:5, xpBase:50},
  "Grafite": {rarity:"Incomum", maxLevel:5, xpBase:80},
  "Carbono": {rarity:"Raro", maxLevel:5, xpBase:120},
  "Titânio": {rarity:"Épico", maxLevel:5, xpBase:180},
  "Platina": {rarity:"Lendário", maxLevel:5, xpBase:240},
  "Adamantium": {rarity:"Mítico", maxLevel:5, xpBase:300}
};

// Peixes
const fishes = [
  {name:"Sardinha", value:0.005, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:0.01, rarity:"Comum", time:4000},
  {name:"Tainha", value:0.02, rarity:"Comum", time:4500},
  {name:"Corvina", value:0.03, rarity:"Comum", time:5000},
  {name:"Atum", value:0.04, rarity:"Incomum", time:5000},
  {name:"Garoupa pequena", value:0.05, rarity:"Incomum", time:6000},
  {name:"Pargo", value:0.06, rarity:"Incomum", time:6500},
  {name:"Garoupa adulta", value:0.07, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:0.08, rarity:"Épico", time:9000},
  {name:"Truta", value:0.09, rarity:"Épico", time:9500},
  {name:"Tubarão", value:0.10, rarity:"Lendário", time:12000},
  {name:"Marlim Azul", value:0.11, rarity:"Mítico", time:15000}
];

let bolsa = [
  {name:"Bambu", level:1, xp:0},
  {name:"Fibra", level:1, xp:0}
];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getCurrentVara(){ return bolsa[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const bonus = (vara.level-1)*0.1;
  const allowed = fishes.filter(f => {
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    return rarities.indexOf(f.rarity) <= rarities.indexOf(varas[vara.name].rarity);
  });
  const fish = allowed[Math.floor(Math.random()*allowed.length)];
  fish.value = fish.value*(1+bonus);
  return fish;
}

// ===== BOLSA =====
function updateBolsa(){
  const bolsaDiv = document.getElementById("bolsa");
  bolsaDiv.innerHTML = "";
  if(bolsa.length === 0){ bolsaDiv.innerText = "Sua bolsa está vazia."; return; }

  bolsa.forEach((v, index)=>{
    const btn = document.createElement("button");
    btn.innerText = `${v.name} (Lvl ${v.level}, XP: ${Math.floor(v.xp)})`;
    btn.className = "bag-item";
    btn.style.border = index === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
    btn.style.background = "#e0f7ff";
    btn.style.borderRadius = "4px";
    btn.style.padding = "3px 5px";
    btn.onclick = ()=>{
      currentVaraIndex = index;
      updateBolsa();
      updateVaraInfo();
      updateUpgrade();
    }
    bolsaDiv.appendChild(btn);
  });
}

// ===== UPGRADE =====
function updateUpgrade(){
  const upgradeDiv = document.getElementById("upgrade");
  upgradeDiv.innerHTML = "";
  const vara = getCurrentVara();
  if(!vara){ upgradeDiv.innerText = "Nenhuma vara selecionada."; return; }

  const maxLevel = varas[vara.name].maxLevel;
  if(vara.level >= maxLevel){
    upgradeDiv.innerText = `${vara.name} já está no nível máximo.`;
    return;
  }

  const nextXP = varas[vara.name].xpBase * Math.pow(1.4, vara.level-1);

  const btn = document.createElement("button");
  btn.innerText = `↑ Adicionar XP (${Math.floor(vara.xp)}/${Math.floor(nextXP)})`;
  btn.onclick = ()=>{
    let addXP = 20; // XP fixo por ação, pode vir de outra vara ou evento
    vara.xp += addXP;
    alert(`Você adicionou ${addXP} XP à vara ${vara.name}`);
    while(vara.xp >= nextXP && vara.level < maxLevel){
      vara.xp -= nextXP;
      vara.level++;
      alert(`${vara.name} subiu para nível ${vara.level}!`);
    }
    updateBolsa();
    updateVaraInfo();
    updateUpgrade();
  }
  upgradeDiv.appendChild(btn);
}

// Atualiza info da vara ativa
function updateVaraInfo(){
  const vara = getCurrentVara();
  if(vara){
    const bonus = (vara.level-1)*10;
    const fail = Math.max(0,50 - (vara.level-1)*10);
    document.getElementById("currentVara").innerText = `${vara.name} (Nível ${vara.level})`;
    document.getElementById("chanceInfo").innerText = `Chance de falha: ${fail}% | Bônus no peixe: ${bonus}%`;
  }
}

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = function(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido! Volte amanhã."); return; }
  fishButton.disabled = true;
  skipButton.style.display = "inline-block";
  const vara = getCurrentVara();
  const fish = getRandomFishByVara(vara);
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    if(Math.random()*100 < Math.max(0,50-(vara.level-1)*10)){ alert("O peixe escapou! 😢"); }
    else { sunBalance += fish.value*(1+(vara.level-1)*0.1); updateWalletUI(); alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`); }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }, fish.time);
};

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout);
    fishingTimeout = null;
    const vara = getCurrentVara();
    const fish = getRandomFishByVara(vara);
    if(Math.random()*100 < Math.max(0,50-(vara.level-1)*10)){ alert("O peixe escapou! 😢"); }
    else { sunBalance += fish.value*(1+(vara.level-1)*0.1); updateWalletUI(); alert(`Você pescou: ${fish.name} e ganhou ${fish.value.toFixed(3)} SUN`); }
    dailyCount++;
    document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }
};

// ===== WALLET =====
function updateWalletUI(){
  document.getElementById("money").innerText = `Saldo SUN: ${sunBalance.toFixed(3)}`;
}

// ===== BOXES =====
const boxChances = {
  "Comum":[ {name:"Fibra", chance:60},{name:"Grafite", chance:25},{name:"Carbono", chance:10},{name:"Titânio", chance:4},{name:"Platina", chance:1},{name:"Adamantium", chance:0} ],
  "Rara":[ {name:"Fibra", chance:30},{name:"Grafite", chance:35},{name:"Carbono", chance:20},{name:"Titânio", chance:10},{name:"Platina", chance:4},{name:"Adamantium", chance:1} ],
  "Epica":[ {name:"Fibra", chance:15},{name:"Grafite", chance:20},{name:"Carbono", chance:25},{name:"Titânio", chance:20},{name:"Platina", chance:15},{name:"Adamantium", chance:5} ],
  "Lendaria":[ {name:"Fibra", chance:5},{name:"Grafite", chance:10},{name:"Carbono", chance:20},{name:"Titânio", chance:25},{name:"Platina", chance:25},{name:"Adamantium", chance:15} ]
};

["Comum","Rara","Epica","Lendaria"].forEach(type=>{
  document.getElementById("box"+type).onclick = ()=>{
    const boxCost = {"Comum":81,"Rara":135,"Epica":162,"Lendaria":189}[type];
    if(sunBalance < boxCost){ alert("Saldo SUN insuficiente!"); return; }
    if(confirm(`Abrir Box ${type} (custo ${boxCost} SUN)?`)){
      sunBalance -= boxCost;
      let rand = Math.random()*100;
      let acc = 0;
      let chosen = null;
      for(const item of boxChances[type]){
        acc += item.chance;
        if(rand <= acc){ chosen = item.name; break; }
      }
      if(chosen){
        bolsa.push({name:chosen, level:1, xp:0});
        alert(`Você recebeu: ${chosen}`);
        updateBolsa();
        updateWalletUI();
      }
    }
  };
});

// ===== TABS =====
const tabs = document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    tabs.forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// Inicializa
updateBolsa();
updateWalletUI();
updateVaraInfo();
updateUpgrade();

});
</script>
</body>
</html>
