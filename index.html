<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SFP2: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (50 SFP2)</button>
    <button id="boxIncomum">📦 Box Incomum (100 SFP2)</button>
    <button id="boxRara">📦 Box Rara (150 SFP2)</button>
    <button id="boxEpica">📦 Box Épica (200 SFP2)</button>
    <button id="boxLendaria">📦 Box Lendária (250 SFP2)</button>
    <button id="boxMitica">📦 Box Mítica (300 SFP2)</button>
  </div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <p>XP disponível: <span id="xpReservoir">0</span></p>
  <div id="upgrade"></div>
</div>

<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
let sunBalance = 100000;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let xpReservoir = 0;

const varas = {
  "Bambu":[{level:1, chance:50, maxRarity:"Muito Comum", baseProfit:0.08, canUpgrade:false}],
  "Fibra":[{level:1, chance:50, maxRarity:"Comum", baseProfit:20, canUpgrade:true}],
  "Fibra Reforçada":[{level:1, chance:50, maxRarity:"Comum", baseProfit:17, canUpgrade:true}],
  "Grafite":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:20, canUpgrade:true}],
  "Grafite Reforçada":[{level:1, chance:50, maxRarity:"Incomum", baseProfit:17, canUpgrade:true}],
  "Carbono":[{level:1, chance:50, maxRarity:"Raro", baseProfit:20, canUpgrade:true}],
  "Carbono Reforçada":[{level:1, chance:50, maxRarity:"Raro", baseProfit:17, canUpgrade:true}],
  "Titânio":[{level:1, chance:50, maxRarity:"Épico", baseProfit:20, canUpgrade:true}],
  "Titânio Reforçada":[{level:1, chance:50, maxRarity:"Épico", baseProfit:17, canUpgrade:true}],
  "Platina":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:20, canUpgrade:true}],
  "Platina Reforçada":[{level:1, chance:50, maxRarity:"Lendário", baseProfit:17, canUpgrade:true}],
  "Adamantium":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:20, canUpgrade:true}],
  "Adamantium Reforçada":[{level:1, chance:50, maxRarity:"Mítico", baseProfit:17, canUpgrade:true}]
};

const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:5000},
  {name:"Robalo", value:1, rarity:"Comum", time:5000},
  {name:"Tainha", value:1, rarity:"Incomum", time:5000},
  {name:"Corvina", value:1, rarity:"Raro", time:5000},
  {name:"Atum", value:1, rarity:"Épico", time:5000},
  {name:"Tubarão", value:1, rarity:"Lendário", time:5000},
  {name:"Marlim Azul", value:1, rarity:"Mítico", time:5000}
];

let inventory = [{name:"Bambu", level:1, xp:0, profit:0.08}];
let bolsa = [...inventory];
let currentVaraIndex = 0;

function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  let maxRarityIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
  let minRarityIdx = Math.max(0, maxRarityIdx-1);
  const allowed = fishes.filter(f => {
    const idx = rarities.indexOf(f.rarity);
    return idx <= maxRarityIdx && idx >= minRarityIdx;
  });
  return allowed[Math.floor(Math.random()*allowed.length)];
}

function setActiveVara(idx){ currentVaraIndex = idx; updateVaraInfo(); updateBolsa(); }

function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    bolsa.forEach((v, idx) => {
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = v.name + ` (Nível ${v.level})`;
        btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
        btn.onclick = () => setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

function updateUpgrade(){
    const upgradeDiv = document.getElementById("upgrade");
    upgradeDiv.innerHTML = "";
    document.getElementById("xpReservoir").innerText = xpReservoir;

    const info = document.createElement("p");
    info.style.marginTop = "10px";
    info.style.fontSize = "14px";
    info.style.color = "#004466";
    info.innerText = "💡 Upar aumenta lucro de 80% a 120% do atual, até nível 10, ROI diminui 0.5 dia por level.";
    upgradeDiv.appendChild(info);

    inventory.forEach((vara, idx)=>{
        if(!varas[vara.name][0].canUpgrade) return;
        const baseXP = 10; // simplificado
        const nextXP = baseXP*(vara.level);
        const div = document.createElement("div");
        div.innerHTML = `<strong>${vara.name}</strong> Nível ${vara.level} | XP: ${vara.xp}/${nextXP} | Lucro atual: ${vara.profit.toFixed(2)}`;

        const btnTransform = document.createElement("button");
        btnTransform.innerText = "Transformar em XP";
        btnTransform.onclick = ()=>{
            xpReservoir += baseXP;
            inventory.splice(idx,1);
            bolsa.splice(bolsa.indexOf(vara),1);
            if(currentVaraIndex===idx) currentVaraIndex=0;
            alert(`${vara.name} transformada em ${baseXP} XP!`);
            updateBolsa();
            updateUpgrade();
            updateVaraInfo();
        };

        const btnUpgrade = document.createElement("button");
        btnUpgrade.innerText = "Usar XP para upar";
        btnUpgrade.onclick = ()=>{
            if(xpReservoir<=0){ alert("Sem XP disponível!"); return; }
            if(vara.level>=10){ alert("Vara já no nível máximo!"); return; }
            const xpToUse = Math.min(nextXP-vara.xp, xpReservoir);
            vara.xp += xpToUse;
            xpReservoir -= xpToUse;
            if(vara.xp>=nextXP){
                vara.level++;
                vara.xp=0;
                let bonus = 0.8+Math.random()*0.4;
                vara.profit *= (1+bonus);
                alert(`${vara.name} subiu para Nível ${vara.level}! Lucro atualizado`);
            }
            updateUpgrade();
            updateVaraInfo();
        };

        div.appendChild(document.createElement("br"));
        div.appendChild(btnTransform);
        div.appendChild(btnUpgrade);
        upgradeDiv.appendChild(div);
    });
}

function updateVaraInfo(){
    const vara = getCurrentVara();
    if(!vara) return;
    const baseChance = 50;
    const chanceBonus = (vara.level-1)*(3+Math.random()*2);
    const chance = baseChance + chanceBonus;
    document.getElementById("currentVara").innerText = `${vara.name} (Nível ${vara.level})`;
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    const maxIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
    const minIdx = Math.max(0,maxIdx-1);
    const allowedFishes = fishes.filter(f=>{ const idx = rarities.indexOf(f.rarity); return idx<=maxIdx && idx>=minIdx;});
    const fishNames = allowedFishes.map(f=>f.name).join(", ");
    document.getElementById("varaStats").innerText = vara.name==="Bambu" ? `Peixes que pode pegar: ${fishNames}` : `Chance de captura: ${chance.toFixed(1)}%\nPeixes que pode pegar: ${fishNames}`;
}

// ===== BOXES =====
const boxTypes = ["Comum","Incomum","Rara","Epica","Lendaria","Mitica"];
const boxCosts = {"Comum":50,"Incomum":100,"Rara":150,"Epica":200,"Lendaria":250,"Mitica":300};
const boxChances = {
  "Comum":[{name:"Fibra",chance:80},{name:"Fibra Reforçada",chance:20}],
  "Incomum":[{name:"Grafite",chance:80},{name:"Grafite Reforçada",chance:20}],
  "Rara":[{name:"Carbono",chance:80},{name:"Carbono Reforçada",chance:20}],
  "Epica":[{name:"Titânio",chance:80},{name:"Titânio Reforçada",chance:20}],
  "Lendaria":[{name:"Platina",chance:80},{name:"Platina Reforçada",chance:20}],
  "Mitica":[{name:"Adamantium",chance:80},{name:"Adamantium Reforçada",chance:20}]
};

function addVaraToInventory(varaName){
    const baseProfit = varas[varaName][0].baseProfit;
    const newVara = {name:varaName,level:1,xp:0,profit:baseProfit};
    inventory.push(newVara);
    bolsa.push(newVara);
    updateBolsa();
    updateUpgrade();
    updateVaraInfo();
}

boxTypes.forEach(type=>{
    document.getElementById("box"+type).onclick = ()=>{
        if(sunBalance<boxCosts[type]){ alert("Saldo SFP2 insuficiente!"); return; }
        const drops = boxChances[type].map(i=>`${i.name} (${i.chance}%)`).join(", ");
        if(!confirm(`Abrir Box ${type} por ${boxCosts[type]} SFP2?\nPossíveis varas: ${drops}`)) return;
        sunBalance-=boxCosts[type];
        let rand=Math.random()*100, acc=0;
        for(const item of boxChances[type]){
            acc+=item.chance;
            if(rand<=acc){ addVaraToInventory(item.name); alert(`🎉 Você recebeu: ${item.name}`); break;}
        }
        updateWalletUI();
    }
});

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = function(){
  if(dailyCount>=dailyLimit){ alert("Limite diário atingido!"); return;}
  const vara=getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return;}
  fishButton.disabled=true; skipButton.style.display="inline-block";
  const fish=getRandomFishByVara(vara);
  result.innerText="Esperando o peixe morder a isca...";
  fishingTimeout=setTimeout(()=>{
    let pegar = Math.random()*100 < 50 + (vara.level-1)*4;
    if(pegar) sunBalance+=fish.value*(vara.profit/100);
    alert(pegar ? `Você pescou: ${fish.name} e ganhou ${(fish.value*(vara.profit/100)).toFixed(2)} SFP2` : `O peixe escapou!`);
    dailyCount++; document.getElementById("dailyCount").innerText=`Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    updateWalletUI(); fishButton.disabled=false; skipButton.style.display="none";
  },5000);
};

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout); fishingTimeout=null;
    const vara=getCurrentVara(); const fish=getRandomFishByVara(vara);
    let pegar=Math.random()*100 < 50 + (vara.level-1)*4;
    if(pegar) sunBalance+=fish.value*(vara.profit/100);
    alert(pegar ? `Você pescou: ${fish.name} e ganhou ${(fish.value*(vara.profit/100)).toFixed(2)} SFP2` : `O peixe escapou!`);
    dailyCount++; document.getElementById("dailyCount").innerText=`Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    updateWalletUI(); fishButton.disabled=false; skipButton.style.display="none";
  }
};

// ===== WALLET =====
function updateWalletUI(){ document.getElementById("money").innerText=`Saldo SFP2: ${sunBalance.toFixed(2)}`; }

// ===== TABS =====
const tabs=document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{ tab.onclick=()=>{ tabs.forEach(t=>t.classList.remove("selected")); tab.classList.add("selected"); document.querySelectorAll(".section").forEach(s=>s.classList.remove("active")); document.getElementById(tab.dataset.target).classList.add("active"); } });

// ===== INICIALIZAÇÃO =====
updateBolsa(); updateVaraInfo(); updateWalletUI(); updateUpgrade();
</script>
</body>
</html>
