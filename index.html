<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#f0f8ff); }
.container { max-width:600px; margin:0 auto; padding:20px; background:white; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
h1 { text-align:center; }
button { padding:10px 20px; margin:5px; font-size:16px; cursor:pointer; }
#log { margin-top:20px; background:#f9f9f9; padding:10px; border-radius:8px; height:250px; overflow-y:auto; }
select { padding:5px; margin:5px; font-size:16px; }
</style>
</head>
<body>
<div class="container">
<h1>Super Fishing</h1>
<p>Saldo: <span id="saldo">100000</span> SUN</p>

<h3>Box Rara (50 SUN)</h3>
<button onclick="abrirBox('rara')">Abrir Box</button>

<h3>Upgrade Vara</h3>
<select id="minhaVara"></select>
<button onclick="uparVara()">Up</button>
<button onclick="calcularROI()">Calcular ROI</button>

<div id="log"></div>
</div>

<script>
// saldo do jogador
let saldo = 100000;

// coleção de varas do jogador
let varas = [];

// configuração das boxes
const boxRara = [
  {nome:'Vara Comum', taxa:70, baseLucro:2},
  {nome:'Vara Média', taxa:20, baseLucro:4},
  {nome:'Vara Rara', taxa:9, baseLucro:8},
  {nome:'Vara Lendária', taxa:1, baseLucro:16},
];
const precoBox = 50; // R$ da box rara

function atualizarSaldo(){
  document.getElementById('saldo').innerText = saldo.toFixed(2);
}

// função para abrir box
function abrirBox(tipo){
  if(saldo < precoBox){ log('❌ Saldo insuficiente!'); return; }
  saldo -= precoBox;
  atualizarSaldo();
  
  let box;
  if(tipo==='rara') box = boxRara;

  let rnd = Math.random()*100;
  let acumulado=0;
  let dropped;
  for(let v of box){
    acumulado += v.taxa;
    if(rnd <= acumulado){
      // cria a vara com nível inicial, XP e lucro
      dropped = {...v, level:1, xp:0, xpParaUp:50, lucroAtual:v.baseLucro, custoAcumulado:precoBox};
      break;
    }
  }
  varas.push(dropped);
  atualizarSelect();
  log(`🎣 Parabéns! Você pegou a ${dropped.nome} lvl ${dropped.level}`);
}

// atualizar lista de varas para upgrade
function atualizarSelect(){
  let sel = document.getElementById('minhaVara');
  sel.innerHTML='';
  varas.forEach((v,i)=>{
    let opt = document.createElement('option');
    opt.value=i;
    opt.text = `${v.nome} lvl ${v.level} (Lucro: ${v.lucroAtual.toFixed(2)})`;
    sel.add(opt);
  });
}

// log
function log(msg){
  let l = document.getElementById('log');
  l.innerHTML += msg+'<br>';
  l.scrollTop = l.scrollHeight;
}

// upar vara
function uparVara(){
  let sel = document.getElementById('minhaVara');
  let idx = parseInt(sel.value);
  let v = varas[idx];
  if(!v){ log('Selecione uma vara'); return; }

  // XP necessário para o nível atual
  let xpReq = v.xpParaUp;

  // calcular quantas varas são necessárias para gerar XP
  let varasNecessarias = Math.ceil(xpReq / 50);

  if(varas.length-1 < varasNecessarias){
    log(`❌ Não há varas suficientes para upar (precisa sacrificar ${varasNecessarias})`);
    return;
  }

  // remover varas para XP
  let idxs = [];
  let count = 0;
  for(let i=0;i<varas.length;i++){
    if(i===idx) continue;
    idxs.push(i);
    count++;
    if(count>=varasNecessarias) break;
  }
  let sacrificadas = [];
  idxs.reverse().forEach(i=>{
    sacrificadas.push(varas.splice(i,1)[0]);
  });

  // aplicar aumento aleatório 80-120%
  let aumento = 0.8 + Math.random()*0.4;
  v.lucroAtual *= (1 + aumento);

  // atualizar nível e XP
  v.level +=1;
  v.xp = 0;
  v.xpParaUp *=2; // dobra XP necessário

  // atualizar custo acumulado
  v.custoAcumulado += precoBox * (varasNecessarias + 1);

  log(`✨ Sua ${v.nome} subiu para lvl ${v.level}! Lucro atual: ${v.lucroAtual.toFixed(2)} SUN/dia (aumento ${(aumento*100).toFixed(0)}%)`);
  log(`💀 Varas sacrificadas para XP: ${sacrificadas.map(x=>x.nome).join(', ')}`);
  atualizarSelect();
}

// calcular ROI mínimo e máximo
function calcularROI(){
  let sel = document.getElementById('minhaVara');
  let idx = parseInt(sel.value);
  let v = varas[idx];
  if(!v){ log('Selecione uma vara'); return; }

  let lucroMin = v.lucroAtual / 1.1; // aproximação 80%
  let lucroMax = v.lucroAtual * 1.1; // aproximação 120%

  let roiMin = (v.custoAcumulado / lucroMax).toFixed(2);
  let roiMax = (v.custoAcumulado / lucroMin).toFixed(2);

  log(`📊 ROI da ${v.nome} lvl ${v.level}: mínimo ${roiMin} dias, máximo ${roiMax} dias`);
}

atualizarSaldo();
atualizarSelect();
</script>
</body>
</html>
