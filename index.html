<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body {
  text-align:center;
  font-family: 'Comic Sans MS', Arial, sans-serif;
  background: linear-gradient(to bottom, #87ceeb, #ffffff);
  margin:0; 
  padding:20px;
}

h1 { color:#006994; text-shadow: 2px 2px #aee1f7; }
h3 { color:#004466; }

#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }

button {
  display:inline-block;
  background-color:#00aaff;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px 20px;
  font-size:16px;
  cursor:pointer;
  margin:5px;
  transition:0.2s;
}
button:hover { background-color:#0088cc; }

.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 0</h3>

<p id="result">Clique em pescar</p>
<button id="fishButton">🎣 PESCAR</button>
<button id="skipButton" style="display:none;">⏩ Pular espera</button>

<h3>Escolha sua vara:</h3>
<select id="varaSelect">
  <option value="Muito Comum">Vara de Bambu</option>
  <option value="Incomum">Vara de Fibra</option>
  <option value="Raro">Vara de Carbono</option>
  <option value="Épico">Vara de Grafite</option>
  <option value="Lendário">Vara Profissional do Oceano</option>
  <option value="Mítico">Vara Mestre do Oceano</option>
</select>

<script>
let money = 0
let fishingTimeout = null

const fishes = [
  // Muito Comum
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:3000},
  {name:"Anchova", value:1, rarity:"Muito Comum", time:3000},
  {name:"Peixinho-lua", value:1, rarity:"Muito Comum", time:3000},
  {name:"Tainha", value:1, rarity:"Muito Comum", time:3000},

  // Comum
  {name:"Robalo", value:2, rarity:"Comum", time:4000},
  {name:"Cavala", value:3, rarity:"Comum", time:4000},
  {name:"Corvina", value:3, rarity:"Comum", time:4000},
  {name:"Badejo-pequeno", value:2, rarity:"Comum", time:4000},

  // Incomum
  {name:"Atum", value:5, rarity:"Incomum", time:5000},
  {name:"Badejo", value:6, rarity:"Incomum", time:5000},
  {name:"Garoupa juvenil", value:6, rarity:"Incomum", time:5000},
  {name:"Cavala-real", value:5, rarity:"Incomum", time:5000},

  // Raro
  {name:"Garoupa adulta", value:10, rarity:"Raro", time:7000},
  {name:"Linguado", value:12, rarity:"Raro", time:7000},
  {name:"Pargo", value:10, rarity:"Raro", time:7000},
  {name:"Robalo-do-mar", value:12, rarity:"Raro", time:7000},

  // Épico
  {name:"Salmão do Atlântico", value:18, rarity:"Épico", time:9000},
  {name:"Dourado do mar", value:20, rarity:"Épico", time:9000},
  {name:"Cavalinha-real", value:18, rarity:"Épico", time:9000},
  {name:"Bonito", value:20, rarity:"Épico", time:9000},

  // Lendário
  {name:"Peixe-espada", value:30, rarity:"Lendário", time:12000},
  {name:"Tubarão", value:35, rarity:"Lendário", time:12000},
  {name:"Marlim-negro", value:32, rarity:"Lendário", time:12000},
  {name:"Marlim-azul jovem", value:35, rarity:"Lendário", time:12000},

  // Mítico
  {name:"Tubarão-branco adulto", value:60, rarity:"Mítico", time:15000},
  {name:"Marlim Azul", value:100, rarity:"Mítico", time:15000},
  {name:"Peixe-lua gigante", value:80, rarity:"Mítico", time:15000},
  {name:"Peixe-saberto", value:90, rarity:"Mítico", time:15000}
]

function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getRandomFishByVara(varaRarity){
  const allowed = fishes.filter(f => {
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    return rarities.indexOf(f.rarity) <= rarities.indexOf(varaRarity);
  })
  return allowed[Math.floor(Math.random() * allowed.length)]
}

const fishButton = document.getElementById("fishButton")
const skipButton = document.getElementById("skipButton")
const result = document.getElementById("result")
const varaSelect = document.getElementById("varaSelect")

fishButton.onclick = function(){
  fishButton.disabled = true
  skipButton.style.display = "inline-block"
  
  const varaRarity = varaSelect.value
  const fish = getRandomFishByVara(varaRarity)
  
  result.innerText = "Esperando o peixe morder a isca..."
  
  fishingTimeout = setTimeout(() => {
    money += fish.value
    result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    document.getElementById("money").innerText = "Saldo: " + money
    fishButton.disabled = false
    skipButton.style.display = "none"
  }, fish.time)
}

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout)
    fishingTimeout = null
    const varaRarity = varaSelect.value
    const fish = getRandomFishByVara(varaRarity)
    money += fish.value
    result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    document.getElementById("money").innerText = "Saldo: " + money
    fishButton.disabled = false
    skipButton.style.display = "none"
  }
}
</script>

</body>
</html>
