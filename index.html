<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SFP2: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (50 SFP2)</button>
    <button id="boxIncomum">📦 Box Incomum (100 SFP2)</button>
    <button id="boxRara">📦 Box Rara (150 SFP2)</button>
    <button id="boxEpica">📦 Box Épica (200 SFP2)</button>
    <button id="boxLendaria">📦 Box Lendária (250 SFP2)</button>
    <button id="boxMitica">📦 Box Mítica (300 SFP2)</button>
  </div>
</div>

<!-- UPGRADE -->
<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <p>Em breve...</p>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 100000;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;

// ===== VARAS =====
const varas = {
  "Bambu":[{rarity:"Muito Comum", profit:0.07}],
  "Fibra":[{rarity:"Comum", profit:1}],
  "Fibra Reforçada":[{rarity:"Comum", profit:1.05}],
  "Grafite":[{rarity:"Incomum", profit:1}],
  "Grafite Reforçada":[{rarity:"Incomum", profit:1.05}],
  "Carbono":[{rarity:"Raro", profit:1}],
  "Carbono Reforçada":[{rarity:"Raro", profit:1.05}],
  "Titânio":[{rarity:"Épico", profit:1}],
  "Titânio Reforçada":[{rarity:"Épico", profit:1.05}],
  "Platina":[{rarity:"Lendário", profit:1}],
  "Platina Reforçada":[{rarity:"Lendário", profit:1.05}],
  "Adamantium":[{rarity:"Mítico", profit:1}],
  "Adamantium Reforçada":[{rarity:"Mítico", profit:1.05}]
};

// ===== PEIXES =====
const fishes = {
  "Muito Comum":[
    {name:"Sardinha", value:0.06}
  ],
  "Comum":[
    {name:"Robalo", value:0.05},
    {name:"Tainha", value:0.10},
    {name:"Corvina", value:0.15}
  ],
  "Incomum":[
    {name:"Atum", value:0.05},
    {name:"Garoupa pequena", value:0.10},
    {name:"Pargo", value:0.15}
  ],
  "Raro":[
    {name:"Garoupa adulta", value:0.05},
    {name:"Outro Raro 2", value:0.10},
    {name:"Outro Raro 3", value:0.15}
  ],
  "Épico":[
    {name:"Salmão do Atlântico", value:0.05},
    {name:"Truta", value:0.10},
    {name:"Outro Épico 3", value:0.15}
  ],
  "Lendário":[
    {name:"Tubarão", value:0.05},
    {name:"Outro Lendário 2", value:0.10},
    {name:"Outro Lendário 3", value:0.15}
  ],
  "Mítico":[
    {name:"Marlim Azul", value:0.05},
    {name:"Outro Mítico 2", value:0.10},
    {name:"Outro Mítico 3", value:0.15}
  ]
};

let inventory = [{name:"Bambu"}];
let bolsa = [...inventory];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFish(vara){
  let fishList = fishes[varas[vara.name][0].rarity];
  if(vara.name === "Bambu") fishList = [fishList[0]]; // só Sardinha
  const fish = fishList[Math.floor(Math.random()*fishList.length)];
  if(Math.random() <= 0.5) return fish; // 50% chance de captura
  return null;
}

// ===== BOLSA =====
function setActiveVara(idx){
    currentVaraIndex = idx;
    updateVaraInfo();
    updateBolsa();
}

function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    bolsa.forEach((v, idx) => {
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = v.name;
        btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
        btn.onclick = () => setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

function fishAction(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }

  const fish = getRandomFish(vara);
  if(fish){
    sunBalance += fish.value * varas[vara.name][0].profit;
    alert(`🎉 Você pescou: ${fish.name} e ganhou ${(fish.value*varas[vara.name][0].profit).toFixed(3)} SFP2`);
  } else {
    alert("O peixe escapou!");
  }

  dailyCount++;
  document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/15`;
  updateWalletUI();
}

fishButton.onclick = function(){
  fishButton.disabled = true;
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    fishAction();
    result.innerText = "Clique em pescar";
    fishButton.disabled = false;
  },5000);
};

skipButton.onclick = function(){
  if(fishingTimeout) clearTimeout(fishingTimeout);
  fishAction();
  result.innerText = "Clique em pescar";
  fishButton.disabled = false;
};

// ===== LOJA =====
const boxTypes = ["Comum","Incomum","Rara","Epica","Lendaria","Mitica"];
const boxCosts = {"Comum":50,"Incomum":100,"Rara":150,"Epica":200,"Lendaria":250,"Mitica":300};
const boxChances = {
  "Comum":[ {name:"Fibra", chance:80},{name:"Fibra Reforçada", chance:20} ],
  "Incomum":[ {name:"Grafite", chance:80},{name:"Grafite Reforçada", chance:20} ],
  "Rara":[ {name:"Carbono", chance:80},{name:"Carbono Reforçada", chance:20} ],
  "Epica":[ {name:"Titânio", chance:80},{name:"Titânio Reforçada", chance:20} ],
  "Lendaria":[ {name:"Platina", chance:80},{name:"Platina Reforçada", chance:20} ],
  "Mitica":[ {name:"Adamantium", chance:80},{name:"Adamantium Reforçada", chance:20} ]
};

function addVaraToInventory(varaName){
    inventory.push({name:varaName});
    bolsa.push({name:varaName});
    updateBolsa();
}

boxTypes.forEach(type=>{
    document.getElementById("box"+type).onclick = ()=>{
        if(sunBalance < boxCosts[type]){ alert("Saldo insuficiente!"); return; }
        const drops = boxChances[type].map(i=>`${i.name} (${i.chance}%)`).join(", ");
        if(!confirm(`Abrir Box ${type} por ${boxCosts[type]} SFP2?\nPossíveis varas: ${drops}\nTem certeza?`)) return;
        sunBalance -= boxCosts[type];
        let rand = Math.random()*100;
        let acc = 0;
        for(const item of boxChances[type]){
            acc += item.chance;
            if(rand <= acc){
                addVaraToInventory(item.name);
                alert(`🎉 Você recebeu: ${item.name}`);
                break;
            }
        }
        updateWalletUI();
    }
});

// ===== VARA ATIVA =====
function updateVaraInfo(){
    const vara = getCurrentVara();
    if(!vara) {
        document.getElementById("currentVara").innerText = "Nenhuma vara ativa";
        document.getElementById("varaStats").innerText = "";
        return;
    }
    const fishList = fishes[varas[vara.name][0].rarity].map(f=>f.name).join(", ");
    document.getElementById("currentVara").innerText = `${vara.name}`;
    document.getElementById("varaStats").innerText = `Peixes que pode pegar: ${fishList}`;
}

// ===== WALLET =====
function updateWalletUI(){ document.getElementById("money").innerText = `Saldo SFP2: ${sunBalance.toFixed(3)}`; }

// ===== TABS =====
const tabs = document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    tabs.forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// ===== INICIALIZA =====
updateBolsa();
updateVaraInfo();
updateWalletUI();

});
</script>
</body>
</html>
