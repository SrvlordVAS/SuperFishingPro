<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { cursor:pointer; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:14px; border-radius:10px 10px 0 0; }
#bottomMenu button { flex:1; margin:0 5px; padding:10px 0; font-size:14px; border:none; border-radius:10px; background:#00aaff; color:white; }
.selected { background-color:#ffcc00 !important; color:black !important; }
#bolsaContainer { width:90%; max-width:400px; margin:0 auto; }
.bolsa-top, .bolsa-bottom { border:1px solid #004466; padding:8px; border-radius:8px; background:#e0f7ff; margin-bottom:8px; }
#bolsaMenu, #bolsaVaras { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
.bag-item { background:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; }
#shopContainer { width:90%; max-width:400px; margin:0 auto; }
.shop-top, .shop-bottom, .shop-buy { border:1px solid #004466; padding:10px; border-radius:10px; background:#e0f7ff; margin-bottom:8px; }
#shopMenu { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.box-card { width:90px; height:90px; border-radius:10px; background:linear-gradient(145deg,#00aaff,#0077aa); display:flex; align-items:center; justify-content:center; color:white; font-size:12px; text-align:center; cursor:pointer; transition:0.2s; box-shadow:0 3px 6px rgba(0,0,0,0.3); }
.box-card:hover { transform:scale(1.05); }
.box-selected { border:3px solid gold; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>

  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div class="bolsa-top">
      <div id="bolsaMenu"></div>
    </div>
    <div class="bolsa-bottom">
      <div id="bolsaVaras"></div>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <p>Saldo SFP: <span id="saldoSFP">0</span></p>
  <div id="shopContainer">
    <div class="shop-top">
      <div id="shopMenu"></div>
    </div>
    <div class="shop-bottom" id="shopContent">Selecione uma box</div>
    <div class="shop-buy">
      <button id="buyBox">Comprar Box</button>
    </div>
  </div>
</div>

<!-- MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  let dailyCount = 0;
  const dailyLimit = 15;
  let fishingTimeout = null;
  let userAddress = null;
  let saldoSFP = 0;
  let selectedRarity = "Comum";
  let currentVaraIndex = 0;

  const raridades = ["Comum","Incomum","Rara","Épica","Lendária","Mítica"];
  let bolsa = [
    {name:"Bambu", captureRate:50, fishes:["Sardinha"], fishValues:[0.06], rarity:"Vara Free"}
  ];

  let boxes = [
    {rarity:"Comum", price:50, varas:["Fibra","Fibra Reforçada"], fishes:["Tilápia","Bagre","Carpa"], fishValues:[0.083,0.111,0.167]},
    {rarity:"Incomum", price:100, varas:["Grafite","Grafite Reforçada"], fishes:["Pargo","Dourado","Pescada"], fishValues:[0.167,0.222,0.333]},
    {rarity:"Rara", price:150, varas:["Carbono","Carbono Reforçada"], fishes:["Robalo","Anchova","Garoupa"], fishValues:[0.25,0.333,0.5]}
  ];

  function getCurrentVara(){ return bolsa[currentVaraIndex]; }
  function setActiveVara(idx){ currentVaraIndex = idx; updateBolsaVaras(); updateVaraInfo(); }

  function updateBolsaMenu(){
    const menu = document.getElementById("bolsaMenu"); menu.innerHTML = "";
    const freeBtn = document.createElement("button");
    freeBtn.innerText = "Vara Free"; freeBtn.className = "bag-item";
    freeBtn.onclick = ()=>{ selectedRarity="Vara Free"; updateBolsaMenu(); updateBolsaVaras(); };
    menu.appendChild(freeBtn);
    raridades.forEach(r=>{
      const btn = document.createElement("button"); btn.innerText = r; btn.className="bag-item";
      btn.onclick=()=>{ selectedRarity=r; updateBolsaMenu(); updateBolsaVaras(); };
      menu.appendChild(btn);
    });
  }

  function updateBolsaVaras(){
    const div=document.getElementById("bolsaVaras"); div.innerHTML="";
    bolsa.forEach((v,idx)=>{
      if(v.rarity===selectedRarity || (selectedRarity==="Vara Free" && v.name==="Bambu")){
        const btn=document.createElement("button"); btn.innerText=v.name; btn.className="bag-item";
        btn.onclick=()=>setActiveVara(idx); div.appendChild(btn);
      }
    });
  }

  function updateVaraInfo(){
    const vara=getCurrentVara(); if(!vara) return;
    document.getElementById("currentVara").innerText=`Vara ativa: ${vara.name}`;
    document.getElementById("varaStats").innerText=`Peixes: ${vara.fishes.join(", ")} | Taxa: ${vara.captureRate}%`;
  }

  function getRandomFishByVara(vara){
    const rnd=Math.random()*100;
    const idx=Math.floor(Math.random()*vara.fishes.length);
    if(rnd<=vara.captureRate){
      // Envia para a carteira do Telegram
      if(userAddress) sendToWallet(vara.fishValues[idx]);
      saldoSFP += vara.fishValues[idx];
      return {name:vara.fishes[idx], value:vara.fishValues[idx]};
    }
    return null;
  }

  const fishButton=document.getElementById("fishButton");
  const skipButton=document.getElementById("skipButton");
  const result=document.getElementById("result");

  function fishAction(){
    if(dailyCount>=dailyLimit){ alert("Limite diário atingido!"); return; }
    const vara=getCurrentVara();
    const fish=getRandomFishByVara(vara);
    if(fish) alert(`🎉 Você pescou: ${fish.name} | Valor: ${fish.value.toFixed(3)} SFP`);
    else alert("O peixe escapou!");
    dailyCount++;
    document.getElementById("dailyCount").innerText=`Tentativas hoje: ${dailyCount}/15`;
    skipButton.style.display="none"; fishButton.disabled=false; result.innerText="Clique em pescar";
    updateSaldoDisplay();
  }

  fishButton.onclick=function(){
    if(dailyCount>=dailyLimit){ alert("Limite diário atingido!"); return; }
    fishButton.disabled=true; result.innerText="Esperando..."; skipButton.style.display="inline-block";
    fishingTimeout=setTimeout(fishAction,5000);
  };
  skipButton.onclick=function(){ clearTimeout(fishingTimeout); fishAction(); };

  function updateShopMenu(){
    const menu=document.getElementById("shopMenu"); menu.innerHTML="";
    boxes.forEach(box=>{
      const card=document.createElement("div"); card.className="box-card"; card.innerText="Box "+box.rarity;
      card.onclick=()=>{ selectedShop=box; updateShopContent(); };
      menu.appendChild(card);
    });
  }

  let selectedShop=null;
  function updateShopContent(){
    const content=document.getElementById("shopContent");
    if(!selectedShop){ content.innerText="Selecione uma box"; return; }
    content.innerText=`Varas na box: ${selectedShop.varas.join(", ")}\nPreço da box: ${selectedShop.price} SFP`;
  }

  document.getElementById("buyBox").onclick=function(){
    if(!selectedShop){ alert("Selecione uma box"); return; }
    if(saldoSFP<selectedShop.price){ alert("Saldo insuficiente"); return; }
    saldoSFP-=selectedShop.price;
    const dropRnd=Math.random()*100;
    let varaRecebida=dropRnd<=80 ? selectedShop.varas[0]:selectedShop.varas[1];
    bolsa.push({name:varaRecebida, captureRate:dropRnd<=80?50:60, fishes:selectedShop.fishes, fishValues:selectedShop.fishValues, rarity:selectedShop.rarity});
    alert(`🎉 Parabéns! Você ganhou a vara ${varaRecebida}`);
    updateBolsaVaras(); updateSaldoDisplay();
    // envia SFP gasto para a wallet do jogo
    if(userAddress) sendToWallet(-selectedShop.price);
  };

  function updateSaldoDisplay(){ document.getElementById("saldoSFP").innerText=saldoSFP.toFixed(3); }

  // ================= TELEGRAM WALLET =================

let _apiUrl = "";
let _telegramId = "";

// Recebe dados do Mini App (saldo real + API URL)
window.addEventListener("message", function(event) {
  if (event.origin !== "https://srvlordvas.github.io" && 
      !event.origin.includes("replit")) return;

  if (event.data?.type === "SFP_INIT") {
    _telegramId = String(event.data.telegramId);
    _apiUrl = event.data.apiUrl;
    saldoSFP = Number(event.data.sfpBalance) || 0;
    updateSaldoDisplay();
    console.log("✅ Dados recebidos do Mini App:", _telegramId, saldoSFP);
  }
});

document.addEventListener("DOMContentLoaded", () => {
  // Tenta pegar telegramId direto do Telegram WebApp também
  if (window.Telegram?.WebApp?.initDataUnsafe?.user?.id) {
    _telegramId = String(window.Telegram.WebApp.initDataUnsafe.user.id);
  }
});

// Busca saldo real do backend
async function getWalletBalance(telegramId) {
  if (!_apiUrl || !telegramId) return 0;
  try {
    const res = await fetch(`${_apiUrl}/users/${telegramId}`);
    if (!res.ok) return 0;
    const data = await res.json();
    return Number(data.sfpBalance) || 0;
  } catch (e) {
    console.error("Erro ao buscar saldo:", e);
    return 0;
  }
}

// Atualiza saldo no backend quando pesca ou compra
async function sendToWallet(amount) {
  if (!_apiUrl || !_telegramId) return;
  try {
    if (amount > 0) {
      // Ganhou SFP (pescou)
      await fetch(`${_apiUrl}/transactions/deposit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ telegramId: _telegramId, amountTon: amount / 100 })
      });
    } else if (amount < 0) {
      // Gastou SFP (comprou item)
      await fetch(`${_apiUrl}/transactions/withdraw`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ telegramId: _telegramId, amountSfp: Math.abs(amount) })
      });
    }
    // Avisa o Mini App que o saldo mudou
    window.parent.postMessage({ type: "SFP_BALANCE_UPDATED" }, "*");
  } catch (e) {
    console.error("Erro ao atualizar saldo:", e);
  }
}

  // Funções simuladas para envio e recebimento de tokens
  async function sendToWallet(amount){
    // Aqui você chama a API do bot/backend para adicionar/remover SFP real do usuário
    console.log("Enviar para wallet:", amount);
  }

  async function getWalletBalance(address){
    // Aqui você chama a API do backend para pegar saldo real
    return 100; // EXEMPLO: retorna 100 SFP
  }

  // ================= TABS =================
  document.querySelectorAll(".tabButton").forEach(tab=>{
    tab.onclick=()=>{
      document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
      document.getElementById(tab.dataset.target).classList.add("active");
      document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
      tab.classList.add("selected");
    };
  });

  // INIT
  updateBolsaMenu(); updateBolsaVaras(); updateVaraInfo(); updateShopMenu(); updateShopContent(); updateSaldoDisplay();

});
</script>
</body>
</html>
