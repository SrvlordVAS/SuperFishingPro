<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #shop, #upgradeBag, #bag { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<!-- Seções -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara atual: <span id="currentVara">Vara de Bambu (Nível 1)</span></p>
</div>

<div id="inventorySection" class="section">
  <h3>Inventário</h3>
  <div id="inventory"></div>
  <h4>Bolsa de varas</h4>
  <div id="bag"></div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgradeBag"></div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum</button>
    <button id="boxRara">📦 Box Rara</button>
    <button id="boxEpica">📦 Box Épica</button>
    <button id="boxLendaria">📦 Box Lendária</button>
  </div>
</div>

<!-- Menu inferior -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="inventorySection">🎒 Inventário</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999;
let fishingTimeout = null;

// Varas
const varas = {
  "Bambu":[{level:1,maxRarity:"Muito Comum"},{level:2,maxRarity:"Muito Comum"},{level:3,maxRarity:"Muito Comum"},{level:4,maxRarity:"Muito Comum"},{level:5,maxRarity:"Muito Comum"}],
  "Fibra":[{level:1,maxRarity:"Comum"},{level:2,maxRarity:"Comum"},{level:3,maxRarity:"Comum"},{level:4,maxRarity:"Comum"},{level:5,maxRarity:"Comum"}],
  "Grafite":[{level:1,maxRarity:"Incomum"},{level:2,maxRarity:"Incomum"},{level:3,maxRarity:"Incomum"},{level:4,maxRarity:"Incomum"},{level:5,maxRarity:"Incomum"}],
  "Carbono":[{level:1,maxRarity:"Raro"},{level:2,maxRarity:"Raro"},{level:3,maxRarity:"Raro"},{level:4,maxRarity:"Raro"},{level:5,maxRarity:"Raro"}],
  "Titânio":[{level:1,maxRarity:"Épico"},{level:2,maxRarity:"Épico"},{level:3,maxRarity:"Épico"},{level:4,maxRarity:"Épico"},{level:5,maxRarity:"Épico"}],
  "Platina":[{level:1,maxRarity:"Lendário"},{level:2,maxRarity:"Lendário"},{level:3,maxRarity:"Lendário"},{level:4,maxRarity:"Lendário"},{level:5,maxRarity:"Lendário"}],
  "Adamantium":[{level:1,maxRarity:"Mítico"},{level:2,maxRarity:"Mítico"},{level:3,maxRarity:"Mítico"},{level:4,maxRarity:"Mítico"},{level:5,maxRarity:"Mítico"}]
};

// Peixes
const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:2, rarity:"Comum", time:4000},
  {name:"Atum", value:5, rarity:"Incomum", time:5000},
  {name:"Garoupa adulta", value:10, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:18, rarity:"Épico", time:9000},
  {name:"Peixe-espada", value:30, rarity:"Lendário", time:12000},
  {name:"Marlim Azul", value:100, rarity:"Mítico", time:15000}
];

// Inventário inicial
let inventory = [{name:"Bambu",level:1}];
let bag = []; // bolsa
let currentVaraIndex = 0;

function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getCurrentVara(){ return inventory[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const allowed = fishes.filter(f => {
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    return rarities.indexOf(f.rarity) <= rarities.indexOf(varas[vara.name][vara.level-1].maxRarity);
  });
  return allowed[Math.floor(Math.random()*allowed.length)];
}

// Atualiza inventário e bolsa
function updateInventoryDisplay(){
  const invDiv = document.getElementById("inventory");
  invDiv.innerHTML = "";
  const v = getCurrentVara();
  const btn = document.createElement("button");
  btn.innerText = `${v.name} (Nível ${v.level})`;
  btn.classList.add("selected");
  invDiv.appendChild(btn);

  // Bolsa
  const bagDiv = document.getElementById("bag");
  bagDiv.innerHTML = "";
  bag.forEach((b,i)=>{
    const bbtn = document.createElement("button");
    bbtn.innerText = `${b.name} (Nível ${b.level})`;
    bbtn.onclick = function(){
      // troca com a vara ativa
      bag.push(getCurrentVara());
      inventory[currentVaraIndex] = bag.splice(i,1)[0];
      updateInventoryDisplay();
      document.getElementById("currentVara").innerText = `${getCurrentVara().name} (Nível ${getCurrentVara().level})`;
    };
    bagDiv.appendChild(bbtn);
  });

  updateUpgradeBag();
}

// Upgrade
function updateUpgradeBag(){
  const upDiv = document.getElementById("upgradeBag");
  upDiv.innerHTML = "";
  // Agrupa por nome e nível
  let grouped = {};
  bag.forEach((v,i)=>{
    if(v.name === "Bambu") return;
    const key = v.name + "_lvl" + v.level;
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push({vara:v,index:i});
  });

  for(const key in grouped){
    const group = grouped[key];
    if(group.length <2) continue;
    const v = group[0].vara;
    const nextLevel = v.level +1;
    if(nextLevel > varas[v.name].length) continue;
    const btn = document.createElement("button");
    btn.innerText = `${v.name} (Nível ${v.level}) → Nível ${nextLevel} (consome 2 varas)`;
    btn.onclick = function(){
      if(confirm(`Deseja upar 2x ${v.name} (Nível ${v.level}) para Nível ${nextLevel}?`)){
        const idx1 = group[0].index;
        const idx2 = group[1].index;
        if(idx1>idx2){ bag.splice(idx1,1); bag.splice(idx2,1);}
        else{ bag.splice(idx2,1); bag.splice(idx1,1);}
        const newVara = {name:v.name, level:nextLevel};
        bag.push(newVara);
        updateInventoryDisplay();
        alert("Upgrade realizado! Nova vara adicionada à bolsa.");
      }
    };
    upDiv.appendChild(btn);
  }
  if(upDiv.innerHTML==="") upDiv.innerHTML="<p>Nenhuma vara disponível para upgrade.</p>";
}

// Box
document.getElementById("boxComum").onclick = ()=>openBox("Comum");
document.getElementById("boxRara").onclick = ()=>openBox("Rara");
document.getElementById("boxEpica").onclick = ()=>openBox("Epica");
document.getElementById("boxLendaria").onclick = ()=>openBox("Lendaria");

function getVarasForBox(type){
  let list = [];
  for(const v in varas){
    if(v==="Bambu") continue;
    if(type==="Comum" && ["Fibra","Grafite"].includes(v)) list.push({name:v,level:1});
    if(type==="Rara" && ["Fibra","Grafite","Carbono"].includes(v)) list.push({name:v,level:1});
    if(type==="Epica" && ["Grafite","Carbono","Titânio"].includes(v)) list.push({name:v,level:1});
    if(type==="Lendaria" && ["Titânio","Platina","Adamantium"].includes(v)) list.push({name:v,level:1});
  }
  return list;
}

function openBox(type){
  const list = getVarasForBox(type);
  if(list.length===0){ alert("Nenhuma vara disponível!"); return;}
  const selected = list[Math.floor(Math.random()*list.length)];
  bag.push(selected);
  updateInventoryDisplay();
  alert(`Você ganhou uma vara: ${selected.name} (Nível ${selected.level})`);
}

// Pescar
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

fishButton.onclick = function(){
  fishButton.disabled = true;
  skipButton.style.display = "inline-block";
  const vara = getCurrentVara();
  const fish = getRandomFishByVara(vara);
  result.innerText = "Esperando o peixe morder a isca...";
  fishingTimeout = setTimeout(()=>{
    if(Math.random()*100 <50){
      alert("O peixe escapou! 😢");
    } else {
      money += fish.value;
      document.getElementById("money").innerText = "Saldo: "+money;
      result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`;
    }
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }, fish.time);
};

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout);
    fishingTimeout = null;
    const vara = getCurrentVara();
    const fish = getRandomFishByVara(vara);
    if(Math.random()*100 <50){
      alert("O peixe escapou! 😢");
    } else {
      money += fish.value;
      document.getElementById("money").innerText = "Saldo: "+money;
      result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`;
    }
    fishButton.disabled = false;
    skipButton.style.display = "none";
  }
};

// Abas
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick = function(){
    const target = this.dataset.target;
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(target).classList.add("active");
  }
});

updateInventoryDisplay();
document.getElementById("currentVara").innerText = `${getCurrentVara().name} (Nível ${getCurrentVara().level})`;

});
</script>
</body>
</html>
