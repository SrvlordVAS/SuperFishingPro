<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #shop { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
#activeVaraDisplay { font-size:20px; font-weight:bold; margin-bottom:10px; }
#bagItems { display:none; margin-top:10px; border:1px solid #004466; padding:5px; border-radius:8px; background:#c0e8ff; }
#bagToggle { margin:5px; cursor:pointer; background:#0088cc; color:white; padding:5px 10px; border-radius:5px; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<!-- Seções -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara ativa: <span id="currentVara">Vara de Bambu (Nível 1)</span></p>
</div>

<div id="inventorySection" class="section">
  <h3>Inventário</h3>
  <div id="activeVaraDisplay">Vara ativa: Vara de Bambu (Lvl 1)</div>
  <div id="bagToggle">📦 Abrir bolsa</div>
  <div id="bagItems"></div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgradeBag"></div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum</button>
    <button id="boxRara">📦 Box Rara</button>
    <button id="boxEpica">📦 Box Épica</button>
    <button id="boxEpica2">📦 Box Lendária</button>
  </div>
</div>

<!-- Menu inferior -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="inventorySection">🎒 Inventário</button>
  <button class="tabButton" data-target="upgradeSection">⚡ Upgrade</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999
let fishingTimeout = null

// Varas
const varas = {
  "Bambu":[{level:1, chance:50},{level:2, chance:40},{level:3, chance:30},{level:4, chance:20},{level:5, chance:10}],
  "Fibra":[{level:1, chance:50},{level:2, chance:40},{level:3, chance:30},{level:4, chance:20},{level:5, chance:10}],
  "Grafite":[{level:1, chance:50},{level:2, chance:40},{level:3, chance:30},{level:4, chance:20},{level:5, chance:10}],
  "Carbono":[{level:1, chance:50},{level:2, chance:40},{level:3, chance:30},{level:4, chance:20},{level:5, chance:10}],
  "Titânio":[{level:1, chance:50},{level:2, chance:40},{level:3, chance:30},{level:4, chance:20},{level:5, chance:10}],
  "Platina":[{level:1, chance:50},{level:2, chance:40},{level:3, chance:30},{level:4, chance:20},{level:5, chance:10}],
  "Adamantium":[{level:1, chance:50},{level:2, chance:40},{level:3, chance:30},{level:4, chance:20},{level:5, chance:10}]
};

// Peixes
const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:2, rarity:"Comum", time:4000},
  {name:"Atum", value:5, rarity:"Incomum", time:5000},
  {name:"Garoupa adulta", value:10, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:18, rarity:"Épico", time:9000},
  {name:"Peixe-espada", value:30, rarity:"Lendário", time:12000},
  {name:"Tubarão-branco adulto", value:60, rarity:"Mítico", time:15000}
];

// Inventário
let activeVara = {name:"Bambu", level:1}
let bag = []

function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum";
    case "Comum": return "fish-comum";
    case "Incomum": return "fish-incomum";
    case "Raro": return "fish-raro";
    case "Épico": return "fish-epico";
    case "Lendário": return "fish-lendario";
    case "Mítico": return "fish-mitico";
    default: return "";
  }
}

function getRandomFishByVara(vara){
  const allowed = fishes.filter(f => {
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    return rarities.indexOf(f.rarity) <= rarities.indexOf(vara.name==="Bambu"?"Muito Comum":vara.level>0?"Mítico":"Muito Comum");
  })
  return allowed[Math.floor(Math.random()*allowed.length)]
}

// INVENTÁRIO E BOLSA
function updateInventoryDisplay(){
  document.getElementById("activeVaraDisplay").innerText = `Vara ativa: ${activeVara.name} (Lvl ${activeVara.level})`
  document.getElementById("currentVara").innerText = `${activeVara.name} (Lvl ${activeVara.level})`
  const bagDiv = document.getElementById("bagItems")
  bagDiv.innerHTML = ""
  bag.forEach((v,i)=>{
    const btn = document.createElement("button")
    btn.innerText = `${v.name} (Lvl ${v.level})`
    btn.onclick = function(){
      let temp = activeVara
      activeVara = v
      bag[i] = temp
      updateInventoryDisplay()
    }
    bagDiv.appendChild(btn)
  })
  updateUpgradeDisplay()
}

// TOGGLE BOLSA
document.getElementById("bagToggle").onclick = function(){
  const bagDiv = document.getElementById("bagItems")
  bagDiv.style.display = bagDiv.style.display==="none"?"block":"none"
}

// UPGRADE
function updateUpgradeDisplay(){
  const upgradeDiv = document.getElementById("upgradeBag")
  upgradeDiv.innerHTML = ""
  let count = {}
  bag.forEach(v=>{
    const key = v.name+"_"+v.level
    if(!count[key]) count[key]=0
    count[key]++
  })
  for(let key in count){
    if(count[key]>1 && !key.startsWith("Bambu")){
      const [name, level] = key.split("_")
      const btn = document.createElement("button")
      btn.innerText = `Upgrade ${name} Lvl ${level} → Lvl ${parseInt(level)+1}`
      btn.onclick = function(){
        if(confirm("Confirmar upgrade? Duas varas serão consumidas")){
          // Remove duas varas do bag
          let removed = 0
          bag = bag.filter(v=>{
            if(v.name===name && v.level==level && removed<2){ removed++; return false }
            return true
          })
          // Adiciona nova
          bag.push({name:name, level:parseInt(level)+1})
          updateInventoryDisplay()
          alert("Upgrade realizado!")
        }
      }
      upgradeDiv.appendChild(btn)
    }
  }
}

// BOX
function openBox(type){
  let options = []
  if(type==="Comum") options=["Fibra","Grafite"]
  if(type==="Rara") options=["Grafite","Carbono"]
  if(type==="Epica") options=["Carbono","Titânio"]
  if(type==="Lendaria") options=["Platina","Adamantium"]
  const selected = options[Math.floor(Math.random()*options.length)]
  bag.push({name:selected, level:1})
  updateInventoryDisplay()
  alert(`Você ganhou uma vara: ${selected} (Lvl 1)`)
}
document.getElementById("boxComum").onclick = ()=>openBox("Comum")
document.getElementById("boxRara").onclick = ()=>openBox("Rara")
document.getElementById("boxEpica").onclick = ()=>openBox("Epica")
document.getElementById("boxEpica2").onclick = ()=>openBox("Lendaria")

// PESCA
const fishButton = document.getElementById("fishButton")
const skipButton = document.getElementById("skipButton")
const result = document.getElementById("result")

fishButton.onclick = function(){
  fishButton.disabled = true
  skipButton.style.display = "inline-block"
  const fish = getRandomFishByVara(activeVara)
  result.innerText = "Esperando o peixe morder a isca..."
  fishingTimeout = setTimeout(()=>{
    money += fish.value
    document.getElementById("money").innerText = "Saldo: " + money
    result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    fishButton.disabled = false
    skipButton.style.display = "none"
  }, fish.time)
}

skipButton.onclick = function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout)
    fishingTimeout = null
    const fish = getRandomFishByVara(activeVara)
    money += fish.value
    document.getElementById("money").innerText = "Saldo: " + money
    result.innerHTML = `Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    fishButton.disabled = false
    skipButton.style.display = "none"
  }
}

// ABAS
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick = function(){
    const target = this.dataset.target
    document.querySelectorAll(".section").forEach(sec=>{
      sec.classList.remove("active")
    })
    document.getElementById(target).classList.add("active")
  }
})

updateInventoryDisplay()

})
</script>
</body>
</html>
