<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { cursor:pointer; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }

#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:8px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:14px; border-radius:12px 12px 0 0; }
#bottomMenu button { flex:1; margin:0 5px; padding:10px 0; font-size:16px; border:none; background:#00aaff; color:white; border-radius:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }

/* ===== BOLSA ===== */
#bolsaContainer { width:90%; max-width:400px; margin:0 auto; }

.bolsa-top, .bolsa-bottom {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#bolsaMenu, #bolsaVaras {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
}

.bag-item {
  background:#00aaff;
  color:white;
  border:none;
  border-radius:5px;
  padding:5px 8px;
}

/* ===== SHOP ===== */
#shopContainer { width:90%; max-width:400px; margin:0 auto; }

.shop-top, .shop-bottom, #shopBuy {
  border:1px solid #004466;
  padding:10px;
  border-radius:10px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#shopMenu {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

.box-card {
  width:90px;
  height:90px;
  border-radius:10px;
  background:linear-gradient(145deg,#00aaff,#0077aa);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 3px 6px rgba(0,0,0,0.3);
}

.box-card:hover {
  transform:scale(1.05);
}

.box-selected {
  border:3px solid gold;
}

#shopContent {
  text-align:center;
  font-size:14px;
}

#shopBuy button {
  width:100%;
  padding:10px 0;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#00aa00;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

#shopBuy button:hover { background:#008800; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>

  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div class="bolsa-top">
      <div id="bolsaMenu"></div>
    </div>
    <div class="bolsa-bottom">
      <div id="bolsaVaras"></div>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopContainer">
    <div class="shop-top">
      <div id="shopMenu"></div>
    </div>
    <div class="shop-bottom">
      <div id="shopContent">Selecione uma box</div>
    </div>
    <div id="shopBuy">
      <button id="buyButton">Comprar Vara(s)</button>
    </div>
  </div>
</div>

<!-- CARTEIRA -->
<div id="walletSection" class="section">
  <h3>Carteira</h3>
  <p>Saldo: <span id="walletBalance">5000</span> SFP2</p>
</div>

<!-- MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="walletSection">💰 Carteira</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;

// ===== VARAS =====
let bolsa = [{name:"Bambu", profit:100, captureRate:50, fishes:["Sardinha"], rarity:"Muito Comum"}];
let currentVaraIndex = 0;
const raridades = ["Muito Comum","Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let selectedRarity = "Muito Comum";

// ===== SHOP BOXES =====
const shopBoxes = [
  {name:"Box Comum", price:50, varas:[
    {name:"Vara Telescópica", type:"normal", drop:80},
    {name:"Vara Telescópica Reforçada", type:"reforçada", drop:20}
  ]},
  {name:"Box Incomum", price:100, varas:[
    {name:"Vara Intermediária", type:"normal", drop:80},
    {name:"Vara Intermediária Reforçada", type:"reforçada", drop:20}
  ]},
  {name:"Box Rara", price:150, varas:[
    {name:"Vara Especial", type:"normal", drop:80},
    {name:"Vara Especial Reforçada", type:"reforçada", drop:20}
  ]},
  {name:"Box Épica", price:200, varas:[
    {name:"Vara Épica", type:"normal", drop:80},
    {name:"Vara Épica Reforçada", type:"reforçada", drop:20}
  ]},
  {name:"Box Lendária", price:250, varas:[
    {name:"Vara Lendária", type:"normal", drop:80},
    {name:"Vara Lendária Reforçada", type:"reforçada", drop:20}
  ]},
  {name:"Box Mítica", price:300, varas:[
    {name:"Vara Mítica", type:"normal", drop:80},
    {name:"Vara Mítica Reforçada", type:"reforçada", drop:20}
  ]}
];

let selectedBox = null;
let wallet = 5000;

// ===== BOLSA =====
function getCurrentVara(){ return bolsa[currentVaraIndex]; }

function setActiveVara(idx){
  currentVaraIndex = idx;
  updateBolsaVaras();
  updateVaraInfo();
}

function updateBolsaMenu(){
  const menu = document.getElementById("bolsaMenu");
  menu.innerHTML = "";
  raridades.forEach(r=>{
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.className = "bag-item";
    btn.onclick = ()=>{
      selectedRarity = r;
      updateBolsaMenu();
      updateBolsaVaras();
    };
    menu.appendChild(btn);
  });
}

function updateBolsaVaras(){
  const div = document.getElementById("bolsaVaras");
  div.innerHTML = "";
  bolsa.forEach((v, idx)=>{
    if(v.rarity === selectedRarity){
      const btn = document.createElement("button");
      btn.innerText = v.name;
      btn.className = "bag-item";
      btn.onclick = ()=> {
        if(confirm(`Deseja ativar a vara ${v.name}?`)){
          setActiveVara(idx);
        }
      };
      div.appendChild(btn);
    }
  });
}

function updateVaraInfo(){
  const vara = getCurrentVara();
  if(!vara) return;
  document.getElementById("currentVara").innerText = `Vara ativa: ${vara.name}`;
  document.getElementById("varaStats").innerText = `Peixes: ${vara.fishes ? vara.fishes.join(", ") : "-"}`;
}

// ===== PESCA =====
function getRandomFishByVara(vara){
  if(Math.random()*100 <= (vara.captureRate||50)){
    return vara.fishes ? vara.fishes[Math.floor(Math.random()*vara.fishes.length)] : "Sardinha";
  }
  return null;
}

const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

function fishAction(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }

  const fish = getRandomFishByVara(vara);
  if(fish){
    alert(`🎉 Você pescou: ${fish}`);
    wallet += 1;
    document.getElementById("walletBalance").innerText = wallet;
  } else {
    alert("O peixe escapou!");
  }

  dailyCount++;
  document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/15`;
  skipButton.style.display = "none";
  fishButton.disabled = false;
  result.innerText = "Clique em pescar";
}

fishButton.onclick = function(){
  fishButton.disabled = true;
  result.innerText = "Esperando o peixe morder a isca...";
  skipButton.style.display = "inline-block";
  fishingTimeout = setTimeout(fishAction, 5000);
};

skipButton.onclick = function(){
  clearTimeout(fishingTimeout);
  fishAction();
};

// ===== SHOP =====
function updateShopMenu(){
  const menu = document.getElementById("shopMenu");
  menu.innerHTML = "";
  shopBoxes.forEach(box=>{
    const div = document.createElement("div");
    div.className = "box-card";
    div.innerText = box.name;
    if(selectedBox===box) div.classList.add("box-selected");
    div.onclick = ()=>{
      selectedBox = box;
      updateShopMenu();
      updateShopContent();
    };
    menu.appendChild(div);
  });
}

function updateShopContent(){
  const content = document.getElementById("shopContent");
  if(!selectedBox){
    content.innerText = "Selecione uma box";
    return;
  }
  let txt = `Preço: ${selectedBox.price} SFP2\nVaras dentro (Drop 80/20):\n`;
  selectedBox.varas.forEach(v=>{
    txt += `${v.name}\n`;
  });
  content.innerText = txt;
}

document.getElementById("buyButton").onclick = function(){
  if(!selectedBox) return;
  if(wallet < selectedBox.price){ alert("Saldo insuficiente!"); return; }
  wallet -= selectedBox.price;
  document.getElementById("walletBalance").innerText = wallet;

  // escolher vara com base em drop 80/20
  const rand = Math.random()*100;
  const chosenVara = rand <= selectedBox.varas[0].drop ? selectedBox.varas[0] : selectedBox.varas[1];
  chosenVara.rarity = selectedBox.name.split(" ")[1]; // define raridade
  bolsa.push(chosenVara);
  alert(`Parabéns! Você ganhou a ${chosenVara.name}`);
  updateBolsaVaras();
};

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  };
});

// ===== INIT =====
updateBolsaMenu();
updateBolsaVaras();
updateVaraInfo();
updateShopMenu();
document.getElementById("walletBalance").innerText = wallet;

});
</script>
</body>
</html>
