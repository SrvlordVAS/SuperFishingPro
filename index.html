<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SFP2: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton">⏩ Pular espera</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (50 SFP2)</button>
    <button id="boxIncomum">📦 Box Incomum (100 SFP2)</button>
    <button id="boxRara">📦 Box Rara (150 SFP2)</button>
    <button id="boxEpica">📦 Box Épica (200 SFP2)</button>
    <button id="boxLendaria">📦 Box Lendária (250 SFP2)</button>
  </div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <p>XP disponível: <span id="xpReservoir">0</span></p>
  <div id="upgrade"></div>
</div>

<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 100000;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let xpReservoir = 0;

// ===== VARAS =====
const varas = {
  "Bambu":[{level:1, chance:50, baseProfit:0.08, canUpgrade:false, maxRarity:"Muito Comum"}],
  "Fibra":[{level:1, chance:50, baseProfit:1, canUpgrade:true, maxRarity:"Comum"}],
  "Fibra Reforçada":[{level:1, chance:50, baseProfit:1.18, canUpgrade:true, maxRarity:"Comum"}],
  "Grafite":[{level:1, chance:50, baseProfit:1, canUpgrade:true, maxRarity:"Incomum"}],
  "Grafite Reforçada":[{level:1, chance:50, baseProfit:1.18, canUpgrade:true, maxRarity:"Incomum"}],
  "Carbono":[{level:1, chance:50, baseProfit:1, canUpgrade:true, maxRarity:"Raro"}],
  "Carbono Reforçada":[{level:1, chance:50, baseProfit:1.18, canUpgrade:true, maxRarity:"Raro"}],
  "Titânio":[{level:1, chance:50, baseProfit:1, canUpgrade:true, maxRarity:"Épico"}],
  "Titânio Reforçada":[{level:1, chance:50, baseProfit:1.18, canUpgrade:true, maxRarity:"Épico"}],
  "Platina":[{level:1, chance:50, baseProfit:1, canUpgrade:true, maxRarity:"Lendário"}],
  "Platina Reforçada":[{level:1, chance:50, baseProfit:1.18, canUpgrade:true, maxRarity:"Lendário"}],
  "Adamantium":[{level:1, chance:50, baseProfit:1, canUpgrade:true, maxRarity:"Mítico"}],
  "Adamantium Reforçada":[{level:1, chance:50, baseProfit:1.18, canUpgrade:true, maxRarity:"Mítico"}]
};

// ===== PEIXES =====
let fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum"},
  {name:"Robalo", value:1, rarity:"Comum"},
  {name:"Atum", value:1, rarity:"Incomum"},
  {name:"Garoupa", value:1, rarity:"Raro"},
  {name:"Salmão", value:1, rarity:"Épico"},
  {name:"Tubarão", value:1, rarity:"Lendário"},
  {name:"Marlim", value:1, rarity:"Mítico"}
];

// ===== INVENTÁRIO =====
let inventory = [{name:"Bambu", level:1, xp:0, profit:0.08}];
let bolsa = [...inventory];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function getCurrentVara(){ return inventory[currentVaraIndex]; }
function getRandomFishByVara(vara){
  const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  let maxIdx = rarities.indexOf(varas[vara.name][0].maxRarity);
  let minIdx = Math.max(0,maxIdx-1);
  const allowed = fishes.filter(f=>{
    const idx = rarities.indexOf(f.rarity);
    return idx>=minIdx && idx<=maxIdx;
  });
  return allowed[Math.floor(Math.random()*allowed.length)];
}

// ===== BOLSA =====
function setActiveVara(idx){ currentVaraIndex = idx; updateVaraInfo(); updateBolsa(); }
function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML="";
    bolsa.forEach((v,idx)=>{
        const btn = document.createElement("button");
        btn.className="bag-item";
        btn.innerText=v.name+` (Nível ${v.level})`;
        btn.style.border = idx===currentVaraIndex?"2px solid gold":"1px solid #004466";
        btn.onclick=()=>setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

// ===== PESCA =====
function finishFishing(caught){
    const vara=getCurrentVara();
    const fish=getRandomFishByVara(vara);
    if(caught){
        sunBalance += fish.value*(vara.profit);
        document.getElementById("result").innerText=`Você pegou: ${fish.name} e ganhou ${(fish.value*vara.profit).toFixed(2)} SFP2`;
    }else{
        document.getElementById("result").innerText="O peixe escapou!";
    }
    dailyCount++;
    document.getElementById("dailyCount").innerText=`Tentativas hoje: ${dailyCount}/${dailyLimit}`;
    updateWalletUI();
    fishingTimeout=null;
    fishButton.disabled=false;
}

// ===== BOTÕES PESCA =====
const fishButton=document.getElementById("fishButton");
const skipButton=document.getElementById("skipButton");

fishButton.onclick=function(){
  if(dailyCount>=dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara=getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }
  fishButton.disabled=true;
  document.getElementById("result").innerText="Esperando o peixe morder a isca...";
  fishingTimeout=setTimeout(()=>{
      const chance=varas[vara.name][0].chance+(vara.level-1)*3;
      const caught=Math.random()*100<=chance;
      finishFishing(caught);
  },5000);
};

skipButton.onclick=function(){
  if(fishingTimeout){
      clearTimeout(fishingTimeout);
      const caught=Math.random()<0.5;
      finishFishing(caught);
  }
};

// ===== VARA ATIVA =====
function updateVaraInfo(){
  const vara=getCurrentVara();
  if(!vara){ document.getElementById("currentVara").innerText="Nenhuma vara ativa"; return; }
  document.getElementById("currentVara").innerText=`${vara.name} (Nível ${vara.level})`;
  const rarities=["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
  const maxIdx=rarities.indexOf(varas[vara.name][0].maxRarity);
  const allowedFishes=fishes.filter(f=>rarities.indexOf(f.rarity)<=maxIdx && rarities.indexOf(f.rarity)>=Math.max(0,maxIdx-1));
  const fishNames=allowedFishes.map(f=>f.name).join(", ");
  document.getElementById("varaStats").innerText=`Chance de captura: ${varas[vara.name][0].chance}%\nPeixes que pode pegar: ${fishNames}`;
}

// ===== WALLET =====
function updateWalletUI(){ document.getElementById("money").innerText=`Saldo SFP2: ${sunBalance.toFixed(2)}`; }

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".tabButton").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
        document.getElementById(btn.dataset.target).classList.add("active");
    }
});

// ===== BOXES =====
const boxTypes=["Comum","Incomum","Rara","Epica","Lendaria"];
const boxCosts={"Comum":50,"Incomum":100,"Rara":150,"Epica":200,"Lendaria":250};
const boxChances={
  "Comum":[{name:"Fibra",chance:50},{name:"Fibra Reforçada",chance:50}],
  "Incomum":[{name:"Grafite",chance:50},{name:"Grafite Reforçada",chance:50}],
  "Rara":[{name:"Carbono",chance:50},{name:"Carbono Reforçada",chance:50}],
  "Epica":[{name:"Titânio",chance:50},{name:"Titânio Reforçada",chance:50}],
  "Lendaria":[{name:"Platina",chance:50},{name:"Platina Reforçada",chance:50}]
};

function addVaraToInventory(varaName){
    const baseProfit=varas[varaName][0].baseProfit;
    const newVara={name:varaName,level:1,xp:0,profit:baseProfit};
    inventory.push(newVara);
    bolsa.push(newVara);
    updateBolsa();
    updateVaraInfo();
}

boxTypes.forEach(type=>{
    document.getElementById("box"+type).onclick=()=>{
        if(sunBalance<boxCosts[type]){ alert("Saldo SFP2 insuficiente!"); return; }
        let info=boxChances[type].map(i=>`${i.name} (${i.chance}%)`).join(", ");
        if(!confirm(`Abrir Box ${type} por ${boxCosts[type]} SFP2?\nPossíveis varas: ${info}`)) return;
        sunBalance -= boxCosts[type];
        let rand=Math.random()*100;
        let acc=0;
        for(const item of boxChances[type]){
            acc += item.chance;
            if(rand<=acc){
                addVaraToInventory(item.name);
                alert(`🎉 Parabéns! Você recebeu a vara: ${item.name}`);
                break;
            }
        }
        updateWalletUI();
    };
});

// ===== INICIALIZA =====
updateBolsa();
updateVaraInfo();
updateWalletUI();

});
</script>
</body>
</html>
