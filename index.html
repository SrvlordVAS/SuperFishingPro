<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#inventory, #shop, #upgradeSection, #bolsa { border:1px solid #004466; padding:8px; margin:8px auto; width:90%; max-width:400px; border-radius:5px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo SFP2: 100000</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>
  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div id="bolsa" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="boxComum">📦 Box Comum (50 SFP2)</button>
    <button id="boxIncomum">📦 Box Incomum (100 SFP2)</button>
    <button id="boxRara">📦 Box Rara (150 SFP2)</button>
    <button id="boxEpica">📦 Box Épica (200 SFP2)</button>
    <button id="boxLendaria">📦 Box Lendária (250 SFP2)</button>
    <button id="boxMitica">📦 Box Mítica (300 SFP2)</button>
  </div>
</div>

<!-- UPGRADE -->
<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <p>XP disponível: <span id="xpReservoir">0</span></p>
  <div id="upgrade"></div>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let sunBalance = 100000;
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let xpReservoir = 0;

// ===== VARAS =====
const varas = {
  "Fibra": {roi:20, reforco:17, chanceBase:50},
  "Grafite": {roi:20, reforco:17, chanceBase:50},
  "Carbono": {roi:20, reforco:17, chanceBase:50},
  "Titânio": {roi:20, reforco:17, chanceBase:50},
  "Platina": {roi:20, reforco:17, chanceBase:50},
  "Adamantium": {roi:20, reforco:17, chanceBase:50}
};

// ===== PEIXES =====
const fishes = [
  {name:"Sardinha", rarity:"Muito Comum"},
  {name:"Robalo", rarity:"Comum"},
  {name:"Tainha", rarity:"Comum"},
  {name:"Corvina", rarity:"Comum"},
  {name:"Atum", rarity:"Incomum"},
  {name:"Garoupa pequena", rarity:"Incomum"},
  {name:"Pargo", rarity:"Incomum"},
  {name:"Garoupa adulta", rarity:"Raro"},
  {name:"Salmão do Atlântico", rarity:"Épico"},
  {name:"Truta", rarity:"Épico"},
  {name:"Tubarão", rarity:"Lendário"},
  {name:"Marlim Azul", rarity:"Mítico"}
];

// ===== INVENTORY =====
let inventory = [{name:"Fibra", level:1, xp:0}];
let bolsa = [...inventory];
let currentVaraIndex = 0;

// ===== FUNÇÕES =====
function getCurrentVara(){ return inventory[currentVaraIndex]; }

function updateVaraInfo(){
    const vara = getCurrentVara();
    if(!vara) return;
    const level = vara.level;
    const baseRoi = varas[vara.name].roi;
    const profit = 1 / (baseRoi - 0.5*(level-1));
    const chance = varas[vara.name].chanceBase + (level-1)*(3+Math.random()*2);
    document.getElementById("currentVara").innerText = `${vara.name} (Nível ${level})`;
    document.getElementById("varaStats").innerText = `Chance captura: ${chance.toFixed(1)}% | Lucro atual: ${(profit*100).toFixed(2)}%`;
}

// ===== BOLSA =====
function setActiveVara(idx){
    currentVaraIndex = idx;
    updateVaraInfo();
    updateBolsa();
}
function updateBolsa(){
    const bolsaDiv = document.getElementById("bolsa");
    bolsaDiv.innerHTML = "";
    bolsa.forEach((v, idx)=>{
        const btn = document.createElement("button");
        btn.className = "bag-item";
        btn.innerText = v.name + ` (Nível ${v.level})`;
        btn.style.border = idx===currentVaraIndex?"2px solid gold":"1px solid #004466";
        btn.onclick = ()=>setActiveVara(idx);
        bolsaDiv.appendChild(btn);
    });
}

// ===== PESCA =====
function getRandomFish(vara){
    const rarities = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"];
    const maxIdx = rarities.indexOf(vara.name); // simplificação
    const allowed = fishes.filter(f=>rarities.indexOf(f.rarity)<=maxIdx);
    return allowed[Math.floor(Math.random()*allowed.length)];
}

document.getElementById("fishButton").onclick = function(){
    if(dailyCount>=dailyLimit){ alert("Limite diário atingido!"); return; }
    const vara = getCurrentVara();
    if(!vara) { alert("Nenhuma vara ativa!"); return; }
    document.getElementById("result").innerText = "Esperando peixe...";
    setTimeout(()=>{
        const chance = varas[vara.name].chanceBase + (vara.level-1)*(3+Math.random()*2);
        const fish = fishes[Math.floor(Math.random()*fishes.length)];
        if(Math.random()*100 <= chance){
            const profit = 1 / (varas[vara.name].roi - 0.5*(vara.level-1));
            sunBalance += profit;
            alert(`Você pegou: ${fish.name} | Ganho: ${profit.toFixed(2)} SFP2`);
        } else {
            alert(`O peixe escapou!`);
        }
        dailyCount++;
        document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/${dailyLimit}`;
        updateWalletUI();
    },5000);
};

// ===== WALLET =====
function updateWalletUI(){ document.getElementById("money").innerText = `Saldo SFP2: ${sunBalance.toFixed(2)}`; }

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(tab=>{
    tab.onclick=()=>{
        document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
        document.getElementById(tab.dataset.target).classList.add("active");
        document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
        tab.classList.add("selected");
    };
});

// ===== INICIALIZA =====
updateBolsa();
updateVaraInfo();
updateWalletUI();

});
</script>
</body>
</html>
