<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px; background:linear-gradient(to bottom,#87ceeb,#f0f8ff); }
.container { max-width:600px; margin:0 auto; padding:20px; background:white; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
h1 { text-align:center; }
button { padding:10px 20px; margin:5px; font-size:16px; cursor:pointer; }
#log { margin-top:20px; background:#f9f9f9; padding:10px; border-radius:8px; height:300px; overflow-y:auto; }
select { padding:5px; margin:5px; font-size:16px; width:100%; }
</style>
</head>
<body>
<div class="container">
<h1>Super Fishing</h1>
<p>Saldo: <span id="saldo"></span> SUN</p>

<h3>Boxes</h3>
<button id="btnBoxRara">Abrir Box Rara (50 SUN)</button>

<h3>Minhas Varas</h3>
<select id="minhaVara"></select>
<button id="btnUp">Up</button>
<button id="btnPescar">Pescar</button>

<div id="log"></div>
</div>

<script>
// ====== Variáveis do jogo ======
let saldo = 100000;
let varas = [];

// Configuração das boxes
const precoBox = 50;
const boxRara = [
  {nome:'Vara Comum', taxa:70, baseLucro:2, raridade:'comum'},
  {nome:'Vara Média', taxa:20, baseLucro:4, raridade:'incomum'},
  {nome:'Vara Rara', taxa:9, baseLucro:8, raridade:'raro'},
  {nome:'Vara Lendária', taxa:1, baseLucro:16, raridade:'epico'},
];

// Configuração dos peixes
const peixes = [
  {nome:'Peixe Comum 1', raridade:'comum', preco:0.1},
  {nome:'Peixe Comum 2', raridade:'comum', preco:0.125},
  {nome:'Peixe Comum 3', raridade:'comum', preco:0.15625},
  {nome:'Peixe Incomum 1', raridade:'incomum', preco:0.1953125},
  {nome:'Peixe Incomum 2', raridade:'incomum', preco:0.244140625},
  {nome:'Peixe Incomum 3', raridade:'incomum', preco:0.30517578},
  {nome:'Peixe Raro 1', raridade:'raro', preco:0.38146973},
  {nome:'Peixe Raro 2', raridade:'raro', preco:0.47683716},
  {nome:'Peixe Raro 3', raridade:'raro', preco:0.5960464},
  {nome:'Peixe Epico 1', raridade:'epico', preco:0.7450580},
  {nome:'Peixe Epico 2', raridade:'epico', preco:0.9313225},
  {nome:'Peixe Epico 3', raridade:'epico', preco:1.164153},
  {nome:'Peixe Lendário 1', raridade:'lendario', preco:1.455191},
  {nome:'Peixe Lendário 2', raridade:'lendario', preco:1.818988},
  {nome:'Peixe Lendário 3', raridade:'lendario', preco:2.273735},
  {nome:'Peixe Mitico 1', raridade:'mitico', preco:2.842168},
  {nome:'Peixe Mitico 2', raridade:'mitico', preco:3.55271},
  {nome:'Peixe Mitico 3', raridade:'mitico', preco:4.44089},
];

// ====== Funções ======
function atualizarSaldo(){
  document.getElementById('saldo').innerText = saldo.toFixed(2);
}

function atualizarSelect(){
  const sel = document.getElementById('minhaVara');
  sel.innerHTML = '';
  varas.forEach((v,i)=>{
    const opt = document.createElement('option');
    opt.value=i;
    opt.text = `${v.nome} lvl ${v.level} (Lucro: ${v.lucroAtual.toFixed(2)})`;
    sel.add(opt);
  });
}

function log(msg){
  const l = document.getElementById('log');
  l.innerHTML += msg + '<br>';
  l.scrollTop = l.scrollHeight;
}

// Abrir Box
function abrirBox(){
  if(saldo < precoBox){ log('❌ Saldo insuficiente!'); return; }
  saldo -= precoBox;
  atualizarSaldo();

  const rnd = Math.random()*100;
  let acumulado=0;
  let dropped;
  for(let v of boxRara){
    acumulado += v.taxa;
    if(rnd <= acumulado){
      dropped = {...v, level:1, xp:0, xpParaUp:50, lucroAtual:v.baseLucro, custoAcumulado:precoBox};
      break;
    }
  }
  varas.push(dropped);
  atualizarSelect();
  log(`🎣 Parabéns! Você pegou a ${dropped.nome} lvl ${dropped.level}`);
}

// Pescar
function pescar(){
  const sel = document.getElementById('minhaVara');
  const idx = parseInt(sel.value);
  const v = varas[idx];
  if(!v){ log('Selecione uma vara'); return; }

  // determinar raridades possíveis
  const raridade = v.raridade;
  let possiveis = peixes.filter(p=>{
    if(raridade==='comum') return p.raridade==='comum';
    const ordem = ['comum','incomum','raro','epico','lendario','mitico'];
    const idxR = ordem.indexOf(raridade);
    const idxP = ordem.indexOf(p.raridade);
    return idxP === idxR || idxP === idxR-1;
  });

  const drop = possiveis[Math.floor(Math.random()*possiveis.length)];
  saldo += drop.preco;
  atualizarSaldo();
  log(`🐟 Você pescou um ${drop.nome} por ${drop.preco.toFixed(2)} SUN`);
}

// Upar Vara
function uparVara(){
  const sel = document.getElementById('minhaVara');
  const idx = parseInt(sel.value);
  const v = varas[idx];
  if(!v){ log('Selecione uma vara'); return; }

  const xpReq = v.xpParaUp;
  const varasNecessarias = Math.ceil(xpReq / 50);

  if(varas.length-1 < varasNecessarias){
    log(`❌ Não há varas suficientes para upar (precisa sacrificar ${varasNecessarias})`);
    return;
  }

  const idxs = [];
  let count=0;
  for(let i=0;i<varas.length;i++){
    if(i===idx) continue;
    idxs.push(i);
    count++;
    if(count>=varasNecessarias) break;
  }

  const sacrificadas = [];
  idxs.reverse().forEach(i=>{
    sacrificadas.push(varas.splice(i,1)[0]);
  });

  // aumento aleatório 80-120%
  const aumento = 0.8 + Math.random()*0.4;
  v.lucroAtual *= (1 + aumento);
  v.level +=1;
  v.xp =0;
  v.xpParaUp *=2;
  v.custoAcumulado += precoBox*(varasNecessarias+1);

  log(`✨ Sua ${v.nome} subiu para lvl ${v.level}! Lucro: ${v.lucroAtual.toFixed(2)} SUN/dia (aumento ${(aumento*100).toFixed(0)}%)`);
  log(`💀 Varas sacrificadas: ${sacrificadas.map(x=>x.nome).join(', ')}`);
  atualizarSelect();
}

// ====== Eventos ======
document.getElementById('btnBoxRara').addEventListener('click',abrirBox);
document.getElementById('btnUp').addEventListener('click',uparVara);
document.getElementById('btnPescar').addEventListener('click',pescar);

// Inicialização
atualizarSaldo();
atualizarSelect();
log('🟢 Super Fishing iniciado! Abra uma box para começar.');
