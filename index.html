<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { cursor:pointer; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }

#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:10px 0; font-size:14px; border:none; background:#00aaff; color:white; border-radius:12px; transition:0.2s; }
#bottomMenu button:hover { background:#0088cc; }
.selected { background-color:#ffcc00 !important; color:black !important; }

/* ===== BOLSA ===== */
#bolsaContainer { width:90%; max-width:400px; margin:0 auto; }

.bolsa-top, .bolsa-bottom {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#bolsaMenu, #bolsaVaras {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
}

.bag-item {
  background:#00aaff;
  color:white;
  border:none;
  border-radius:5px;
  padding:8px 12px;
  font-size:14px;
}

/* ===== SHOP ===== */
#shopContainer { width:90%; max-width:400px; margin:0 auto; }

.shop-top, .shop-bottom, .shop-buy {
  border:1px solid #004466;
  padding:10px;
  border-radius:10px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#shopMenu {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

.box-card {
  width:90px;
  height:90px;
  border-radius:10px;
  background:linear-gradient(145deg,#00aaff,#0077aa);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 3px 6px rgba(0,0,0,0.3);
}

.box-card:hover {
  transform:scale(1.05);
}

.box-selected {
  border:3px solid gold;
}

#shopContent {
  text-align:center;
  font-size:14px;
}

/* ===== PESCA ===== */
#fishButton, #skipButton {
  background:#00aaff;
  color:white;
  border:none;
  border-radius:12px;
  padding:10px 15px;
  margin:5px;
  font-size:14px;
}
#fishButton:hover, #skipButton:hover {
  background:#0088cc;
}
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Vara de Bambu</p>
  <p id="varaStats"></p>

  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div class="bolsa-top">
      <div id="bolsaMenu"></div>
    </div>
    <div class="bolsa-bottom">
      <div id="bolsaVaras"></div>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopContainer">
    <div class="shop-top">
      <div id="shopMenu"></div>
    </div>
    <div class="shop-bottom">
      <div id="shopContent">Selecione uma box</div>
    </div>
    <div class="shop-buy">
      <button id="buyBoxButton">Comprar Box</button>
    </div>
  </div>
</div>

<!-- CARTEIRA -->
<div id="walletSection" class="section">
  <h3>Carteira</h3>
  <p>Saldo SFP2: <span id="walletBalance">5000</span></p>
</div>

<!-- MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="walletSection">💰 Carteira</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ===== VARIÁVEIS =====
let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let wallet = 5000;

// ===== VARAS =====
let bolsa = [{name:"Vara de Bambu", profit:100, captureRate:50, fishes:["Sardinha"], rarity:"Muito Comum"}];
let currentVaraIndex = 0;

const raridades = ["Muito Comum","Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let selectedRarity = "Muito Comum";

// ===== PEIXES =====
const fishesByVara = {
  "Vara de Bambu":["Sardinha"],
  "Fibra":["Cavala","Tainha","Anchova"],
  "Fibra Reforçada":["Cavala","Tainha","Anchova"],
  "Grafite":["Robalo","Dourado","Pargo"],
  "Grafite Reforçada":["Robalo","Dourado","Pargo"],
  "Carbono":["Garoupa","Badejo","Corvina"],
  "Carbono Reforçada":["Garoupa","Badejo","Corvina"],
  "Titânio":["Atum","Garoupa-gigante","Garoupa-preta"],
  "Titânio Reforçada":["Atum","Garoupa-gigante","Garoupa-preta"],
  "Platina":["Marlim-azul","Espadarte","Atum-rabilho"],
  "Platina Reforçada":["Marlim-azul","Espadarte","Atum-rabilho"],
  "Adamantium":["Tubarão-branco","Tubarão-tigre","Tubarão-martelo"],
  "Adamantium Reforçada":["Tubarão-branco","Tubarão-tigre","Tubarão-martelo"]
};

// ===== SHOP =====
const shopOptions = [
  {name:"Box Comum", varas:["Fibra","Fibra Reforçada"], drop:[80,20], price:50},
  {name:"Box Incomum", varas:["Grafite","Grafite Reforçada"], drop:[80,20], price:100},
  {name:"Box Rara", varas:["Carbono","Carbono Reforçada"], drop:[80,20], price:150},
  {name:"Box Épica", varas:["Titânio","Titânio Reforçada"], drop:[80,20], price:200},
  {name:"Box Lendária", varas:["Platina","Platina Reforçada"], drop:[80,20], price:250},
  {name:"Box Mítica", varas:["Adamantium","Adamantium Reforçada"], drop:[80,20], price:300}
];

let selectedShop = null;

// ===== FUNÇÕES BOLSA =====
function getCurrentVara(){ return bolsa[currentVaraIndex]; }

function setActiveVara(idx){
  currentVaraIndex = idx;
  updateBolsaVaras();
  updateVaraInfo();
}

function updateBolsaMenu(){
  const menu = document.getElementById("bolsaMenu");
  menu.innerHTML = "";
  raridades.forEach(r=>{
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.className = "bag-item";
    if(r===selectedRarity) btn.style.border="2px solid gold";
    btn.onclick = ()=>{
      selectedRarity = r;
      updateBolsaMenu();
      updateBolsaVaras();
    };
    menu.appendChild(btn);
  });
}

function updateBolsaVaras(){
  const div = document.getElementById("bolsaVaras");
  div.innerHTML = "";
  bolsa.forEach((v, idx)=>{
    if(v.rarity === selectedRarity){
      const btn = document.createElement("button");
      btn.innerText = v.name;
      btn.className = "bag-item";
      btn.onclick = ()=>{
        if(confirm(`Deseja tornar a vara ${v.name} ativa?`)){
          setActiveVara(idx);
          alert(`Parabéns! Você ativou a vara ${v.name}`);
        }
      };
      div.appendChild(btn);
    }
  });
}

function updateVaraInfo(){
  const vara = getCurrentVara();
  if(!vara) return;
  document.getElementById("currentVara").innerText = `Vara ativa: ${vara.name}`;
  document.getElementById("varaStats").innerText =
    `Peixes que pode capturar: ${vara.fishes.join(", ")}`;
}

// ===== PESCA =====
function getRandomFishByVara(vara){
  if(Math.random()*100 <= vara.captureRate){
    const fishes = fishesByVara[vara.name];
    return fishes[Math.floor(Math.random()*fishes.length)];
  }
  return null;
}

const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

function fishAction(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  const fish = getRandomFishByVara(vara);
  if(fish){
    alert(`🎉 Você pescou: ${fish} e ganhou 1 SFP2`);
    wallet += 1;
    document.getElementById("walletBalance").innerText = wallet;
  } else {
    alert("O peixe escapou!");
  }
  dailyCount++;
  document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/15`;
  skipButton.style.display = "none";
  fishButton.disabled = false;
  result.innerText = "Clique em pescar";
}

fishButton.onclick = function(){
  fishButton.disabled = true;
  result.innerText = "Esperando...";
  skipButton.style.display = "inline-block";
  fishingTimeout = setTimeout(fishAction, 5000);
};

skipButton.onclick = function(){
  clearTimeout(fishingTimeout);
  fishAction();
};

// ===== SHOP FUNÇÕES =====
function updateShopMenu(){
  const menu = document.getElementById("shopMenu");
  menu.innerHTML = "";
  shopOptions.forEach(opt=>{
    const box = document.createElement("div");
    box.className="box-card";
    box.innerText=opt.name;
    if(opt.name===selectedShop) box.classList.add("box-selected");
    box.onclick = ()=>{
      selectedShop = opt.name;
      updateShopMenu();
      updateShopContent();
    };
    menu.appendChild(box);
  });
}

function updateShopContent(){
  const content = document.getElementById("shopContent");
  if(!selectedShop){
    content.innerText = "Selecione uma box";
    return;
  }
  const box = shopOptions.find(b=>b.name===selectedShop);
  content.innerText = `Varas: ${box.varas.join(", ")}\nDrop: ${box.drop[0]}% / ${box.drop[1]}%\nPreço: ${box.price} SFP2`;
}

document.getElementById("buyBoxButton").onclick = function(){
  if(!selectedShop){ alert("Selecione uma box!"); return; }
  const box = shopOptions.find(b=>b.name===selectedShop);
  if(wallet<box.price){ alert("Saldo insuficiente!"); return; }
  wallet -= box.price;
  document.getElementById("walletBalance").innerText = wallet;

  // Escolher a vara pelo drop 80/20
  const rand = Math.random()*100;
  const selectedVara = rand<=box.drop[0]?box.varas[0]:box.varas[1];
  const fishes = fishesByVara[selectedVara];
  bolsa.push({name:selectedVara, profit:100, captureRate:selectedVara.includes("Reforçada")?60:50, fishes:fishes, rarity:getRarityByVara(selectedVara)});
  alert(`Parabéns! Você ganhou a vara ${selectedVara}`);
  updateBolsaVaras();
};

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  };
});

// ===== INICIALIZAÇÃO =====
updateBolsaMenu();
updateBolsaVaras();
updateVaraInfo();
updateShopMenu();
document.getElementById("walletBalance").innerText = wallet;

function getRarityByVara(varaName){
  if(varaName.includes("Bambu")) return "Muito Comum";
  if(varaName.includes("Fibra")) return "Comum";
  if(varaName.includes("Grafite")) return "Incomum";
  if(varaName.includes("Carbono")) return "Rara";
  if(varaName.includes("Titânio")) return "Épica";
  if(varaName.includes("Platina")) return "Lendária";
  if(varaName.includes("Adamantium")) return "Mítica";
  return "Comum";
}
});
</script>
</body>
</html>
