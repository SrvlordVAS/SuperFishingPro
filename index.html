<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>

<style>

body{
font-family:'Comic Sans MS',Arial;
margin:0;
padding:20px 0 80px 0;
background:linear-gradient(to bottom,#87ceeb,#ffffff);
text-align:center;
}

h1{color:#006994}

button{
background:#00aaff;
color:white;
border:none;
border-radius:5px;
padding:6px 10px;
margin:2px;
cursor:pointer;
}

.section{display:none}
.section.active{display:block}

#bottomMenu{
position:fixed;
bottom:0;
width:100%;
background:#00aaff;
display:flex;
}

#bottomMenu button{
flex:1;
}

#bolsa{
display:flex;
flex-wrap:wrap;
gap:5px;
justify-content:center;
}

</style>

</head>

<body>

<h1>🎣 Super Fishing</h1>

<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<div id="pesca" class="section active">

<p id="result">Clique em pescar</p>

<button id="fishButton">🎣 PESCAR</button>

<p id="currentVara"></p>
<p id="varaStats"></p>

<h3>Bolsa</h3>

<div id="bolsa"></div>

</div>

<div id="shopSection" class="section">

<h3>Boxes</h3>

<button id="boxComum">Box Comum (200)</button>
<button id="boxRara">Box Rara (330)</button>
<button id="boxEpica">Box Épica (432)</button>
<button id="boxLendaria">Box Lendária (504)</button>
<button id="boxMitica">Box Mítica (600)</button>

</div>

<div id="upgradeSection" class="section">

<h3>Upgrade</h3>

XP disponível: <span id="xpReservoir">0</span>

<div id="upgrade"></div>

</div>

<div id="bottomMenu">

<button class="tabButton" data-target="pesca">Pescar</button>
<button class="tabButton" data-target="shopSection">Loja</button>
<button class="tabButton" data-target="upgradeSection">Upgrade</button>

</div>

<script>

let sunBalance=500
let dailyCount=0
const dailyLimit=15

let xpReservoir=0

const varas={
"Bambu":[{chance:50,maxRarity:"Muito Comum",baseXP:0}],
"Comum Fibra":[{chance:50,maxRarity:"Comum",baseXP:50}],
"Incomum Grafite":[{chance:50,maxRarity:"Incomum",baseXP:80}],
"Raro Carbono":[{chance:50,maxRarity:"Raro",baseXP:120}],
"Épico Titânio":[{chance:50,maxRarity:"Épico",baseXP:180}],
"Lendário Platina":[{chance:50,maxRarity:"Lendário",baseXP:230}],
"Mítico Adamantium":[{chance:50,maxRarity:"Mítico",baseXP:300}]
}

let fishes=[

{name:"Sardinha",value:0.075,rarity:"Muito Comum"},
{name:"Robalo",value:0.15,rarity:"Comum"},
{name:"Tainha",value:0.3,rarity:"Comum"},
{name:"Corvina",value:0.45,rarity:"Comum"},
{name:"Atum",value:0.6,rarity:"Incomum"},
{name:"Garoupa",value:0.75,rarity:"Incomum"},
{name:"Pargo",value:0.9,rarity:"Incomum"},
{name:"Garoupa adulta",value:1.05,rarity:"Raro"},
{name:"Salmão",value:1.2,rarity:"Épico"},
{name:"Truta",value:1.35,rarity:"Épico"},
{name:"Tubarão",value:1.5,rarity:"Lendário"},
{name:"Marlim Azul",value:1.65,rarity:"Mítico"}

]

let inventory=[{name:"Bambu",level:1,xp:0}]
let bolsa=[...inventory]
let currentVaraIndex=0

function getCurrentVara(){
return inventory[currentVaraIndex]
}

function getRandomFishByVara(vara){

const rarities=["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"]

const allowed=fishes.filter(f=>
rarities.indexOf(f.rarity)<=rarities.indexOf(varas[vara.name][0].maxRarity)
)

const fishBase=allowed[Math.floor(Math.random()*allowed.length)]

let value=fishBase.value

if(vara.name==="Bambu") value*=0.3
else value*=(1+(vara.level-1)*0.1)

return {name:fishBase.name,value:value}

}

function fish(){

if(dailyCount>=dailyLimit){
alert("Limite diário atingido")
return
}

let vara=getCurrentVara()

let fish=getRandomFishByVara(vara)

let chancePerda=100-(varas[vara.name][0].chance+(vara.level-1)*5)

if(Math.random()*100<chancePerda){
alert("O peixe escapou")
}
else{
sunBalance+=fish.value
alert("Você pescou "+fish.name+" e ganhou "+fish.value.toFixed(3))
}

dailyCount++

updateUI()

}

document.getElementById("fishButton").onclick=fish

function updateUI(){

document.getElementById("money").innerText="Saldo SUN: "+sunBalance.toFixed(3)
document.getElementById("dailyCount").innerText="Tentativas hoje: "+dailyCount+"/15"

updateBolsa()

}

function updateBolsa(){

let div=document.getElementById("bolsa")

div.innerHTML=""

bolsa.forEach((v,i)=>{

let b=document.createElement("button")

b.innerText=v.name+" L"+v.level

b.onclick=()=>{currentVaraIndex=i}

div.appendChild(b)

})

}

function addVaraToInventory(name){

let v={name:name,level:1,xp:0}

inventory.push(v)
bolsa.push(v)

updateBolsa()

}

const boxCosts={
Comum:200,
Rara:330,
Epica:432,
Lendaria:504,
Mitica:600
}

const boxChances={

Comum:[
{name:"Comum Fibra",chance:69},
{name:"Incomum Grafite",chance:20},
{name:"Raro Carbono",chance:10},
{name:"Mítico Adamantium",chance:1}
],

Rara:[
{name:"Comum Fibra",chance:40},
{name:"Incomum Grafite",chance:35},
{name:"Raro Carbono",chance:20},
{name:"Épico Titânio",chance:4},
{name:"Mítico Adamantium",chance:1}
],

Epica:[
{name:"Incomum Grafite",chance:30},
{name:"Raro Carbono",chance:30},
{name:"Épico Titânio",chance:30},
{name:"Lendário Platina",chance:9},
{name:"Mítico Adamantium",chance:1}
],

Lendaria:[
{name:"Raro Carbono",chance:25},
{name:"Épico Titânio",chance:35},
{name:"Lendário Platina",chance:39},
{name:"Mítico Adamantium",chance:1}
],

Mitica:[
{name:"Comum Fibra",chance:5},
{name:"Incomum Grafite",chance:10},
{name:"Raro Carbono",chance:15},
{name:"Épico Titânio",chance:20},
{name:"Lendário Platina",chance:25},
{name:"Mítico Adamantium",chance:25}
]

}

function openBox(type){

if(sunBalance<boxCosts[type]){
alert("Saldo insuficiente")
return
}

sunBalance-=boxCosts[type]

let rand=Math.random()*100
let acc=0

for(let item of boxChances[type]){

acc+=item.chance

if(rand<=acc){

addVaraToInventory(item.name)

alert("Você ganhou "+item.name)

break

}

}

updateUI()

}

document.getElementById("boxComum").onclick=()=>openBox("Comum")
document.getElementById("boxRara").onclick=()=>openBox("Rara")
document.getElementById("boxEpica").onclick=()=>openBox("Epica")
document.getElementById("boxLendaria").onclick=()=>openBox("Lendaria")
document.getElementById("boxMitica").onclick=()=>openBox("Mitica")

const tabs=document.querySelectorAll(".tabButton")

tabs.forEach(t=>{
t.onclick=()=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(t.dataset.target).classList.add("active")
}
})

updateUI()

</script>

</body>
</html>
