<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super Fishing</title>
<style>
body{font-family:'Comic Sans MS', Arial, sans-serif;margin:0;padding:0;background:#d0f0f0;}
.aba{padding:10px;cursor:pointer;display:inline-block;background:#66b3ff;margin-right:5px;border-radius:5px;color:#fff;}
.conteudo{display:none;padding:10px;}
.ativo{display:block;}
button{padding:5px 10px;margin:5px;}
input{padding:5px;margin:5px;width:80px;}
.box{border:1px solid #000;padding:5px;margin:5px;border-radius:5px;background:#fff;}
</style>
</head>
<body>

<!-- Abas -->
<div>
  <div class="aba" onclick="abrirAba('pescar')">Pescar</div>
  <div class="aba" onclick="abrirAba('loja')">Loja</div>
  <div class="aba" onclick="abrirAba('bolsa')">Bolsa</div>
  <div class="aba" onclick="abrirAba('carteira')">Carteira</div>
</div>

<!-- Conteúdos -->
<div id="pescar" class="conteudo">
  <h2>Pescar</h2>
  <p>Pesca diária: <span id="contadorPesca">0</span>/15</p>
  <button onclick="pescar()">Pescar</button>
  <p id="resultadoPesca"></p>
</div>

<div id="loja" class="conteudo">
  <h2>Loja de Boxes</h2>
  <div id="boxes"></div>
</div>

<div id="bolsa" class="conteudo">
  <h2>Bolsa</h2>
  <p>Vara Free: <span id="varasFree"></span></p>
  <p>Outras Varas: <span id="varasNormais"></span></p>
</div>

<div id="carteira" class="conteudo">
  <h2>Carteira</h2>
  <p>SFP: <span id="saldoSFP">5000</span></p>
  <p>SFP2: <span id="saldoSFP2">0</span></p>

  <input type="number" id="inputSFPtoSFP2" placeholder="Valor SFP">
  <button onclick="trocarSFP2()">Converter para SFP2</button><br>

  <input type="number" id="inputSFP2toSFP" placeholder="Valor SFP2">
  <button onclick="trocarSFP()">Converter para SFP</button>
</div>

<script>
/* ===================== Variáveis ===================== */
let saldoSFP = 5000;
let saldoSFP2 = 0;
let contadorPesca = 0;

let varasFree = ["Vara de Bambu"];
let varasNormais = [];
let ativaVara = null;

/* Peixes reais por raridade com valores ROI */
const peixes = {
  comum: [
    {nome:"Tilápia",valor:0.83},
    {nome:"Bagre",valor:1.11},
    {nome:"Carpa",valor:1.66}
  ],
  incomum: [
    {nome:"Dourado",valor:3.33},
    {nome:"Pintado",valor:5},
    {nome:"Pacu",valor:6.66}
  ],
  rara: [
    {nome:"Robalo",valor:10},
    {nome:"Pargo",valor:16.66},
    {nome:"Traíra",valor:25}
  ],
  epica: [
    {nome:"Merluza",valor:50},
    {nome:"Salmão",valor:75},
    {nome:"Atum",valor:100}
  ],
  lendaria: [
    {nome:"Tubarão Branco",valor:200},
    {nome:"Tubarão Tigre",valor:300},
    {nome:"Tubarão Martelo",valor:400}
  ],
  mitica: [
    {nome:"Tubarão Mako",valor:500},
    {nome:"Tubarão Limão",valor:700},
    {nome:"Tubarão Baleia",valor:1000}
  ]
};

/* Varas reais */
const varas = {
  comum:["Fibra"],
  incomum:["Grafite"],
  rara:["Carbono"],
  epica:["Titânio"],
  lendaria:["Platina"],
  mitica:["Adamantium"]
};

/* Boxes com drop 80/20 de uma vara apenas */
const boxes = [
  {nome:"Box Comum",raridade:"comum",preco:50,drop:[varas.comum[0],varas.comum[0]+" Reforçada"],percent:[80,20]},
  {nome:"Box Incomum",raridade:"incomum",preco:150,drop:[varas.incomum[0],varas.incomum[0]+" Reforçada"],percent:[80,20]},
  {nome:"Box Rara",raridade:"rara",preco:250,drop:[varas.rara[0],varas.rara[0]+" Reforçada"],percent:[80,20]},
  {nome:"Box Épica",raridade:"epica",preco:500,drop:[varas.epica[0],varas.epica[0]+" Reforçada"],percent:[80,20]},
  {nome:"Box Lendária",raridade:"lendaria",preco:1000,drop:[varas.lendaria[0],varas.lendaria[0]+" Reforçada"],percent:[80,20]},
  {nome:"Box Mítica",raridade:"mitica",preco:2000,drop:[varas.mitica[0],varas.mitica[0]+" Reforçada"],percent:[80,20]}
];

/* ===================== Funções ===================== */
function atualizarSaldos(){
  document.getElementById("saldoSFP").innerText = saldoSFP.toFixed(2);
  document.getElementById("saldoSFP2").innerText = saldoSFP2.toFixed(2);
  document.getElementById("varasFree").innerText = varasFree.join(", ");
  document.getElementById("varasNormais").innerText = varasNormais.join(", ");
  document.getElementById("contadorPesca").innerText = contadorPesca+"/15";
}

/* Abrir abas */
function abrirAba(id){
  document.querySelectorAll(".conteudo").forEach(c => c.classList.remove("ativo"));
  document.getElementById(id).classList.add("ativo");
}

/* Pescar */
function pescar(){
  if(contadorPesca>=15){alert("Limite diário de pesca atingido!");return;}
  if(!ativaVara){alert("Ative uma vara primeiro!");return;}
  contadorPesca++;
  const raridade = ativaVara.raridade;
  const peixesDaVara = peixes[raridade];
  const peixe = peixesDaVara[Math.floor(Math.random()*peixesDaVara.length)];
  saldoSFP2 += peixe.valor;
  document.getElementById("resultadoPesca").innerText = `Parabéns! Você pescou ${peixe.nome} e ganhou ${peixe.valor} SFP2`;
  atualizarSaldos();
}

/* Ativar Vara */
function ativarVara(nome,raridade){
  ativaVara = {nome,raridade};
  alert(`🎣 Parabéns, você ativou a vara ${nome}`);
}

/* Comprar Box */
function comprarBox(index){
  const box = boxes[index];
  if(saldoSFP<box.preco){alert("Saldo insuficiente");return;}
  saldoSFP -= box.preco;
  // Drop 80/20 apenas 1 vara
  const rnd = Math.random()*100;
  let acumulado=0;
  let dropVara=null;
  for(let i=0;i<box.drop.length;i++){
    acumulado+=box.percent[i];
    if(rnd<=acumulado){dropVara=box.drop[i];break;}
  }
  varasNormais.push(dropVara);
  alert(`🎉 Parabéns! Você ganhou a vara ${dropVara}`);
  atualizarSaldos();
}

/* Conversão SFP ↔ SFP2 */
function trocarSFP2(){
  const val = parseFloat(document.getElementById("inputSFPtoSFP2").value);
  if(isNaN(val)||val<=0){alert("Valor inválido");return;}
  if(val>saldoSFP){alert("Saldo SFP insuficiente");return;}
  saldoSFP-=val;
  saldoSFP2+=val;
  alert(`✅ Convertido ${val} SFP para ${val} SFP2`);
  atualizarSaldos();
  document.getElementById("inputSFPtoSFP2").value="";
}

function trocarSFP(){
  const val = parseFloat(document.getElementById("inputSFP2toSFP").value);
  if(isNaN(val)||val<=0){alert("Valor inválido");return;}
  if(val>saldoSFP2){alert("Saldo SFP2 insuficiente");return;}
  saldoSFP2-=val;
  saldoSFP+=val;
  alert(`✅ Convertido ${val} SFP2 para ${val} SFP`);
  atualizarSaldos();
  document.getElementById("inputSFP2toSFP").value="";
}

/* Criar Loja Boxes */
function renderLoja(){
  const div=document.getElementById("boxes");
  boxes.forEach((box,i)=>{
    const boxDiv=document.createElement("div");
    boxDiv.className="box";
    boxDiv.innerHTML=`
      <b>${box.nome}</b><br>
      Varas: ${box.drop.join(", ")}<br>
      % Drop: ${box.percent.join("/")}<br>
      Preço: ${box.preco} SFP<br>
      <button onclick="comprarBox(${i})">Comprar</button>
      <button onclick="ativarVara('${box.drop[0]}','${box.raridade}')">Ativar Vara</button>
    `;
    div.appendChild(boxDiv);
  });
}

/* Inicializar */
window.onload=function(){
  atualizarSaldos();
  renderLoja();
}
</script>

</body>
</html>
