<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #shop, #upgradeList, #bag { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p>Vara atual: <span id="currentVara">Vara de Bambu (Nível 1)</span></p>
</div>

<div id="inventorySection" class="section">
  <h3>Inventário</h3>
  <div id="inventory"></div>
  <h4>Bolsa de Varas</h4>
  <div id="bag"></div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="box1">📦 Box 1</button>
    <button id="box2">📦 Box 2</button>
    <button id="box3">📦 Box 3</button>
    <button id="box4">📦 Box 4</button>
  </div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgradeList"></div>
</div>

<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="inventorySection">🎒 Inventário</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999;
let fishingTimeout = null;

// Varas
const varas = {
  "Bambu":[{level:1,chance:50,maxRarity:"Muito Comum"},{level:2,chance:40,maxRarity:"Muito Comum"},{level:3,chance:30,maxRarity:"Muito Comum"},{level:4,chance:20,maxRarity:"Muito Comum"},{level:5,chance:10,maxRarity:"Muito Comum"}],
  "Fibra":[{level:1,chance:50,maxRarity:"Comum"},{level:2,chance:40,maxRarity:"Comum"},{level:3,chance:30,maxRarity:"Comum"},{level:4,chance:20,maxRarity:"Comum"},{level:5,chance:10,maxRarity:"Comum"}],
  "Grafite":[{level:1,chance:50,maxRarity:"Incomum"},{level:2,chance:40,maxRarity:"Incomum"},{level:3,chance:30,maxRarity:"Incomum"},{level:4,chance:20,maxRarity:"Incomum"},{level:5,chance:10,maxRarity:"Incomum"}],
  "Carbono":[{level:1,chance:50,maxRarity:"Raro"},{level:2,chance:40,maxRarity:"Raro"},{level:3,chance:30,maxRarity:"Raro"},{level:4,chance:20,maxRarity:"Raro"},{level:5,chance:10,maxRarity:"Raro"}],
  "Titânio":[{level:1,chance:50,maxRarity:"Épico"},{level:2,chance:40,maxRarity:"Épico"},{level:3,chance:30,maxRarity:"Épico"},{level:4,chance:20,maxRarity:"Épico"},{level:5,chance:10,maxRarity:"Épico"}],
  "Platina":[{level:1,chance:50,maxRarity:"Lendário"},{level:2,chance:40,maxRarity:"Lendário"},{level:3,chance:30,maxRarity:"Lendário"},{level:4,chance:20,maxRarity:"Lendário"},{level:5,chance:10,maxRarity:"Lendário"}],
  "Adamantium":[{level:1,chance:50,maxRarity:"Mítico"},{level:2,chance:40,maxRarity:"Mítico"},{level:3,chance:30,maxRarity:"Mítico"},{level:4,chance:20,maxRarity:"Mítico"},{level:5,chance:10,maxRarity:"Mítico"}]
};

// Peixes
const fishes=[
{name:"Sardinha",value:1,rarity:"Muito Comum",time:3000},
{name:"Anchova",value:1,rarity:"Muito Comum",time:3000},
{name:"Peixinho-lua",value:1,rarity:"Muito Comum",time:3000},
{name:"Tainha",value:1,rarity:"Muito Comum",time:3000},
{name:"Robalo",value:2,rarity:"Comum",time:4000},
{name:"Cavala",value:3,rarity:"Comum",time:4000},
{name:"Corvina",value:3,rarity:"Comum",time:4000},
{name:"Badejo-pequeno",value:2,rarity:"Comum",time:4000},
{name:"Atum",value:5,rarity:"Incomum",time:5000},
{name:"Badejo",value:6,rarity:"Incomum",time:5000},
{name:"Garoupa juvenil",value:6,rarity:"Incomum",time:5000},
{name:"Cavala-real",value:5,rarity:"Incomum",time:5000},
{name:"Garoupa adulta",value:10,rarity:"Raro",time:7000},
{name:"Linguado",value:12,rarity:"Raro",time:7000},
{name:"Pargo",value:10,rarity:"Raro",time:7000},
{name:"Robalo-do-mar",value:12,rarity:"Raro",time:7000},
{name:"Salmão do Atlântico",value:18,rarity:"Épico",time:9000},
{name:"Dourado do mar",value:20,rarity:"Épico",time:9000},
{name:"Cavalinha-real",value:18,rarity:"Épico",time:9000},
{name:"Bonito",value:20,rarity:"Épico",time:9000},
{name:"Peixe-espada",value:30,rarity:"Lendário",time:12000},
{name:"Tubarão",value:35,rarity:"Lendário",time:12000},
{name:"Marlim-negro",value:32,rarity:"Lendário",time:12000},
{name:"Marlim-azul jovem",value:35,rarity:"Lendário",time:12000},
{name:"Tubarão-branco adulto",value:60,rarity:"Mítico",time:15000},
{name:"Marlim Azul",value:100,rarity:"Mítico",time:15000},
{name:"Peixe-lua gigante",value:80,rarity:"Mítico",time:15000},
{name:"Peixe-saberto",value:90,rarity:"Mítico",time:15000}
];

// Inventário e bolsa
let inventory=[{name:"Bambu",level:1}];
let currentVaraIndex=0;

// Rarity class
function rarityClass(r){switch(r){case"Muito Comum":return"fish-muito-comum";case"Comum":return"fish-comum";case"Incomum":return"fish-incomum";case"Raro":return"fish-raro";case"Épico":return"fish-epico";case"Lendário":return"fish-lendario";case"Mítico":return"fish-mitico";default:return"";}}

// Pesca
function getCurrentVara(){ return inventory[currentVaraIndex]; }
function getRandomFishByVara(vara){
const allowed=fishes.filter(f=>["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"].indexOf(f.rarity)<=["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"].indexOf(varas[vara.name][vara.level-1].maxRarity));
return allowed[Math.floor(Math.random()*allowed.length)];
}

// Inventário e Bolsa
function updateInventoryDisplay(){
const invDiv=document.getElementById("inventory");
invDiv.innerHTML=`<b>Vara ativa:</b> ${getCurrentVara().name} (Nível ${getCurrentVara().level})`;
const bagDiv=document.getElementById("bag");
bagDiv.innerHTML="";
let bagMap={};
inventory.forEach((v,i)=>{
if(i!==currentVaraIndex){
const key=`${v.name}_N${v.level}`;
bagMap[key]=bagMap[key]||{vara:v,count:0,indices:[]};
bagMap[key].count++; bagMap[key].indices.push(i);
}
});
for(const key in bagMap){
const info=bagMap[key];
const btn=document.createElement("button");
btn.innerText=`${info.vara.name} (Nível ${info.vara.level}) x${info.count}`;
btn.onclick=function(){ currentVaraIndex=info.indices[0]; updateInventoryDisplay(); }
bagDiv.appendChild(btn);
}
updateUpgradeDisplay();
}

// Abrir box
function getVarasForBox(box){ const boxDrops={"box1":["Fibra","Grafite"],"box2":["Grafite","Carbono"],"box3":["Carbono","Titânio"],"box4":["Titânio","Platina","Adamantium"]}; return boxDrops[box].map(n=>({name:n,level:1})); }
function openBox(box){ const list=getVarasForBox(box); const selected=list[Math.floor(Math.random()*list.length)]; inventory.push(selected); alert(`Você ganhou uma vara: ${selected.name} (Nível ${selected.level})`); updateInventoryDisplay(); }

// Pesca
const fishButton=document.getElementById("fishButton"); const skipButton=document.getElementById("skipButton"); const result=document.getElementById("result");
fishButton.onclick=function(){ fishButton.disabled=true; skipButton.style.display="inline-block"; const vara=getCurrentVara(); const fish=getRandomFishByVara(vara); result.innerText="Esperando o peixe morder a isca..."; fishingTimeout=setTimeout(()=>{ if(Math.random()*100<varas[vara.name][vara.level-1].chance){ alert("O peixe escapou! 😢"); } else{ money+=fish.value; document.getElementById("money").innerText="Saldo: "+money; result.innerHTML=`Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`; } fishButton.disabled=false; skipButton.style.display="none"; },fish.time); }
skipButton.onclick=function(){ if(fishingTimeout){ clearTimeout(fishingTimeout); fishingTimeout=null; fishButton.disabled=false; skipButton.style.display="none"; } }

// Upgrade
function updateUpgradeDisplay(){
const div=document.getElementById("upgradeList"); div.innerHTML="";
const bolsa=inventory.filter((v,i)=>i!==currentVaraIndex && v.name!=="Bambu");
if(bolsa.length===0){ div.innerHTML="<p>Nenhuma vara disponível para upgrade!</p>"; return; }
["Fibra","Grafite","Carbono","Titânio","Platina","Adamantium"].forEach(name=>{
const list=bolsa.filter(v=>v.name===name);
if(list.length===0) return;
const sec=document.createElement("div"); sec.innerHTML=`<h4>${name}</h4>`;
list.forEach((vara,i)=>{
const nextLevel=vara.level+1; if(nextLevel>5) return;
const btn=document.createElement("button"); btn.innerText=`${vara.name} (Nível ${vara.level}) → Nível ${nextLevel}`;
btn.onclick=function(){
const matIndex=inventory.findIndex((v,j)=>v.name===vara.name && v.level===vara.level && j!==currentVaraIndex);
if(matIndex===-1){ alert("Precisa de outra vara igual para upgrade!"); return; }
const confirma=confirm(`Usar esta vara e outra igual da bolsa para upar ${vara.name} para Nível ${nextLevel}?`);
if(!confirma) return;
inventory.splice(matIndex,1); vara.level=nextLevel; alert(`Upgrade realizado! ${vara.name} agora Nível ${vara.level}`); updateInventoryDisplay(); updateUpgradeDisplay();
}
sec.appendChild(btn);
}); div.appendChild(sec);
});
}

// Abas
document.querySelectorAll(".tabButton").forEach(btn=>{ btn.onclick=function(){ const target=this.dataset.target; document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active")); document.getElementById(target).classList.add("active"); } })

// Box buttons
document.getElementById("box1").onclick=()=>openBox("box1");
document.getElementById("box2").onclick=()=>openBox("box2");
document.getElementById("box3").onclick=()=>openBox("box3");
document.getElementById("box4").onclick=()=>openBox("box4");

updateInventoryDisplay();
});
</script>
</body>
</html>
