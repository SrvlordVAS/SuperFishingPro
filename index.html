<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>

<style>

body{
font-family:'Comic Sans MS',Arial;
margin:0;
padding:20px 0 80px 0;
background:linear-gradient(to bottom,#87ceeb,#ffffff);
text-align:center;
}

h1{color:#006994;text-shadow:2px 2px #aee1f7;}
h3{color:#004466;}

#result{
font-size:16px;
margin:15px 0 20px 0;
min-height:30px;
}

button{
background:#00aaff;
color:white;
border:none;
border-radius:5px;
padding:5px 8px;
font-size:14px;
cursor:pointer;
margin:2px;
}

button:hover{background:#0088cc;}

.section{display:none;margin-top:15px;}
.section.active{display:block;}

#bolsa{
border:1px solid #004466;
padding:8px;
margin:8px auto;
width:90%;
max-width:400px;
border-radius:5px;
background:#e0f7ff;
text-align:left;
}

#bottomMenu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#00aaff;
display:flex;
}

#bottomMenu button{flex:1;}

.selected{
background:#ffcc00 !important;
color:black !important;
}

.fish-muito-comum{color:gray;}
.fish-comum{color:green;}
.fish-incomum{color:blue;}
.fish-raro{color:purple;}
.fish-epico{color:orange;}
.fish-lendario{color:red;}
.fish-mitico{color:black;background:yellow;padding:2px 4px;border-radius:3px;}

</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>

<h3 id="money">Saldo SUN: 500</h3>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<div id="pesca" class="section active">

<p id="result">Clique em pescar</p>

<button id="fishButton">🎣 PESCAR</button>
<button id="skipButton" style="display:none;">⏩ Pular espera</button>

<p id="currentVara"></p>

<h4>Bolsa de Varas</h4>
<div id="bolsa"></div>

</div>

<div id="shopSection" class="section">
<h3>Loja</h3>

<button>📦 Box Comum (81)</button>
<button>📦 Box Rara (135)</button>
<button>📦 Box Épica (162)</button>
<button>📦 Box Lendária (189)</button>

</div>

<div id="upgradeSection" class="section">

<h3>Upgrade</h3>
XP disponível: <span id="xpReservoir">0</span>

</div>

<div id="bottomMenu">

<button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
<button class="tabButton" data-target="shopSection">🏪 Loja</button>
<button class="tabButton" data-target="upgradeSection">⚒ Upgrade</button>

</div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const result = document.getElementById("result")
const skipButton = document.getElementById("skipButton")
const fishButton = document.getElementById("fishButton")

let sunBalance=500
let dailyCount=0
const dailyLimit=15

let fishingTimeout=null

const rarityOrder=[
"Muito Comum",
"Comum",
"Incomum",
"Raro",
"Épico",
"Lendário",
"Mítico"
]

const rarityWeights={
"Muito Comum":40,
"Comum":25,
"Incomum":15,
"Raro":10,
"Épico":6,
"Lendário":3,
"Mítico":1
}

const fishTimes={
"Muito Comum":3000,
"Comum":4000,
"Incomum":6000,
"Raro":8000,
"Épico":10000,
"Lendário":12000,
"Mítico":15000
}

const varas={
"Bambu":{maxRarity:"Muito Comum",chance:50}
}

const fishes=[

{name:"Sardinha",value:0.0075,rarity:"Muito Comum"},
{name:"Robalo",value:0.015,rarity:"Comum"},
{name:"Tainha",value:0.03,rarity:"Comum"},
{name:"Corvina",value:0.045,rarity:"Comum"},
{name:"Atum",value:0.06,rarity:"Incomum"},
{name:"Garoupa pequena",value:0.075,rarity:"Incomum"},
{name:"Pargo",value:0.09,rarity:"Incomum"},
{name:"Garoupa adulta",value:0.105,rarity:"Raro"},
{name:"Salmão",value:0.12,rarity:"Épico"},
{name:"Truta",value:0.135,rarity:"Épico"},
{name:"Tubarão",value:0.15,rarity:"Lendário"},
{name:"Marlim Azul",value:0.165,rarity:"Mítico"}

]

let inventory=[{name:"Bambu",level:1}]
let currentVaraIndex=0

function getCurrentVara(){
return inventory[currentVaraIndex]
}

function getFishClass(rarity){
return rarity
.toLowerCase()
.replace(" ","-")
.replace("é","e")
.replace("í","i")
.replace("á","a")
}

function getRandomFish(){

let weighted=[]

fishes.forEach(fish=>{

let weight=rarityWeights[fish.rarity]

for(let i=0;i<weight;i++){
weighted.push(fish)
}

})

return weighted[Math.floor(Math.random()*weighted.length)]

}

function updateBolsa(){

const bolsa=document.getElementById("bolsa")
bolsa.innerHTML=""

inventory.forEach((v,i)=>{

const btn=document.createElement("button")

btn.innerText=v.name+" Nv"+v.level

bolsa.appendChild(btn)

})

}

function updateWallet(){
document.getElementById("money").innerText="Saldo SUN: "+sunBalance.toFixed(3)
}

function updateDaily(){
document.getElementById("dailyCount").innerText=
"Tentativas hoje: "+dailyCount+"/"+dailyLimit
}

fishButton.onclick=function(){

if(dailyCount>=dailyLimit){
result.innerText="Limite diário atingido"
return
}

const fish=getRandomFish()

const time=fishTimes[fish.rarity]

result.innerText="Esperando o peixe..."

skipButton.style.display="inline-block"

fishingTimeout=setTimeout(()=>{

let value=fish.value

sunBalance+=value

const fishClass=getFishClass(fish.rarity)

result.innerHTML=
`🎣 Você pescou <span class="fish-${fishClass}">${fish.name}</span> +${value.toFixed(3)} SUN`

if(["Épico","Lendário","Mítico"].includes(fish.rarity)){
result.innerHTML="✨ PEIXE "+fish.rarity.toUpperCase()+"!<br>"+result.innerHTML
}

updateWallet()

dailyCount++

updateDaily()

skipButton.style.display="none"

},time)

}

skipButton.onclick=function(){
clearTimeout(fishingTimeout)
fishButton.click()
}

const tabs=document.querySelectorAll(".tabButton")

tabs.forEach(tab=>{
tab.onclick=function(){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(tab.dataset.target)
.classList.add("active")

tabs.forEach(t=>t.classList.remove("selected"))
tab.classList.add("selected")

}
})

updateBolsa()
updateWallet()
updateDaily()

})

</script>
</body>
</html>
