<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 120px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:18px; margin:15px 0 30px 0; min-height:40px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:8px; padding:10px 15px; font-size:16px; cursor:pointer; margin:3px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.fish-muito-comum {color:gray;}
.fish-comum {color:green;}
.fish-incomum {color:blue;}
.fish-raro {color:purple;}
.fish-epico {color:orange;}
.fish-lendario {color:red;}
.fish-mitico {color:black; background:yellow; padding:2px 5px; border-radius:3px;}
.section { display:none; margin-top:20px; }
.section.active { display:block; }
#inventory, #shop, #upgrade { border:1px solid #004466; padding:10px; margin:10px auto; width:90%; max-width:400px; border-radius:8px; background:#e0f7ff; text-align:left; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:10px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); }
#bottomMenu button { flex:1; margin:0 5px; }
.selected { background-color:#ffcc00 !important; color:black !important; }
.bag { border:1px solid #004466; padding:5px; margin-top:10px; border-radius:5px; background:#c0e7ff; cursor:pointer; }
.bag.open { background:#a0d4ff; }
.bag-items { display:none; margin-top:5px; }
.bag.open .bag-items { display:block; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="money">Saldo: 9999</h3>

<!-- Seções -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ Pular espera</button>
  <p><strong>Vara ativa:</strong> <span id="currentVara">Vara de Bambu (Nível 1)</span></p>
</div>

<div id="inventorySection" class="section">
  <h3>Inventário</h3>
  <p><strong>Vara ativa:</strong> <span id="activeVaraDisplay"></span></p>
  <div class="bag" id="bagToggle">👜 Bolsa de varas
    <div class="bag-items" id="bagItems"></div>
  </div>
</div>

<div id="upgradeSection" class="section">
  <h3>Upgrade de Varas</h3>
  <div id="upgradeBag"></div>
</div>

<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopBoxes">
    <h4>Abra uma box:</h4>
    <button id="box1">📦 Box 1 (Incomum/Comum)</button>
    <button id="box2">📦 Box 2 (Raro/Incomum/Comum)</button>
    <button id="box3">📦 Box 3 (Épico/Raro/Incomum/Comum)</button>
    <button id="box4">📦 Box 4 (Lendário/Épico/Raro/Incomum/Comum)</button>
  </div>
</div>

<!-- Menu inferior -->
<div id="bottomMenu">
  <button class="tabButton" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="inventorySection">🎒 Inventário</button>
  <button class="tabButton" data-target="upgradeSection">⚡ Upgrade</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let money = 9999
let fishingTimeout = null

// Varas disponíveis
const varas = {
  "Bambu": [{level:1},{level:2},{level:3},{level:4},{level:5}],
  "Fibra": [{level:1},{level:2},{level:3},{level:4},{level:5}],
  "Grafite": [{level:1},{level:2},{level:3},{level:4},{level:5}],
  "Carbono": [{level:1},{level:2},{level:3},{level:4},{level:5}],
  "Titânio": [{level:1},{level:2},{level:3},{level:4},{level:5}],
  "Platina": [{level:1},{level:2},{level:3},{level:4},{level:5}],
  "Adamantium": [{level:1},{level:2},{level:3},{level:4},{level:5}]
};

// Peixes
const fishes = [
  {name:"Sardinha", value:1, rarity:"Muito Comum", time:3000},
  {name:"Robalo", value:2, rarity:"Comum", time:4000},
  {name:"Atum", value:5, rarity:"Incomum", time:5000},
  {name:"Garoupa adulta", value:10, rarity:"Raro", time:7000},
  {name:"Salmão do Atlântico", value:18, rarity:"Épico", time:9000},
  {name:"Peixe-espada", value:30, rarity:"Lendário", time:12000}
];

// Variáveis principais
let activeVara = {name:"Bambu", level:1}
let bag = [] // varas da bolsa

// Atualiza displays
function updateInventoryDisplay(){
  document.getElementById("activeVaraDisplay").innerText = `${activeVara.name} (Lvl ${activeVara.level})`
  const bagDiv = document.getElementById("bagItems")
  bagDiv.innerHTML = ""
  bag.forEach((v,i)=>{
    const btn = document.createElement("button")
    btn.innerText = `${v.name} (Lvl ${v.level})`
    btn.onclick = function(){
      // troca com ativa
      let temp = activeVara
      activeVara = v
      bag[i] = temp
      updateInventoryDisplay()
    }
    bagDiv.appendChild(btn)
  })
  updateUpgradeDisplay()
}

// Toggle da bolsa
document.getElementById("bagToggle").onclick = function(){
  this.classList.toggle("open")
}

// Função de upgrade
function updateUpgradeDisplay(){
  const upgradeDiv = document.getElementById("upgradeBag")
  upgradeDiv.innerHTML = ""
  // agrupa por tipo e level
  let counts = {}
  bag.forEach(v=>{
    if(v.name==="Bambu") return // não pode upar
    const key = v.name+"_"+v.level
    if(!counts[key]) counts[key]=[]
    counts[key].push(v)
  })
  for(const key in counts){
    if(counts[key].length>=2){
      const parts = key.split("_")
      const name = parts[0], level = parseInt(parts[1])
      const btn = document.createElement("button")
      btn.innerText = `Upgrade ${name} Lvl ${level} → Lvl ${level+1} (${counts[key].length} disponíveis)`
      btn.onclick = function(){
        if(confirm(`Deseja usar 2 varas ${name} Lvl ${level} para criar 1 Lvl ${level+1}?`)){
          // consome 2 varas
          let removed = 0
          for(let i=bag.length-1;i>=0;i--){
            if(bag[i].name===name && bag[i].level===level && removed<2){
              bag.splice(i,1)
              removed++
            }
          }
          // adiciona nova
          bag.push({name:name, level:level+1})
          updateInventoryDisplay()
          alert(`Upgrade realizado! Nova vara ${name} Lvl ${level+1} adicionada à bolsa.`)
        }
      }
      upgradeDiv.appendChild(btn)
    }
  }
}

// Pescar
const fishButton = document.getElementById("fishButton")
const skipButton = document.getElementById("skipButton")
const result = document.getElementById("result")

function getRandomFishByVara(vara){
  const allowed = fishes.filter(f=>{
    const rarityOrder = ["Muito Comum","Comum","Incomum","Raro","Épico","Lendário","Mítico"]
    let maxRarity = "Muito Comum"
    switch(vara.name){
      case "Bambu": maxRarity="Muito Comum"; break
      case "Fibra": maxRarity="Comum"; break
      case "Grafite": maxRarity="Incomum"; break
      case "Carbono": maxRarity="Raro"; break
      case "Titânio": maxRarity="Épico"; break
      case "Platina": maxRarity="Lendário"; break
      case "Adamantium": maxRarity="Mítico"; break
    }
    return rarityOrder.indexOf(f.rarity)<=rarityOrder.indexOf(maxRarity)
  })
  return allowed[Math.floor(Math.random()*allowed.length)]
}

fishButton.onclick = function(){
  fishButton.disabled=true
  skipButton.style.display="inline-block"
  const fish = getRandomFishByVara(activeVara)
  result.innerText="Esperando o peixe morder a isca..."
  fishingTimeout = setTimeout(()=>{
    money += fish.value
    document.getElementById("money").innerText="Saldo: "+money
    result.innerHTML=`Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    fishButton.disabled=false
    skipButton.style.display="none"
  }, fish.time)
}

skipButton.onclick=function(){
  if(fishingTimeout){
    clearTimeout(fishingTimeout)
    fishingTimeout=null
    const fish=getRandomFishByVara(activeVara)
    money += fish.value
    document.getElementById("money").innerText="Saldo: "+money
    result.innerHTML=`Você pescou: <span class="${rarityClass(fish.rarity)}">${fish.name} [${fish.rarity}]</span> (+${fish.value})`
    fishButton.disabled=false
    skipButton.style.display="none"
  }
}

function rarityClass(rarity){
  switch(rarity){
    case "Muito Comum": return "fish-muito-comum"
    case "Comum": return "fish-comum"
    case "Incomum": return "fish-incomum"
    case "Raro": return "fish-raro"
    case "Épico": return "fish-epico"
    case "Lendário": return "fish-lendario"
    case "Mítico": return "fish-mitico"
    default: return ""
  }
}

// Loja: box
function openBox(list){
  const selected = list[Math.floor(Math.random()*list.length)]
  bag.push(selected)
  updateInventoryDisplay()
  alert(`Você ganhou uma vara: ${selected.name} Lvl ${selected.level}`)
}

// Box arrays
const box1 = [{name:"Fibra",level:1},{name:"Bambu",level:1}]
const box2 = [{name:"Fibra",level:1},{name:"Grafite",level:1},{name:"Bambu",level:1}]
const box3 = [{name:"Grafite",level:1},{name:"Carbono",level:1},{name:"Fibra",level:1},{name:"Bambu",level:1}]
const box4 = [{name:"Platina",level:1},{name:"Titânio",level:1},{name:"Carbono",level:1},{name:"Grafite",level:1},{name:"Bambu",level:1}]

document.getElementById("box1").onclick=()=>openBox(box1)
document.getElementById("box2").onclick=()=>openBox(box2)
document.getElementById("box3").onclick=()=>openBox(box3)
document.getElementById("box4").onclick=()=>openBox(box4)

// Abas
document.querySelectorAll(".tabButton").forEach(btn=>{
  btn.onclick=function(){
    const target=this.dataset.target
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"))
    document.getElementById(target).classList.add("active")
  }
})

updateInventoryDisplay()
document.getElementById("currentVara").innerText = `${activeVara.name} (Lvl ${activeVara.level})`

})
</script>
</body>
</html>
