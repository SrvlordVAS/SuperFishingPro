<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { display:inline-block; background-color:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; font-size:14px; cursor:pointer; margin:2px; transition:0.2s; }
button:hover { background-color:#0088cc; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }

#bolsaContainer { width:90%; max-width:400px; margin:0 auto; }

#bolsaMenuBox {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#e0f7ff;
  margin-bottom:8px;
}

#bolsaVarasBox {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#d0f0ff;
}

#bolsaMenu { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
#bolsaVaras { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }

#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:5px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:12px; }
#bottomMenu button { flex:1; margin:0 2px; padding:5px 0; font-size:12px; }

.selected { background-color:#ffcc00 !important; color:black !important; }
.bag-item { cursor:pointer; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>

  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>

    <!-- MENU DE RARIDADES -->
    <div id="bolsaMenuBox">
      <div id="bolsaMenu"></div>
    </div>

    <!-- VARAS -->
    <div id="bolsaVarasBox">
      <div id="bolsaVaras"></div>
    </div>
  </div>
</div>

<!-- LOJA -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <p>Em breve...</p>
</div>

<!-- BOTTOM MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;

// VARAS
const varas = {
  "Bambu": {profit: 100, captureRate:50, fishes:["Sardinha"], rarity:"Muito Comum"}
};

// PEIXES
const fishData = {
  "Sardinha": {value:0.06}
};

// INVENTÁRIO
let bolsa = [{name:"Bambu", profit:100, captureRate:50, fishes:["Sardinha"], rarity:"Muito Comum"}];
let currentVaraIndex = 0;

// MENU DE RARIDADES
const raridades = ["Muito Comum","Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let selectedRarity = "Muito Comum";

// FUNÇÕES
function getCurrentVara(){ return bolsa[currentVaraIndex]; }

function getRandomFishByVara(vara){
  const possibleFishes = vara.fishes;
  const fishName = possibleFishes[Math.floor(Math.random()*possibleFishes.length)];
  if(Math.random()*100 <= vara.captureRate) return fishName;
  return null;
}

// BOLSA
function setActiveVara(idx){
    currentVaraIndex = idx;
    updateVaraInfo();
    updateBolsaVaras();
}

function updateBolsaMenu(){
    const menuDiv = document.getElementById("bolsaMenu");
    menuDiv.innerHTML = "";
    raridades.forEach(r => {
        const btn = document.createElement("button");
        btn.innerText = r;
        btn.style.border = r===selectedRarity ? "2px solid gold" : "1px solid #004466";
        btn.onclick = ()=>{
            selectedRarity = r;
            updateBolsaVaras();
            updateBolsaMenu();
        };
        menuDiv.appendChild(btn);
    });
}

function updateBolsaVaras(){
    const varasDiv = document.getElementById("bolsaVaras");
    varasDiv.innerHTML = "";
    bolsa.forEach((v, idx)=>{
        if(v.rarity === selectedRarity){
            const btn = document.createElement("button");
            btn.className = "bag-item";
            btn.innerText = v.name;
            btn.style.border = idx === currentVaraIndex ? "2px solid gold" : "1px solid #004466";
            btn.onclick = () => setActiveVara(idx);
            varasDiv.appendChild(btn);
        }
    });
}

// PESCA
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

function fishAction(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }
  const vara = getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }

  const fishName = getRandomFishByVara(vara);
  if(fishName){
    const profit = fishData[fishName].value * (vara.profit/100);
    alert(`🎉 Você pescou: ${fishName} e ganhou ${profit.toFixed(3)} SFP2`);
  } else {
    alert("O peixe escapou!");
  }

  dailyCount++;
  document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/15`;

  skipButton.style.display = "none";
  fishButton.disabled = false;
  result.innerText = "Clique em pescar";
}

fishButton.onclick = function(){
  fishButton.disabled = true;
  result.innerText = "Esperando o peixe morder a isca...";
  skipButton.style.display = "inline-block";
  fishingTimeout = setTimeout(()=>{
    fishAction();
  },5000);
};

skipButton.onclick = function(){
  if(fishingTimeout) clearTimeout(fishingTimeout);
  fishAction();
};

// VARA ATIVA
function updateVaraInfo(){
    const vara = getCurrentVara();
    if(!vara){
        document.getElementById("currentVara").innerText = "Nenhuma vara ativa";
        document.getElementById("varaStats").innerText = "";
        return;
    }
    document.getElementById("currentVara").innerText = `Vara ativa: ${vara.name}`;
    document.getElementById("varaStats").innerText = 
        `Peixes que pode capturar: ${vara.fishes.join(", ")}\nTaxa de captura: ${vara.captureRate}%`;
}

// TABS
const tabs = document.querySelectorAll(".tabButton");
tabs.forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    tabs.forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  }
});

// INICIALIZA
updateBolsaMenu();
updateBolsaVaras();
updateVaraInfo();

});
</script>
</body>
</html>
