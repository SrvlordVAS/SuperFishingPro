<!-- Loja: Boxes 3D com animação de abertura -->
<div id="shopBoxes">
  <h4>Abra uma box:</h4>
  <div class="boxes-3d-container">
    <div class="box-3d" data-type="Comum">📦<span>Box Comum</span></div>
    <div class="box-3d" data-type="Rara">📦<span>Box Rara</span></div>
    <div class="box-3d" data-type="Épica">📦<span>Box Épica</span></div>
    <div class="box-3d" data-type="Lendária">📦<span>Box Lendária</span></div>
  </div>
</div>

<style>
.boxes-3d-container {
  display:flex;
  justify-content: space-around;
  flex-wrap: wrap;
  margin-top: 10px;
}

.box-3d {
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:center;
  padding: 25px 30px;
  font-size: 18px;
  border-radius: 15px;
  border: 4px solid transparent;
  margin: 10px;
  cursor: pointer;
  min-width: 160px;
  perspective: 1000px;
  color:white;
  transition: all 0.3s ease;
  position: relative;
  background: linear-gradient(to bottom, #555, #333);
  box-shadow: 0 8px 15px rgba(0,0,0,0.3), 0 0 10px rgba(255,255,255,0.2) inset;
}

.box-3d span {
  margin-top: 10px;
  font-weight: bold;
}

/* Cores por raridade */
.box-3d[data-type="Comum"] { background: linear-gradient(to bottom, #4CAF50, #2E7D32); border-color:#1B5E20; }
.box-3d[data-type="Rara"] { background: linear-gradient(to bottom, #2196F3, #1565C0); border-color:#0D47A1; }
.box-3d[data-type="Épica"] { background: linear-gradient(to bottom, #9C27B0, #6A1B9A); border-color:#4A148C; }
.box-3d[data-type="Lendária"] { background: linear-gradient(to bottom, #FF9800, #F57C00); border-color:#E65100; }

/* Hover 3D */
.box-3d:hover {
  transform: rotateX(10deg) rotateY(10deg) scale(1.1);
  box-shadow: 0 12px 25px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.5) inset;
}

.box-3d[data-type="Lendária"]:hover {
  animation: pulse3d 1s infinite;
}

@keyframes pulse3d {
  0% { box-shadow: 0 12px 25px rgba(255,165,0,0.8), 0 0 15px rgba(255,255,255,0.5) inset; }
  50% { box-shadow: 0 12px 35px rgba(255,200,0,1), 0 0 20px rgba(255,255,255,0.7) inset; }
  100% { box-shadow: 0 12px 25px rgba(255,165,0,0.8), 0 0 15px rgba(255,255,255,0.5) inset; }
}

/* Animação de abrir box */
.box-3d.opening {
  animation: openBoxAnim 0.7s forwards;
}

@keyframes openBoxAnim {
  0% { transform: scale(1) rotateX(0deg) rotateY(0deg); opacity:1; }
  50% { transform: scale(1.3) rotateX(90deg) rotateY(90deg); opacity:0.8; }
  100% { transform: scale(1.5) rotateX(180deg) rotateY(180deg); opacity:0; }
}
</style>

<script>
document.querySelectorAll(".box-3d").forEach(btn=>{
  btn.onclick = ()=>{
    const type = btn.dataset.type;
    const ok = confirm(`Você tem certeza que quer abrir a box ${type}?`);
    if(ok){
      // adiciona classe de animação
      btn.classList.add("opening");
      // espera animação terminar antes de abrir a box
      setTimeout(()=>{
        btn.classList.remove("opening");
        openBox(type); // função existente que abre a box
      }, 700); // duração do keyframe
    }
  };
});
</script>
