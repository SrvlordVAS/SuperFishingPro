<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial, sans-serif; margin:0; padding:20px 0 80px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; text-shadow:2px 2px #aee1f7; }
h3 { color:#004466; }
#result { font-size:16px; margin:15px 0 20px 0; min-height:30px; }
button { cursor:pointer; }
.section { display:none; margin-top:15px; }
.section.active { display:block; }
#bottomMenu { position: fixed; bottom:0; left:0; width:100%; background:#00aaff; display:flex; justify-content:space-around; padding:8px 0; box-shadow:0 -2px 5px rgba(0,0,0,0.3); font-size:14px; border-radius:10px 10px 0 0; }
#bottomMenu button { flex:1; margin:0 5px; padding:10px 0; font-size:14px; border:none; border-radius:15px; background:#00aaff; color:white; }
.selected { background-color:#ffcc00 !important; color:black !important; }

/* ===== BOLSA ===== */
#bolsaContainer { width:90%; max-width:400px; margin:0 auto; }
.bolsa-top, .bolsa-bottom {
  border:1px solid #004466;
  padding:8px;
  border-radius:8px;
  background:#e0f7ff;
  margin-bottom:8px;
}
#bolsaMenu, #bolsaVaras { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
.bag-item { background:#00aaff; color:white; border:none; border-radius:5px; padding:5px 8px; }

/* ===== SHOP ===== */
#shopContainer { width:90%; max-width:400px; margin:0 auto; }
.shop-top, .shop-bottom, #buyBox { border:1px solid #004466; padding:10px; border-radius:10px; background:#e0f7ff; margin-bottom:8px; }
#shopMenu { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.box-card { width:90px; height:90px; border-radius:10px; background:linear-gradient(145deg,#00aaff,#0077aa); display:flex; align-items:center; justify-content:center; color:white; font-size:12px; text-align:center; cursor:pointer; transition:0.2s; box-shadow:0 3px 6px rgba(0,0,0,0.3); }
.box-card:hover { transform:scale(1.05); }
.box-selected { border:3px solid gold; }

/* ===== CARTEIRA ===== */
#wallet { font-size:16px; margin-top:10px; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">Tentativas hoje: 0/15</h3>
<h3 id="wallet">SFP2: 5000</h3>

<!-- PESCA -->
<div id="pesca" class="section active">
  <p id="result">Clique em pescar</p>
  <button id="fishButton">🎣 PESCAR</button>
  <button id="skipButton" style="display:none;">⏩ PULAR ESPERA</button>
  <p id="currentVara">Vara ativa: Nenhuma</p>
  <p id="varaStats"></p>

  <div id="bolsaContainer">
    <h4>Bolsa de Varas:</h4>
    <div class="bolsa-top">
      <div id="bolsaMenu"></div>
    </div>
    <div class="bolsa-bottom">
      <div id="bolsaVaras"></div>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shopSection" class="section">
  <h3>Loja</h3>
  <div id="shopContainer">
    <div class="shop-top">
      <div id="shopMenu"></div>
    </div>
    <div class="shop-bottom">
      <div id="shopContent">Selecione uma box</div>
    </div>
    <div id="buyBox">
      <button id="buyButton">Comprar Vara</button>
    </div>
  </div>
</div>

<!-- CARTEIRA -->
<div id="walletSection" class="section">
  <h3>Carteira</h3>
  <p id="walletContent">Saldo: 5000 SFP2</p>
</div>

<!-- MENU -->
<div id="bottomMenu">
  <button class="tabButton selected" data-target="pesca">🎣 Pescar</button>
  <button class="tabButton" data-target="shopSection">🏪 Loja</button>
  <button class="tabButton" data-target="walletSection">💰 Carteira</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let dailyCount = 0;
const dailyLimit = 15;
let fishingTimeout = null;
let walletBalance = 5000;

// ===== VARAS =====
let bolsa = [
  {name:"Bambu", profit:100, captureRate:50, fishes:["Sardinha"], rarity:"Muito Comum"}
];
let currentVaraIndex = 0;
const raridades = ["Muito Comum","Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let selectedRarity = "Muito Comum";

// ===== PEIXES =====
let fishData = {
  "Sardinha": {value:0.06}
};

// ===== BOLSA =====
function getCurrentVara(){ return bolsa[currentVaraIndex]; }

function setActiveVara(idx){
  if(idx === currentVaraIndex) return;
  if(confirm(`Deseja tornar a vara "${bolsa[idx].name}" ativa?`)){
    currentVaraIndex = idx;
    updateBolsaVaras();
    updateVaraInfo();
  }
}

function updateBolsaMenu(){
  const menu = document.getElementById("bolsaMenu");
  menu.innerHTML = "";
  raridades.forEach(r=>{
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.className = "bag-item";
    btn.onclick = ()=>{
      selectedRarity = r;
      updateBolsaMenu();
      updateBolsaVaras();
    };
    menu.appendChild(btn);
  });
}

function updateBolsaVaras(){
  const div = document.getElementById("bolsaVaras");
  div.innerHTML = "";
  bolsa.forEach((v, idx)=>{
    if(v.rarity === selectedRarity){
      const btn = document.createElement("button");
      btn.innerText = v.name;
      btn.className = "bag-item";
      btn.onclick = ()=> setActiveVara(idx);
      div.appendChild(btn);
    }
  });
}

function updateVaraInfo(){
  const vara = getCurrentVara();
  if(!vara) return;
  document.getElementById("currentVara").innerText = `Vara ativa: ${vara.name}`;
  document.getElementById("varaStats").innerText = 
    `Peixes: ${vara.fishes.join(", ")} | Taxa de captura: ${vara.captureRate}%`;
}

// ===== PESCA =====
const fishButton = document.getElementById("fishButton");
const skipButton = document.getElementById("skipButton");
const result = document.getElementById("result");

function getRandomFishByVara(vara){
  if(Math.random()*100 <= vara.captureRate){
    return vara.fishes[0];
  }
  return null;
}

function fishAction(){
  if(dailyCount >= dailyLimit){ alert("Limite diário atingido!"); return; }

  const vara = getCurrentVara();
  if(!vara){ alert("Nenhuma vara ativa!"); return; }

  const fish = getRandomFishByVara(vara);
  if(fish){
    const profit = fishData[fish].value * (vara.profit/100);
    walletBalance += profit;
    alert(`🎉 Você pescou: ${fish} e ganhou ${profit.toFixed(2)} SFP2`);
    document.getElementById("walletContent").innerText = `Saldo: ${walletBalance.toFixed(2)} SFP2`;
    document.getElementById("wallet").innerText = `SFP2: ${walletBalance.toFixed(2)}`;
  } else {
    alert("O peixe escapou!");
  }

  dailyCount++;
  document.getElementById("dailyCount").innerText = `Tentativas hoje: ${dailyCount}/15`;

  skipButton.style.display = "none";
  fishButton.disabled = false;
  result.innerText = "Clique em pescar";
}

fishButton.onclick = function(){
  fishButton.disabled = true;
  result.innerText = "Esperando o peixe morder a isca...";
  skipButton.style.display = "inline-block";
  fishingTimeout = setTimeout(fishAction, 5000);
};

skipButton.onclick = function(){
  clearTimeout(fishingTimeout);
  fishAction();
};

// ===== SHOP =====
const shopOptions = [
  "Vara Comum",
  "Vara Incomum",
  "Vara Rara",
  "Vara Épica",
  "Vara Lendária",
  "Vara Mítica"
];

let selectedShop = null;

function updateShopMenu(){
  const menu = document.getElementById("shopMenu");
  menu.innerHTML = "";
  shopOptions.forEach(opt=>{
    const box = document.createElement("div");
    box.className = "box-card";
    box.innerText = opt;
    if(opt === selectedShop) box.classList.add("box-selected");
    box.onclick = ()=>{
      selectedShop = opt;
      updateShopMenu();
      updateShopContent();
    };
    menu.appendChild(box);
  });
}

function updateShopContent(){
  const content = document.getElementById("shopContent");
  if(!selectedShop){
    content.innerText = "Selecione uma box";
    return;
  }
  const dropInfo = selectedShop.includes("Comum") ? "Vara Telescópica 80% | Vara Telescópica Reforçada 20%" :
                   selectedShop.includes("Incomum") ? "Vara de Bambu 80% | Vara de Bambu Reforçada 20%" :
                   selectedShop.includes("Rara") ? "Vara Rara 80% | Vara Rara Reforçada 20%" :
                   selectedShop.includes("Épica") ? "Vara Épica 80% | Vara Épica Reforçada 20%" :
                   selectedShop.includes("Lendária") ? "Vara Lendária 80% | Vara Lendária Reforçada 20%" :
                   "Vara Mítica 80% | Vara Mítica Reforçada 20%";

  const price = selectedShop.includes("Comum") ? 50 :
                selectedShop.includes("Incomum") ? 100 :
                selectedShop.includes("Rara") ? 150 :
                selectedShop.includes("Épica") ? 200 :
                selectedShop.includes("Lendária") ? 250 : 300;

  content.innerText = `${dropInfo}\nPreço: ${price} SFP2`;
}

// ===== COMPRAR =====
document.getElementById("buyButton").onclick = function(){
  if(!selectedShop) { alert("Selecione uma box para comprar!"); return; }
  let price = selectedShop.includes("Comum") ? 50 :
              selectedShop.includes("Incomum") ? 100 :
              selectedShop.includes("Rara") ? 150 :
              selectedShop.includes("Épica") ? 200 :
              selectedShop.includes("Lendária") ? 250 : 300;

  if(walletBalance < price){ alert("Saldo insuficiente!"); return; }
  walletBalance -= price;
  document.getElementById("walletContent").innerText = `Saldo: ${walletBalance.toFixed(2)} SFP2`;
  document.getElementById("wallet").innerText = `SFP2: ${walletBalance.toFixed(2)}`;
  alert(`Você comprou a ${selectedShop}!`);
};

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab.dataset.target).classList.add("active");
    document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
    tab.classList.add("selected");
  };
});

// INIT
updateBolsaMenu();
updateBolsaVaras();
updateVaraInfo();
updateShopMenu();
updateShopContent();
});
</script>
</body>
</html>
