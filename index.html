<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial; margin:0; padding:20px 0 100px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; }
.section { display:none; }
.section.active { display:block; }

button { cursor:pointer; border:none; border-radius:10px; padding:8px 12px; }

#bottomMenu {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#00aaff;
  padding:10px;
  gap:10px;
}
#bottomMenu button {
  flex:1;
  font-size:16px;
  border-radius:20px;
  background:#0088cc;
  color:white;
}
.selected { background:#ffcc00 !important; color:black !important; }

/* Bolsa */
.bolsa-top,.bolsa-bottom{
  background:#e0f7ff;
  margin:5px;
  padding:10px;
  border-radius:10px;
}
.bag-item{
  margin:3px;
  padding:5px 10px;
  background:#00aaff;
  color:white;
  border-radius:6px;
}

/* Shop */
.shop-top,.shop-bottom,.shop-buy{
  background:#e0f7ff;
  margin:5px;
  padding:10px;
  border-radius:10px;
}
.box-card{
  width:90px;height:90px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#00aaff;
  color:white;
  margin:5px;
  border-radius:10px;
}
.box-selected{ border:3px solid gold; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>

<div id="pesca" class="section active">
<p id="result">Clique em pescar</p>
<button id="fishButton">🎣 Pescar</button>

<p id="currentVara"></p>
<p id="varaStats"></p>

<div class="bolsa-top" id="bolsaMenu"></div>
<div class="bolsa-bottom" id="bolsaVaras"></div>
</div>

<div id="shopSection" class="section">
<div class="shop-top" id="shopMenu"></div>
<div class="shop-bottom" id="shopContent"></div>
<div class="shop-buy">
<button id="buyBtn">Comprar</button>
</div>
</div>

<div id="bottomMenu">
<button class="tabButton selected" data-target="pesca">🎣 Pesca</button>
<button class="tabButton" data-target="shopSection">🏪 Shop</button>
</div>

<script>
let bolsa = [
{name:"Bambu",rarity:"Muito Comum",fishes:["Sardinha"],captureRate:50}
];

const peixes={
"Sardinha":{preco:0.06}
};

// ===== BOX CONFIG =====
const boxDrops={
"Comum":{
preco:50,
drops:[
{name:"Vara Telescópica",chance:80,fishes:["Anchova","Tainha","Cavala"]},
{name:"Vara Telescópica Reforçada",chance:20,fishes:["Anchova","Tainha","Cavala"],captureRate:55}
]
},

"Incomum":{
preco:100,
drops:[
{name:"Vara de Molinete",chance:80,fishes:["Robalo","Garoupa","Pargo"]},
{name:"Vara de Molinete Reforçada",chance:20,fishes:["Robalo","Garoupa","Pargo"],captureRate:55}
]
},

"Rara":{
preco:150,
drops:[
{name:"Vara de Carretilha",chance:80,fishes:["Atum","Peixe-Espada","Salmão"]},
{name:"Vara de Carretilha Reforçada",chance:20,fishes:["Atum","Peixe-Espada","Salmão"],captureRate:55}
]
},

"Épica":{
preco:200,
drops:[
{name:"Vara de Pesca Pesada",chance:80,fishes:["Tubarão","Barracuda","Peixe-Leão"]},
{name:"Vara de Pesca Pesada Reforçada",chance:20,fishes:["Tubarão","Barracuda","Peixe-Leão"],captureRate:55}
]
},

"Lendária":{
preco:250,
drops:[
{name:"Vara Oceânica",chance:80,fishes:["Baleia","Lula Gigante","Tubarão Branco"]},
{name:"Vara Oceânica Reforçada",chance:20,fishes:["Baleia","Lula Gigante","Tubarão Branco"],captureRate:55}
]
},

"Mítica":{
preco:300,
drops:[
{name:"Vara de Alto Desempenho",chance:80,fishes:["Kraken","Leviatã","Serpente"]},
{name:"Vara de Alto Desempenho Reforçada",chance:20,fishes:["Kraken","Leviatã","Serpente"],captureRate:55}
]
}
};

let currentVaraIndex=0;
let selectedRarity="Muito Comum";

// ===== BOLSA =====
function updateBolsaMenu(){
let raridades=["Muito Comum","Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let div=document.getElementById("bolsaMenu");
div.innerHTML="";
raridades.forEach(r=>{
let b=document.createElement("button");
b.innerText=r;
b.className="bag-item";
b.onclick=()=>{selectedRarity=r;updateBolsaMenu();updateBolsaVaras();};
div.appendChild(b);
});
}

function updateBolsaVaras(){
let div=document.getElementById("bolsaVaras");
div.innerHTML="";
bolsa.forEach((v,i)=>{
if(v.rarity===selectedRarity){
let b=document.createElement("button");
b.innerText=v.name;
b.className="bag-item";
b.onclick=()=>{currentVaraIndex=i;updateVara();};
div.appendChild(b);
}
});
}

function updateVara(){
let v=bolsa[currentVaraIndex];
document.getElementById("currentVara").innerText="Vara: "+v.name;
document.getElementById("varaStats").innerText="Peixes: "+v.fishes+" | Taxa: "+(v.captureRate||50)+"%";
}

// ===== PESCA =====
document.getElementById("fishButton").onclick=function(){
let v=bolsa[currentVaraIndex];

if(Math.random()*100 <= (v.captureRate||50)){
let peixeAleatorio = v.fishes[Math.floor(Math.random() * v.fishes.length)];
alert("Pegou " + peixeAleatorio);
}else{
alert("Escapou");
}
};

// ===== SHOP =====
let shopMenu=document.getElementById("shopMenu");
let selectedShop=null;

Object.keys(boxDrops).forEach(r=>{
let d=document.createElement("div");
d.className="box-card";
d.innerText="Box "+r;
d.onclick=()=>{selectedShop=r;updateShop();};
shopMenu.appendChild(d);
});

function updateShop(){
document.querySelectorAll(".box-card").forEach(b=>b.classList.remove("box-selected"));

[...shopMenu.children].forEach(c=>{
if(c.innerText.includes(selectedShop)) c.classList.add("box-selected");
});

let data=boxDrops[selectedShop];

document.getElementById("shopContent").innerHTML =
`<b>Conteúdo:</b><br>
🎣 ${data.drops[0].name} (80%)<br>
🔥 ${data.drops[1].name} (20%)<br><br>
💰 Preço: ${data.preco}`;
}

// ===== COMPRA =====
document.getElementById("buyBtn").onclick=function(){
if(!selectedShop)return alert("Escolha uma box");

let data=boxDrops[selectedShop];
let roll=Math.random()*100;
let acum=0;
let escolhido;

for(let d of data.drops){
acum+=d.chance;
if(roll<=acum){escolhido=d;break;}
}

bolsa.push({
name:escolhido.name,
rarity:selectedShop,
fishes:escolhido.fishes,
captureRate:escolhido.captureRate||50
});

alert("Você ganhou: "+escolhido.name);
updateBolsaVaras();
};

// ===== TABS =====
document.querySelectorAll(".tabButton").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(b.dataset.target).classList.add("active");
document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
b.classList.add("selected");
};
});

updateBolsaMenu();
updateBolsaVaras();
updateVara();
</script>
</body>
</html>
