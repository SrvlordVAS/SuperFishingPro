<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Fishing</title>
<style>
body { font-family:'Comic Sans MS', Arial; margin:0; padding:20px 0 100px 0; background:linear-gradient(to bottom,#87ceeb,#ffffff); text-align:center; }
h1 { color:#006994; }
.section { display:none; }
.section.active { display:block; }

button { cursor:pointer; border:none; border-radius:10px; padding:8px 12px; }

#bottomMenu {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#00aaff;
  padding:10px;
  gap:10px;
}
#bottomMenu button {
  flex:1;
  font-size:16px;
  border-radius:20px;
  background:#0088cc;
  color:white;
}
.selected { background:#ffcc00 !important; color:black !important; }

/* Bolsa */
.bolsa-top,.bolsa-bottom{
  background:#e0f7ff;
  margin:5px;
  padding:10px;
  border-radius:10px;
}
.bag-item{
  margin:3px;
  padding:5px 10px;
  background:#00aaff;
  color:white;
  border-radius:6px;
}

/* Shop */
.shop-top,.shop-bottom,.shop-buy{
  background:#e0f7ff;
  margin:5px;
  padding:10px;
  border-radius:10px;
}
.box-card{
  width:90px;height:90px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#00aaff;
  color:white;
  margin:5px;
  border-radius:10px;
}
.box-selected{ border:3px solid gold; }
</style>
</head>
<body>

<h1>🎣 Super Fishing</h1>
<h3 id="dailyCount">0/15</h3>

<div id="pesca" class="section active">
<p id="result">Clique em pescar</p>
<button id="fishButton">🎣 Pescar</button>
<button id="skipButton" style="display:none;">⏩ Pular</button>

<p id="currentVara"></p>
<p id="varaStats"></p>

<div class="bolsa-top" id="bolsaMenu"></div>
<div class="bolsa-bottom" id="bolsaVaras"></div>
</div>

<div id="shopSection" class="section">
<div class="shop-top" id="shopMenu"></div>
<div class="shop-bottom" id="shopContent"></div>
<div class="shop-buy">
<button id="buyBtn">Comprar</button>
</div>
</div>

<div id="bottomMenu">
<button class="tabButton selected" data-target="pesca">🎣 Pesca</button>
<button class="tabButton" data-target="shopSection">🏪 Shop</button>
</div>

<script>
let bolsa = [
{name:"Bambu",rarity:"Muito Comum",fishes:["Sardinha"],captureRate:50}
];

const peixes={
"Sardinha":{preco:0.06},

"Anchova":{preco:1},"Tainha":{preco:1},"Cavala":{preco:1},
"Robalo":{preco:1},"Garoupa":{preco:1},"Pargo":{preco:1},
"Atum":{preco:1},"Peixe-Espada":{preco:1},"Salmão":{preco:1},
"Tubarão":{preco:1},"Barracuda":{preco:1},"Peixe-Leão":{preco:1},
"Baleia":{preco:1},"Lula Gigante":{preco:1},"Tubarão Branco":{preco:1},
"Kraken":{preco:1},"Leviatã":{preco:1},"Serpente":{preco:1}
};

const boxDrops={
"Comum":[
{name:"Vara Telescópica",chance:80,fishes:["Anchova","Tainha","Cavala"]},
{name:"Vara Telescópica Reforçada",chance:20,fishes:["Anchova","Tainha","Cavala"],captureRate:70}
],
"Incomum":[
{name:"Vara de Molinete",chance:80,fishes:["Robalo","Garoupa","Pargo"]},
{name:"Vara de Molinete Reforçada",chance:20,fishes:["Robalo","Garoupa","Pargo"],captureRate:70}
],
"Rara":[
{name:"Vara de Carretilha",chance:80,fishes:["Atum","Peixe-Espada","Salmão"]},
{name:"Vara de Carretilha Reforçada",chance:20,fishes:["Atum","Peixe-Espada","Salmão"],captureRate:70}
],
"Épica":[
{name:"Vara Pesada",chance:80,fishes:["Tubarão","Barracuda","Peixe-Leão"]},
{name:"Vara Pesada Reforçada",chance:20,fishes:["Tubarão","Barracuda","Peixe-Leão"],captureRate:70}
],
"Lendária":[
{name:"Vara Oceânica",chance:80,fishes:["Baleia","Lula Gigante","Tubarão Branco"]},
{name:"Vara Oceânica Reforçada",chance:20,fishes:["Baleia","Lula Gigante","Tubarão Branco"],captureRate:70}
],
"Mítica":[
{name:"Vara Suprema",chance:80,fishes:["Kraken","Leviatã","Serpente"]},
{name:"Vara Suprema Reforçada",chance:20,fishes:["Kraken","Leviatã","Serpente"],captureRate:70}
]
};

let currentVaraIndex=0;
let selectedRarity="Muito Comum";

function updateBolsaMenu(){
let raridades=["Muito Comum","Comum","Incomum","Rara","Épica","Lendária","Mítica"];
let div=document.getElementById("bolsaMenu");
div.innerHTML="";
raridades.forEach(r=>{
let b=document.createElement("button");
b.innerText=r;
b.className="bag-item";
b.onclick=()=>{selectedRarity=r;updateBolsaMenu();updateBolsaVaras();};
div.appendChild(b);
});
}

function updateBolsaVaras(){
let div=document.getElementById("bolsaVaras");
div.innerHTML="";
bolsa.forEach((v,i)=>{
if(v.rarity===selectedRarity){
let b=document.createElement("button");
b.innerText=v.name;
b.className="bag-item";
b.onclick=()=>{currentVaraIndex=i;updateVara();};
div.appendChild(b);
}
});
}

function updateVara(){
let v=bolsa[currentVaraIndex];
document.getElementById("currentVara").innerText="Vara: "+v.name;
document.getElementById("varaStats").innerText="Peixes: "+v.fishes+" | Taxa: "+(v.captureRate||50)+"%";
}

function pescar(){
let v=bolsa[currentVaraIndex];
if(Math.random()*100 <= (v.captureRate||50)){
alert("Pegou "+v.fishes[0]);
}else alert("Escapou");
}

document.getElementById("fishButton").onclick=pescar;

// SHOP
let shopMenu=document.getElementById("shopMenu");
let selectedShop=null;

Object.keys(boxDrops).forEach(r=>{
let d=document.createElement("div");
d.className="box-card";
d.innerText="Equipamento "+r;
d.onclick=()=>{selectedShop=r;updateShop();};
shopMenu.appendChild(d);
});

function updateShop(){
document.querySelectorAll(".box-card").forEach(b=>b.classList.remove("box-selected"));
[...shopMenu.children].forEach(c=>{
if(c.innerText.includes(selectedShop)) c.classList.add("box-selected");
});
document.getElementById("shopContent").innerText="Chance 80% normal / 20% reforçada";
}

document.getElementById("buyBtn").onclick=function(){
if(!selectedShop)return alert("Escolha uma box");

let drops=boxDrops[selectedShop];
let roll=Math.random()*100;
let acum=0;
let escolhido;

for(let d of drops){
acum+=d.chance;
if(roll<=acum){escolhido=d;break;}
}

bolsa.push({
name:escolhido.name,
rarity:selectedShop,
fishes:escolhido.fishes,
captureRate:escolhido.captureRate||50
});

alert("Você ganhou: "+escolhido.name);
updateBolsaVaras();
};

// TABS
document.querySelectorAll(".tabButton").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(b.dataset.target).classList.add("active");
document.querySelectorAll(".tabButton").forEach(t=>t.classList.remove("selected"));
b.classList.add("selected");
};
});

updateBolsaMenu();
updateBolsaVaras();
updateVara();
</script>
</body>
</html>
